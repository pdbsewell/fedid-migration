<template>
    <lightning-card title="Opportunity Contact Roles" icon-name="standard:team_member">
        <template if:true={isEdited}>
            <lightning-button label="Add" icon-name="utility:add" slot="actions" onclick={add}></lightning-button>&nbsp;
            <lightning-button style="margin-left: 4px;" label={toggleSaveLabel} icon-name="utility:save" slot="actions" onclick={handleSave}></lightning-button>
            <lightning-button label="Cancel" style="margin-left: 4px;" icon-name="utility:cancel_file_request" slot="actions" onclick={handleCancel}> </lightning-button>
        </template>
        <template if:false={isEdited}>
            <lightning-button label=Create/Update icon-name="utility:edit" slot="actions" onclick={onDoubleClickEdit}></lightning-button>
        </template>
        <div class="slds-p-around_x-small">
                <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                    <thead>
                        <tr class="">
                            <th class="slds-size_1-of-10" scope="col">
                                <div class="slds-truncate" title="User">Is Primary</div> 
                            </th>
                            <th class="slds-size_3-of-10" scope="col">
                                <div class="slds-truncate" title="User">CONTACT</div> 
                            </th>
                            <th class="slds-size_3-of-10" scope="col">
                                <div class="slds-truncate" title="TEAM ROLe">TEAM ROLE</div>
                            </th>
                            <th class="slds-size_1-of-10" scope="col">
                                <div class="slds-truncate" title="ACTION">ACTION</div>
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each = {myList} for:item = "item" for:index="indexVar">
                            <tr key={item.key} class="slds-hint-parent">
                                <td class="slds-size_3-of-10" data-label="TeamMemberRole" >
                                    <div title="TeamMemberRole">
                                        <template if:false={isEdited}><input id={item.id} type="checkbox" checked={item.IsPrimary} disabled ></template>
                                        <template if:true={isEdited}>
                                           <!--<template if:true={item.recordUrl}>
                                                <a data-id={indexVar} onclick={handleIsIncludedChange}>
                                                    <input id={indexVar} type="checkbox" checked={item.IsPrimary} disabled>
                                                </a>
                                            </template>
                                            <template if:false={item.recordUrl}>-->
                                                <a data-id={indexVar} onclick={handleIsIncludedChange}>
                                                    <input id={indexVar} type="checkbox" checked={item.IsPrimary} >
                                                </a>
                                            <!--</template>-->
                                        </template>
                                    </div>
                                </td>
                                <td class="slds-size_3-of-10" data-label="">
                                    <div  title="">
                                        <template if:false={isEdited} if:true={item.ContactId}> 
                                            <lightning-formatted-url value={item.UserUrl} label={item.UserName} target="_self"></lightning-formatted-url>
                                        </template>
                                        <template if:true={isEdited}>
                                            <!--<template if:true={item.recordUrl}>
                                                <c-custom-lookup 
                                                    child-object-api-name='OpportunityContactRole'  
                                                    value={item.ContactId} 
                                                    unique-key={item.ContactId}
                                                    target-field-api-name='ContactId' 
                                                    required='true' variant="label-hidden"  
                                                    disabled="true" 
                                                    onvalueselected={handleSelection}>
                                                </c-custom-lookup>
                                            </template>
                                            <template if:false={item.recordUrl}> -->
                                                <c-custom-lookup 
                                                    child-object-api-name='OpportunityContactRole' 
                                                    access-key={indexVar} 
                                                    value={item.ContactId} 
                                                    unique-key={item.Id}
                                                    target-field-api-name='ContactId' 
                                                    required='true' 
                                                    variant="label-hidden"  
                                                    onvalueselected={handleSelection}>
                                                </c-custom-lookup>   
                                           <!-- </template> -->
                                        </template>     
                                    </div>
                                </td>
                                <td class="slds-size_3-of-10" data-label="TeamMemberRole" >
                                    <div title="TeamMemberRole" class="slds-m-bottom_medium">
                                        <template if:false={isEdited}>{item.Role}</template>
                                        <template if:true={isEdited}>
                                            <template if:true={item.Role}>
                                                <lightning-combobox 
                                                    data-index={indexVar}
                                                    name={item.Index}
                                                    label=""
                                                    value={item.Role}
                                                    placeholder=""
                                                    class="select-option-box"
                                                    options={rolePicklistOptions}
                                                    onchange={handlePicklistChange} >
                                                </lightning-combobox>
                                            </template>
                                            <template if:false={item.Role}>
                                                <template if:true={item.ContactId}>
                                                    <lightning-combobox 
                                                        data-index={indexVar}
                                                        name={item.Index}
                                                        label=""
                                                        value={item.Role}
                                                        placeholder=""
                                                        class="select-option-box"
                                                        options={newRecordPicklistOptions}
                                                        onchange={handlePicklistChange} >
                                                    </lightning-combobox>
                                                </template>
                                            </template>
                                        </template>
                                    </div>
                                </td>
                                <td class="slds-size_1-of-10" data-label="delete">
                                    <a name={indexVar} data-id={item.Id} onclick={remove}>
                                        <template if:false={item.picklistdefaultvalue}>
                                            <lightning-icon icon-name="utility:delete" alternative-text="delete"  size="small"></lightning-icon>
                                        </template>
                                    </a>
                                </td>
                            </tr>
                        </template>
                    </tbody>
             </table>
        </div>
    </lightning-card>
</template>
