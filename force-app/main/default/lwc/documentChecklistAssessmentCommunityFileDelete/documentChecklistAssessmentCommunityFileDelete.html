<template>
    <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open" aria-modal="true">
        <div class="slds-modal__container">
            <header class="slds-modal__header">
                <h2 class="slds-text-heading_medium slds-hyphenate">Delete Document</h2>
            </header>
            <div class="slds-modal__content slds-p-around_medium"> 
                <!-- non loading state -->
                <template if:false={loadingState}>
                    <template if:true={documentDetails}>
                        Are you sure you want to delete this document?

                        <article class="slds-card slds-card_boundary slds-m-around_xx-small file-card" style="box-shadow: 0 2px 2px 0 rgba(0, 0, 0, 0.10);">
                            <template if:true={documentDetails}>
                                <div class="slds-border_top slds-p-around_x-small" onclick={previewFile}>
                                    <lightning-layout vertical-align="center">
                                        <lightning-layout-item>
                                            <lightning-icon icon-name={documentDetails.fileType} size="medium"></lightning-icon>
                                            <span class="slds-assistive-text">{documentDetails.fileType}</span>
                                        </lightning-layout-item>
                                        <lightning-layout-item>
                                            <div class="slds-p-left_x-small slds-text-body_regular" style="font-weight: bold;">
                                                {documentDetails.fileName}
                                            </div>
                                            <div class="slds-p-left_x-small slds-p-right_small slds-text-body_regular">
                                                {documentDetails.contactDocument.Document_Type__c} <b>•</b> {documentDetails.formattedCreatedDateTime}
                                            </div>
                                        </lightning-layout-item>
                                    </lightning-layout>
                                </div>
                            </template>   
                            <template if:false={documentDetails}>
                                <!-- Loading spinner while retrieving document item -->
                                <div style="min-height: 40px; min-width: 60px;">
                                    <lightning-spinner alternative-text="Loading" size="small" variant="brand"></lightning-spinner>
                                </div>
                            </template>
                        </article>
                    </template>
                    <template if:false={documentDetails}>
                        <!-- Loading spinner while retrieving document item -->
                        <c-document-checklist-assessment-community-loader loader-count="2" has-no-stencil="true"></c-document-checklist-assessment-community-loader>
                    </template>  
                </template>

                <!-- loading state -->
                <template if:true={loadingState}>
                    <!-- Loading spinner while retrieving document item -->
                    <c-document-checklist-assessment-community-loader loader-count="3" has-no-stencil="true"></c-document-checklist-assessment-community-loader>
                </template>

            </div>
            <footer class="slds-modal__footer">
                <lightning-button label="Cancel" title="Cancel" onclick={closeWindow} disabled={loadingState}></lightning-button>
                <lightning-button label="Delete" title="Delete Document" variant="destructive" class="slds-m-left_x-small" onclick={deleteDocument} disabled={loadingState}></lightning-button>
            </footer>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
