<template>
  <!--slds-nubbin_bottom-left-->
    <section aria-describedby="dialog-body-id-101" aria-label="Dialog Title" class="slds-popover slds-popover_walkthrough slds-popover_feature "
    role="tooltip">
    <!--
        <button class="slds-button slds-button_icon slds-button_icon-small slds-float_right slds-popover__close slds-button_icon-inverse" 
        title="Close dialog">
          <svg class="slds-button__icon">
            <use xlink:href="/apexpages/slds/latest/assets/icons/utility-sprite/svg/symbols.svg#close"></use>
          </svg>
          <span class="slds-assistive-text">Close dialog</span>
        </button>
    -->
        <div class="slds-popover__body" id="dialog-body-id-101">
          <div class="slds-media">
            <div class="slds-media__figure">
              <span class="slds-icon_container" title="description of icon when needed">
                <svg class="slds-icon slds-icon_small slds-icon-text-default">
                  <use xlink:href="/apexpages/slds/latest/assets/icons/utility-sprite/svg/symbols.svg#description"></use>
                </svg>
                <span class="slds-assistive-text">{iconDescription}</span>
              </span>
            </div>
            <div class="slds-media__body">
              <p style="white-space: pre-wrap;">{message}</p>
            </div>
          </div>
        </div>
    </section>
</template>
