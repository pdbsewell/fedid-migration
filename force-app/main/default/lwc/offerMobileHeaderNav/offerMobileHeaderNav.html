<template>
    <div class="header-div">
        <div class="header-content" if:true={currentPage}>
            <span class={currentPage.numberClass} data-line={currentPage.display_Order}>
                <p>{currentPage.name}</p>
            </span>
            <a onclick={handleOnclick}><span class={iconClass}></span></a>
        </div>
        <div if:true={menuIcon}>
            <c-offer-mobile-progress-bar wizard-pages={wizardPages}
                                        active-page={activePage}>
            </c-offer-mobile-progress-bar>
        </div>
    </div>
    <div if:true={showNavigation}>
        <div class={visibility}>
            <c-progress-indicator></c-progress-indicator>
        </div>
    </div>


</template>
