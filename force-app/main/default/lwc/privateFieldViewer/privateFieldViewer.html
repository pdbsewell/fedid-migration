<template>
    <template if:true={isModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2 class="slds-modal__title">Reason for Access</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-textarea 
                        label="Reason for viewing PII" 
                        required 
                        onchange={handleReasonChange}
                        placeholder="Enter reason...">
                    </lightning-textarea>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeModal} class="slds-m-right_x-small"></lightning-button>
                    <lightning-button label="Confirm" variant="brand" onclick={handleConfirmReveal} disabled={isConfirmDisabled}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <div class="slds-card slds-card_boundary slds-p-around_small white-bg-container">
        <div class="slds-form-element slds-form-element_stacked">
            
            <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_none">
                <lightning-icon 
                    icon-name="utility:lock" 
                    size="xx-small" 
                    class="slds-m-right_xx-small label-lock-icon"
                    alternative-text="Protected Field">
                </lightning-icon>
                <span class="slds-form-element__label" style="margin-bottom:0;">{label}</span>
            </div>

            <div class="slds-form-element__control slds-grid slds-grid_vertical-align-center slds-border_bottom">
                
                <div class="slds-col slds-grow slds-p-vertical_xxx-small">
                    <template if:true={isLoading}>
                        <div style="height:0; position:relative;">
                            <lightning-spinner alternative-text="Loading" size="small" variant="brand"></lightning-spinner>
                        </div>
                    </template>
                    <div class="slds-form-element__static slds-truncate" style="padding-top:0; min-height:1.5rem;">
                        <span class={maskClass}>{displayValue}</span>
                    </div>
                </div>

                <div class="slds-col slds-no-flex">
                    <lightning-button 
                        variant="base" 
                        label={bLabel} 
                        icon-name={bIcon} 
                        onclick={handleButtonClick}
                        disabled={isLoading}>
                    </lightning-button>
                </div>
            </div>
        </div>
    </div>
</template>
