<template>
    <lightning-card>
        <div if:true={isEditorVisible}>
            <div class="slds-form-element slds-m-bottom_large">
                <lightning-input
                    label="Email Subject"
                    value={templateSubject}
                    onchange={handleSubjectChange}
                    maxlength="255"
                    message-when-too-long="Subject cannot exceed 255 characters.">
                </lightning-input>
                <p class="slds-text-body_small slds-m-top_xx-small">
                    {subjectCharCount}/255 characters
                </p>
            </div>
            <!-- Subject Input -->
            
            <div class="slds-form-element slds-m-bottom_large">
                <label class="slds-form-element__label">Email Body</label>
                <!-- TEMPLATE EDITOR -->
                <lightning-input-rich-text
                label="Edit HTML Template"
                value={templateHtml}
                onchange={handleTemplateChange}
                disabled-categories="INSERT_CONTENT FORMAT_FONT"
                message-when-bad-input={bodyErrorMessage}
                valid={bodyValidity}>
            </lightning-input-rich-text>
            <p class="slds-text-body_small slds-m-top_xx-small">
                {templateCharCount}/4000 characters
            </p>
            </div>
            
            

            <div class="slds-border_top slds-p-top_medium slds-p-horizontal_medium slds-text-align_right slds-m-top_large">
                <lightning-button variant="Neutral" label="Previous" onclick={goBackToFlow} class="slds-m-left_x-small"></lightning-button>
                <lightning-button variant="brand" label="Next" disabled={nextDisabled} onclick={goToPreview} class="slds-m-left_x-small"></lightning-button>
            </div>
        </div>
        <div if:true={isPreviewVisible}>
            <div class="slds-grid slds-gutters">
                <!-- Left Pane: Vertical Nav -->
                <div class="slds-col slds-size_1-of-3">
                    <lightning-vertical-navigation onselect={handleContactChange}>
                        <lightning-vertical-navigation-section label="Contacts">
                            <template for:each={contactList} for:item="contact">
                                <lightning-vertical-navigation-item
                                    key={contact.Id}
                                    label={contact.Name}
                                    name={contact.Id}>
                                </lightning-vertical-navigation-item>
                            </template>
                        </lightning-vertical-navigation-section>
                    </lightning-vertical-navigation>
    
                    <div class="slds-m-top_medium">
                        <lightning-button variant="brand" label="Preview" onclick={handlePreview}></lightning-button>
                    </div>
                </div>

                <div class="slds-col slds-size_2-of-3">
                <!-- Right Pane: Parsed HTML Preview 
                <template if:true={isLoading}>
                    <lightning-spinner alternative-text="Loading preview..." size="medium"></lightning-spinner>
                </template> 
                <template if:false={isLoading}>-->
                    
                        <template if:true={selectedContactId}>
                            <div class="slds-box slds-theme_default parsed-html" lwc:dom="manual"></div>
                        </template>
                        <template if:false={selectedContactId}>
                            <div class="slds-box slds-theme_shade slds-text-body_regular">
                                Please select a contact and click "Preview" to see the HTML.
                            </div>
                        </template> 
                    
               <!-- </template>-->
            </div>
            </div>
            <div class="slds-border_top slds-p-top_medium slds-p-horizontal_medium slds-text-align_right slds-m-top_large">
                <lightning-button variant="Neutral" label="Previous" onclick={goToEditor} class="slds-m-left_x-small"></lightning-button>
                <lightning-button variant="brand" label="Next" onclick={handleConfirm} class="slds-m-left_x-small"></lightning-button>
            </div>
        </div>

        <template if:true={showModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-backdrop_open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <h2 class="slds-modal__title">Confirm Insertion</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        Are you sure you want to insert records for the selected contacts?
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancel" onclick={closeModal}></lightning-button>
                        <lightning-button variant="brand" label="Yes, Proceed" onclick={insertAndFinish} class="slds-m-left_small"></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
        
    </lightning-card>
</template>
