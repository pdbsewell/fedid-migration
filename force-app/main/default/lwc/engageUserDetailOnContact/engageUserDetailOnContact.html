<template>

    <div class="slds-section slds-is-open">
        <h3 class="slds-section__title slds-theme_shade">
      <span class="slds-truncate slds-p-horizontal_small" title="Section Title">User Details</span>
        </h3>
        <div class="slds-form" role="list">
            <div class="slds-grid slds-gutters_small">
                <div class="slds-col slds-has-flexi-truncate" role="listitem">
                    <div class="slds-form-element slds-form-element_edit slds-hint-parent">
                        <span class="slds-form-element__label">Name
                        </span>
                            <div class="slds-form-element__control">
                                <span class="slds-form-element__static slds-border_bottom">
                                    <span class="slds-form-element__static slds-border_bottom">{name}

                                    </span>
                                 </span>
                            </div>
                    </div>
                </div>
                <div class="slds-col slds-has-flexi-truncate" role="listitem">
                    <div class="slds-form-element slds-form-element_edit slds-hint-parent">
                        <span class="slds-form-element__label">Is Portal Enabled?</span>
                            <div class="slds-form-element__control">
                                <span class="slds-form-element__static slds-border_bottom">
                                    <span class="slds-form-element__static slds-border_bottom">{isportalenabled}</span>
                                </span>
                            </div>
                    </div>
                </div>
            </div>
            <div class="slds-grid slds-gutters_small">
                <div class="slds-col slds-has-flexi-truncate" role="listitem">
                    <div class="slds-form-element slds-form-element_edit slds-hint-parent">
                        <span class="slds-form-element__label">Username

                        </span>
                            <div class="slds-form-element__control">
                                <span class="slds-form-element__static slds-border_bottom">
                                    <span class="slds-form-element__static slds-border_bottom">{username}</span>
                                </span>
                            </div>
                    </div>
                </div>
                <div class="slds-col slds-has-flexi-truncate" role="listitem">
                    <div class="slds-form-element slds-form-element_edit slds-hint-parent">
                        <span class="slds-form-element__label">IsActive</span>
                            <div class="slds-form-element__control">
                                <span class="slds-form-element__static slds-border_bottom">
                                    <span class="slds-form-element__static slds-border_bottom">{isactive}</span>
                                </span>
                            </div>
                    </div>
                </div>
            </div>
            <div class="slds-grid slds-gutters_small">
                
                <div class="slds-col slds-has-flexi-truncate" role="listitem">
                    <div class="slds-form-element slds-form-element_edit slds-hint-parent">
                        <span class="slds-form-element__label">Email 
                        </span>
                            <div class="slds-form-element__control">
                                <span class="slds-form-element__static slds-border_bottom">
                                    <span class="slds-form-element__static slds-border_bottom">{email}</span>
                                </span>
                            </div>
                    </div>
                </div>
                <div class="slds-col slds-has-flexi-truncate" role="listitem">
                    <div class="slds-form-element slds-form-element_edit slds-hint-parent">
                        <span class="slds-form-element__label">Locale</span>
                            <div class="slds-form-element__control">
                                <span class="slds-form-element__static slds-border_bottom">
                                    <span class="slds-form-element__static slds-border_bottom">{locale}</span>
                                </span>
                            </div>
                    </div>
                </div>   
            </div>
            <div class="slds-grid slds-gutters_small">
                <div class="slds-col slds-has-flexi-truncate" role="listitem">
                    <div class="slds-form-element slds-form-element_edit slds-hint-parent">
                        <span class="slds-form-element__label">Directory Opt In 
                        </span>
                            <div class="slds-form-element__control">
                                <span class="slds-form-element__static slds-border_bottom">
                                    <span class="slds-form-element__static slds-border_bottom">{directoryoptin}</span>
                                </span>
                            </div>
                    </div>
                </div>
                <div class="slds-col slds-has-flexi-truncate" role="listitem">
                    <div class="slds-form-element slds-form-element_edit slds-hint-parent">
                        <span class="slds-form-element__label">Messaging Opt In
                        </span>
                            <div class="slds-form-element__control">
                                <span class="slds-form-element__static slds-border_bottom">
                                    <span class="slds-form-element__static slds-border_bottom">{messagingoptin}</span>
                                </span>
                            </div>
                    </div>
                </div>   
            </div>
            <div class="slds-grid slds-gutters_small">
                <div class="slds-col slds-has-flexi-truncate" role="listitem">
                    <div class="slds-form-element slds-form-element_edit slds-hint-parent">
                        <span class="slds-form-element__label">Last login</span>
                            <div class="slds-form-element__control">
                                <span class="slds-form-element__static slds-border_bottom">
                                    <lightning-formatted-date-time value={lastlogindate} year="numeric" day="2-digit" month="long" hour="2-digit" minute="2-digit"></lightning-formatted-date-time>
                                </span>
                            </div>
                    </div>
                </div> 
                <div class="slds-col slds-has-flexi-truncate" role="listitem">
                    <div class="slds-form-element slds-form-element_edit slds-hint-parent">
                        <span class="slds-form-element__label">Last Ascend Portal login</span>
                            <div class="slds-form-element__control">
                                <span class="slds-form-element__static slds-border_bottom">
                                    <lightning-formatted-date-time value={lastPortalLoginTime} year="numeric" day="2-digit" month="long" hour="2-digit" minute="2-digit"></lightning-formatted-date-time>
                                </span>
                            </div> 
                    </div>
                </div>				
            </div>
        </div>
    </div>
    <div class="slds-section slds-is-open">
        <h3 class="slds-section__title slds-theme_shade">
            <span class="slds-truncate slds-p-horizontal_small" style="width:50%;" title="Section Title">User Permission set Details</span>
            <template if:true={showSyncUserDetailsButton}>
                <!--LOADING SPINNER--> 
                <template if:true={showSpinner2}> 
                    <div class="slds-is-relative" style="position:relative; float:center;"> 
                        <lightning-spinner alternative-text="Loading" class="spins" variant="brand" size="small"></lightning-spinner> 
                    </div>            
                </template>
                <template if:false={showSpinner2}>
                    <div class="slds-border_bottom" style="position:relative; float:center; padding-right: .5rem;">
                        <lightning-button label="Update UserName/Email" variant="brand" onclick={syncUserDetailsFromContact} title="Update UserName/Email"> 
                        </lightning-button>
                    </div>
                </template>                
            </template>               

			<template if:true={showReActivateButton}>
                <!--LOADING SPINNER--> 
                <template if:true={showSpinner}> 
                    <div class="slds-is-relative" style="position:relative; float:center;"> 
                        <lightning-spinner alternative-text="Loading" class="spins" variant="brand" size="small"></lightning-spinner> 
                    </div>            
                </template>
                <template if:false={showSpinner}>
                    <div class="slds-border_bottom" style="padding-left: .5rem;">
                        <lightning-button label="Reactivate Alumni Account" variant="brand" onclick={reactivatePortalAccount} title="Reactivate Alumni Account">
                        </lightning-button>
                    </div>
                </template>
            </template>
        </h3>
        <table class="slds-table slds-table_cell-buffer slds-no-row-hover slds-table_bordered">
            <tbody>
                <template for:each={permissionsetdata} for:item="acc">
                    <tr class="slds-hint-parent" key={acc.Id}>
                        <th data-label="Permission Set Name" scope="row">
                            <div class="slds-truncate" title="permissionsetname">
                                {acc.PermissionSet.Label}   
                            </div>
                        </th>
                    <td data-label="Account Name">
                        <div class="slds-truncate" title="assigneddate">
                            <lightning-formatted-date-time value={acc.SystemModstamp} year="numeric" day="2-digit" month="long" hour="2-digit" minute="2-digit"></lightning-formatted-date-time>
                        </div>
                    </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>
</template>
