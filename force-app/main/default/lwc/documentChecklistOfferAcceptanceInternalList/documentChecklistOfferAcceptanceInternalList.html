<template>
    <template if:false={isQuoteChecked}>
        <center class="slds-p-vertical_medium">Applicant has not accepted the offer yet. Acceptance Checklist will be generated once the offer has been signed.</center>
    </template>
    <template if:true={isQuoteChecked}>
        <!-- error message -->
        <template if:true={hasError}>
            <div class="slds-p-around_small">
                <lightning-layout vertical-align="center">
                    <lightning-layout-item size="2">
                        <div class="slds-align_absolute-center">
                            <lightning-icon icon-name="utility:error" alternative-text="Error!" title="Error" size="large" variant="error"></lightning-icon>
                        </div>
                    </lightning-layout-item>
                    <lightning-layout-item size="10">
                        <span class="slds-text-heading_medium">An error occured. Please contact your System Administrator.</span>
                    </lightning-layout-item>
                </lightning-layout>
            </div>
        </template>
        <!-- error message -->
        <template if:false={hasError}>
            <!-- Page details -->
            <lightning-layout multiple-rows>

                <!-- Actions Dashboard -->        
                <template if:true={showHeader}>
                    <template if:true={checklistItems}>
                        <lightning-layout-item flexibility="auto" padding="around-small" size="12" small-device-size="12" medium-device-size="12" large-device-size="12">
                            <article class="slds-card slds-card_boundary">
                                <div class="slds-card__header slds-grid slds-is-relative">
                                    <header class="slds-media slds-media_center slds-has-flexi-truncate">
                                        <div class="slds-media__body">
                                            <span class="slds-card__header-title">
                                                <lightning-layout vertical-align="center">
                
                                                    <!-- header icon -->                           
                                                    <template if:false={isOtherChecklist}>
                                                        <lightning-layout-item>
                                                            <lightning-icon icon-name="custom:custom83" size="medium"></lightning-icon> 
                                                        </lightning-layout-item>
                                                    </template>     
                
                                                    <!-- header text -->
                                                    <lightning-layout-item padding="horizontal-small">   
                                                        <span style="font-weight: bold;">Document Checklist ({checklistItemsCount})</span>
                                                    </lightning-layout-item>

                                                </lightning-layout>
                                            </span>
                                        </div>
                                        <div class="slds-no-flex">
                                            <span class="slds-m-right_xx-small">
                                                <lightning-button-icon icon-name="utility:refresh" onclick={refreshChecklistDetails}></lightning-button-icon>
                                            </span>
                                            <template if:true={showNew}>
                                                <span>
                                                    <lightning-button-group>
                                                        <lightning-button label="New" onclick={showChecklistForm} disabled={hasNoNewChecklistAccess}></lightning-button>
                                                        <lightning-button label="New from Template" onclick={showBulkChecklistForm} disabled={hasNoNewChecklistAccess}></lightning-button>
                                                        <!-- templates 
                                                        <lightning-button-menu alternative-text="Create Checklist Item" menu-alignment="right" onselect={handleMenuAction}>
                                                            <lightning-menu-item label="Final Contract with Guardian Signature" value="finalContractSignature" 
                                                                                 prefix-icon-name={isCheckedFinalContractSignature} 
                                                                                 disabled={isDisabledFinalContractSignature}>
                                                            </lightning-menu-item>
                                                            <lightning-menu-item label="Proof of Meeting Conditions" value="proofMeetingConditions" 
                                                                                 prefix-icon-name={isCheckedProofMeetingConditions} 
                                                                                 disabled={isDisabledProofMeetingConditions}>
                                                            </lightning-menu-item>
                                                            <lightning-menu-item label="Proof of Payment or Sponsor" value="proofPaymentSponsor" 
                                                                                 prefix-icon-name={isCheckedProofPaymentSponsor} 
                                                                                 disabled={isDisabledProofPaymentSponsor}>
                                                            </lightning-menu-item>
                                                            <lightning-menu-item label="Under 18 Welfare and Accommodation Form" value="underAgeWelfareAccomodationForm" 
                                                                                 prefix-icon-name={isCheckedUnderAgeWelfareAccomodationForm} 
                                                                                 disabled={isDisabledUnderAgeWelfareAccomodationForm}>
                                                            </lightning-menu-item>
                                                            <lightning-menu-item label="Proof of OHSC Health Cover" value="proofOHSCHealthCover" 
                                                                                 prefix-icon-name={isCheckedProofOHSCHealthCover} 
                                                                                 disabled={isDisabledProofOHSCHealthCover}>
                                                            </lightning-menu-item>
                                                            <lightning-menu-item label="Proof of Visa" value="proofVisa" 
                                                                                 prefix-icon-name={isCheckedProofVisa} 
                                                                                 disabled={isDisabledProofVisa}>
                                                            </lightning-menu-item>
                                                            <lightning-menu-item label="Additional Proof of Visa" value="additionalProofVisa" 
                                                                                 prefix-icon-name={isCheckedAdditionalProofVisa} 
                                                                                 disabled={isDisabledAdditionalProofVisa}>
                                                            </lightning-menu-item>
                                                            <lightning-menu-item label="Proof of Passport" value="proofPassport" 
                                                                                 prefix-icon-name={isCheckedProofPassport} 
                                                                                 disabled={isDisabledProofPassport}>
                                                            </lightning-menu-item>
                                                            <lightning-menu-item label="Additional Proof of Passport" value="additionalProofPassport" 
                                                                                 prefix-icon-name={isCheckedAdditionalProofPassport} 
                                                                                 disabled={isDisabledAdditionalProofPassport}>
                                                            </lightning-menu-item>
                                                        </lightning-button-menu>-->
                                                    </lightning-button-group>
                                                </span>
                                            </template>
                                        </div>
                                    </header>
                                    <template if:true={listActionLoading}>
                                        <!-- Spinner loader -->
                                        <lightning-spinner alternative-text="Loading" variant="brand" size="small"></lightning-spinner>
                                    </template>
                                </div>
                            </article>
                        </lightning-layout-item>
                    </template>
                </template>

                <lightning-layout-item flexibility="auto" size="12" small-device-size="12" medium-device-size="12" large-device-size="12">
                    <!-- body content -->
                    <div class="slds-is-relative">
                        <template if:true={checklistItems}>                    
                            <template if:true={offer}>
                                <lightning-layout multiple-rows class="slds-p-bottom_x-small">
                                    <!-- show at top -->
                                    <template if:true={prioritizeOther}>
                                            <!-- Other Section -->
                                            <lightning-layout-item flexibility="auto" size="12" small-device-size="12" medium-device-size="12" large-device-size="12" class="slds-p-horizontal_small slds-p-vertical_xx-small">
                                                    
                                                <!-- Show ui for checklist item card -->
                                                <c-document-checklist-offer-acceptance-internal-item is-other-checklist="true"  
                                                                        opportunity-id={opportunityId}
                                                                        applicant-id={offer.PrimaryContact__c}
                                                                        onfilepreview={onFilePreview}
                                                                        file-column-count={fileColumnCount}
                                                                        onreporterror={childHasError}>
                                                </c-document-checklist-offer-acceptance-internal-item>
                
                                            </lightning-layout-item>
                                        </template>
                                    
                                    <template for:each={checklistItems} for:item='checklistItem'>
                                        <template if:true={checklistItem.Id}>
                                            <lightning-layout-item key={checklistItem.Id} flexibility="auto" size="12" small-device-size="12" medium-device-size="12" large-device-size="12" class="slds-p-horizontal_small slds-p-vertical_xx-small">
                                                
                                                <!-- Show ui for checklist item card -->
                                                <c-document-checklist-offer-acceptance-internal-item checklist-item-id={checklistItem.Id} 
                                                                        opportunity-id={opportunityId}
                                                                        is-other-checklist="false" 
                                                                        applicant-id={offer.PrimaryContact__c}
                                                                        onfilepreview={onFilePreview}
                                                                        file-column-count={fileColumnCount}
                                                                        onreporterror={childHasError}>
                                                </c-document-checklist-offer-acceptance-internal-item>
                                            </lightning-layout-item>
                                        </template>
                                    </template>
                                    
                                    <!-- show at bottom -->
                                    <template if:false={prioritizeOther}>
                                        <!-- Other Section -->
                                        <lightning-layout-item flexibility="auto" size="12" small-device-size="12" medium-device-size="12" large-device-size="12" class="slds-p-horizontal_small slds-p-vertical_xx-small">
                                                
                                            <!-- Show ui for checklist item card -->
                                            <c-document-checklist-offer-acceptance-internal-item is-other-checklist="true"  
                                                                    opportunity-id={opportunityId}
                                                                    applicant-id={offer.PrimaryContact__c}
                                                                    onfilepreview={onFilePreview}
                                                                    file-column-count={fileColumnCount}
                                                                    onreporterror={childHasError}>
                                            </c-document-checklist-offer-acceptance-internal-item>

                                        </lightning-layout-item>
                                    </template>
                                </lightning-layout>
                            </template>      
                            <template if:false={offer}>
                                <!-- Loading spinner while retrieving applicant -->
                                <c-document-checklist-assessment-internal-loader loader-count="10"></c-document-checklist-assessment-internal-loader>
                            </template>                  
                        </template>
                        <template if:false={checklistItems}>

                            <!-- Loading spinner while retrieving applicant -->
                            <c-document-checklist-assessment-internal-loader loader-count="10"></c-document-checklist-assessment-internal-loader>

                        </template>
                        
                    </div>
                </lightning-layout-item>
            </lightning-layout>
        </template>
    </template>
    <!-- new checklist -->
    <template if:true={showChecklistCreationForm}>
        <c-document-checklist-offer-acceptance-internal-create-form oncancel={hideChecklistForm}
                                                                    onsubmit={submittedChecklistForm}
                                                                    opportunity-id={opportunityId}
                                                                    applicant-id={offer.PrimaryContact__c}
                                                                    checklist-name={checklistName}
                                                                    checklist-help-text={checklistHelpText}
                                                                    checklist-sort-order={checklistSortOrder}
                                                                    checklist-new-status={checklistNewStatus}
                                                                    checklist-type={checklistType}
                                                                    checklist-unique-key={checklistUniqueKey}
                                                                    checklist-comments={checklistComments}
                                                                    checklist-opportunity-id={opportunityId}
                                                                    disabled-checklist-name={disabledChecklistName}
                                                                    is-bulk-creation={isBulkCreation}
                                                                    checklist-items={checklistItems}
                                                                    document-checklist-templates={documentChecklistTemplates}>                                                
        </c-document-checklist-offer-acceptance-internal-create-form>
    </template>
</template>
