<template>
    <div class="slds">
        <!-- DELETE CONFIRMATION POPUP -->
        <div data-testid="confirmDeleteDialog" if:true={showConfirmDelete}>

            <div role="alertdialog" tabindex="-1" aria-labelledby="prompt-heading-id" aria-describedby="prompt-message-wrapper" class="slds-modal slds-fade-in-open slds-modal--prompt">
                <div class="slds-modal__container">
                    <div class="slds-modal__header slds-theme--error slds-theme--alert-texture">
                        <h2 class="slds-text-heading--small" id="prompt-heading-id" style="color: #ffffff;">{label.app_DeleteConfirmation}</h2>
                    </div>
                    <div class="slds-modal__content slds-p-around--medium">
                        <p>Are you sure you want to delete this qualification? Please note any document uploaded as part of this claim will also be deleted.</p>
                    </div>
                    <div class="slds-modal__footer slds-theme--default">
                        <lightning-button label="Yes"
                                          icon-position="left"
                                          variant="brand"
                                          onclick={onClickConfirmDelete}>
                        </lightning-button>&nbsp;
                        <lightning-button label="No"
                                          icon-position="left"
                                          variant="neutral"
                                          onclick={onClickCancelDelete}>
                        </lightning-button>
                    </div>
                </div>
            </div>
            <div class="slds-backdrop slds-backdrop--open"></div>
        </div>

        <!-- ALERT: ANY Errors on save-->
        <div data-testid="errorSection" if:true={showErrors}>
            <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <h3 id="modal-heading-01" class="slds-text-heading_medium slds-hyphenate">Please complete the following:</h3>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
                        <ul class="slds-list_dotted slds-text-align--left">
                            <template for:each={saveErrors} for:item="error">
                                <li key={error}>{error}</li>
                            </template>
                        </ul>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="slds-button slds-button_neutral" onclick={onClickCloseErrors}>Close</button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </div>

        <!-- page heading and desciption-->
        <div>
                <h1 style="font-weight:bold;">Qualifications</h1>
                <div class="grtParagraph">Please provide the details of ALL complete or incomplete tertiary qualifications (including any current enrolment/s):</div>
                <ul class="slds-list_dotted" >
                    <li class="grtParagraph">Details of any incomplete qualification (both undergraduate and postgraduate) MUST be provided, if applicable. This includes any course you are currently enrolled in, or from which you have withdrawn.</li>
                    <li class="grtParagraph">Up to five qualifications can be included in this section. Any additional qualifications can be detailed in the Curriculum Vitae (CV).</li>
                    <li class="grtParagraph">Failure to declare any previous, or current, enrolment in a graduate research degree could result in your application being invalid as this is in contradiction of the Student Declaration you will be required to complete in the Validate & Submit section of this application.</li>
                </ul>  
                <div class="grtParagraph">Supporting Documentation (not required for Monash qualifications):</div>
                <div class="grtParagraph">Please ensure you upload documentation that complies with the requirements specified below in the <b>Documents section</b>.</div>
                <ul class="slds-list_dotted">
                    <li class="grtParagraph">For each qualification please provide a certified copy of the official academic transcript which lists all units attempted, results achieved and an explanation of the grading schema.</li>
                    <li class="grtParagraph">If you have completed a qualification you should also provide the degree certificate or testamur from the awarding institution. The transcript should also indicate that you have completed the qualification.</li>
                    <li class="grtParagraph">Documents submitted in a language other than English must include an official certified translation.</li>
                    <li class="grtParagraph">Applicants who have completed an ungraded Research Masters must upload examiners reports in addition to the academic transcript.</li>
                </ul>          
        </div>
        <br/>
        <!-- Educational History table-->
        <div class="sectionContainer slds-wrap" data-testid="contactQualificationSection" if:true={isStateStart}>
                <div class="slds-size_3-of-6 sectionContainerTopBorder"></div>
                <div class="sectionContainerBody slds-size_5-of-5">
                    <div class="slds-size_5-of-5">
                        <h2>Educational History</h2>
                    </div>
                    <div class="slds-size_5-of-5">
                        <table class="slds-table slds-table--bordered slds-table--cell-buffer slds-table--fixed-layout ">
                            <thead>
                            <tr class="slds-text-title--caps">
                                <th scope="col">
                                    <div title="posTH">Qualification</div>
                                </th>
                                <th scope="col" class="hideOnMobile">
                                    <div title="empTH">Institution</div>
                                </th>
                                <th scope="col" class="hideOnMobile">
                                    <div title="empTH">Dates</div>
                                </th>
                                <th scope="col">
                                    <div class="slds-truncate slds-align_absolute-center" title="Action" >Action</div>
                                </th>
                            </tr>
                            </thead>
                            <tbody>
                            <!-- ITERATION FOR Qualifications -->
                            <template for:each={contactQualifications} for:item="qualification">                                    
                                <tr key={qualification.Id}>
                                    <td>
                                        <div data-testid="qualificationName" class="slds-truncate" style="max-width: 300px;">
                                            {qualification.Other_Qualification__c}
                                        </div>
                                    </td>
                                    <td>
                                        <div data-testid="instituteName" class="slds-truncate" style="max-width: 300px;">
                                            {qualification.Relevant_Institution_Name__c}
                                        </div>
                                    </td>
                                    <td data-label="Start Date">
                                        <div class="slds-float_left">
                                            <template if:false={qualification.Completion_Withdrawal_Date__c}>
                                                <div class="slds-truncate" >
                                                    <lightning-formatted-date-time data-testid="qualStartDate" value={qualification.Commencement_Date__c} year="numeric" day="2-digit" month="2-digit"></lightning-formatted-date-time>
                                                    &nbsp;-&nbsp;Present
                                                </div>
                                            </template>
                                            <template if:true={qualification.Completion_Withdrawal_Date__c}>
                                                <lightning-formatted-date-time data-testid="qualStartDate" value={qualification.Commencement_Date__c} year="numeric" day="2-digit" month="2-digit"></lightning-formatted-date-time>
                                                    &nbsp;-&nbsp;
                                                    <lightning-formatted-date-time data-testid="qualEndDate" value={qualification.Completion_Withdrawal_Date__c} year="numeric" day="2-digit" month="2-digit"></lightning-formatted-date-time>
                                            </template>
                                        </div>
                                    </td>
                                    <td data-label="Action">
                                        <div class="slds-truncate slds-align--absolute-center">
                                            
                                            <lightning-button-icon variant="bare" icon-position="left" name={qualification.Id} onclick={onClickEdit} icon-name="utility:edit" size="medium" alternative-text="Edit"></lightning-button-icon>&nbsp;
                                            <lightning-button-icon variant="bare" icon-position="left" name={qualification.Id} onclick={onClickDelete} icon-name="utility:close" size="medium" alternative-text="Remove item"></lightning-button-icon> 
                                        </div>
                                    </td>
                                </tr>
                            </template>
                                
                            <!-- END - ITERATION FOR APPLICATION Qualification PROVIDED -->
                            </tbody>
                        </table>
                    </div>
                </div>
            

            <div class="slds-p-vertical--large">
                
            </div>

            <!-- ADD NEW BUTTON -->
            <div if:false={isNewDisabled} class="slds-button-group slds-p-left_medium" role="group">
                <button class="secondaryButton" onclick={onClickAddNew} style="margin-top: 10px;">
                    <lightning-icon class="secondaryIcon" icon-name="utility:add" size="small"></lightning-icon>&nbsp;&nbsp;Add New Qualification
                </button>
            </div>
        </div>
        <!-- qualification form input fields -->
        <div class="sectionContainer" data-testid="newQualificationSection" if:true={isStateEdit}>
            <div class="sectionContainerBody slds-size_5-of-5">
            <br/>
            <lightning-input name="qualificationName"
                             data-testid="qualificationName" 
                             data-id="qualificationName"
                             label="Qualification Name"
                             required="true"
                             max-length="100"
                             onchange={onFieldChange}
                             value={contactQualification.Other_Qualification__c}></lightning-input>
            <lightning-select name="qualificationType"
                             data-testid="qualificationType" 
                             data-id="qualificationType"
                             label="Qualification Type"
                             value={contactQualification.Evidence_Type__c}
                             required="true"
                             options={qualificationTypeList}
                             onchange={onFieldChange}   
                             ></lightning-select> 
            <lightning-input if:true={otherQualificationType} name="otherQualificationType"
                             data-testid="otherQualificationType" 
                             data-id="otherQualificationType"
                             label="Specify Qualification Type"
                             required="true"
                             max-length="100"
                             onchange={onFieldChange}
                             value={contactQualification.Other_Evidence_Type__c}></lightning-input>                              
            <lightning-input name="courseLength"
                             data-testid="courseLength" 
                             data-id="courseLength"
                             label="Course Length"
                             field-level-help="(e.g. 3 years full-time)"
                             required="true"
                             onchange={onFieldChange}
                             max-length="20"
                             value={contactQualification.Course_Length__c}></lightning-input>
            <lightning-select name="country"
                             data-testid="country" 
                             label="Country"
                             value={contactQualification.Qualification_Country__c}
                             required="true"
                             options={countryOptions}
                             onchange={onFieldChange}></lightning-select>                             
            <div>
            
                <div if:true={isCountrySelected} class="slds-p-top_medium">Enter the keyword and select your institution from the drop down list.
                If you cannot find your institution, enter it manually.</div>
                
                    <lightning-tabset if:true={isCountrySelected} active-tab-value={tabIdInstitute}>
                        <lightning-tab label="Select From List" value="INSTITUTE_SEARCH" onactive={onTabSelectInstitution}>
                            <c-my-app-search-with-dropdown
                                    data-id="searchInstitute"
                                    other-search-text={instituteName}                                    
                                    place-holder="search for institution"
                                    input-label="Institution"
                                    object-api-name="Institution__c"
                                    fields-to-return="['Id', 'Institution_Name__c', 'Institution_Code__c']"
                                    where-fields="['Institution_Country__c', 'Type__c']"
                                    where-value0={contactQualification.Qualification_Country__c}
                                    where-value1="Tertiary"
                                    search-fields="['Institution_Name__c']"
                                    label-field="Institution_Name__c"
                                    onsearchselectevent={onSearchSelectInstitute}
                            ></c-my-app-search-with-dropdown>
                        </lightning-tab>
                        <lightning-tab label="Enter Manually" value="INSTITUTE_MANUAL" onactive={onTabSelectInstitution}>
                            <lightning-input name="otherInstitute"
                                            value={contactQualification.Other_Institution__c}
                                            placeholder="Enter Institution Name"
                                            required="true"
                                            max-length="90"
                                            label="Institution"
                                            onchange={onFieldChange}></lightning-input>
                        </lightning-tab>
                    </lightning-tabset>
                    <lightning-textarea name="researchDescription" 
                                label="If relevant, describe any research components of this course" 
                                data-testid="researchDescription" 
                                data-id="researchDescription"
                                required="true"
                                max-length="1000"
                                onchange={onFieldChange}
                                value={contactQualification.Description__c}>
                            </lightning-textarea>
                <lightning-input name="startDate"
                                    data-testid="startDate" 
                                    data-id="startDate"
                                    label="Commencement Date"
                                    required="true"
                                    type="date"
                                    max={maxDate} 
                                    onchange={onFieldChange}
                                    value={contactQualification.Commencement_Date__c}></lightning-input>
                <label class="slds-p-top_small slds-form-element__label">
                    <abbr class="slds-required" title="required">*</abbr>
                    Have you completed this qualification?
                </label>
                <lightning-radio-group                                 
                                name="qualificationCompleted"
                                data-id="qualificationCompleted"
                                options={yesNoOptions}
                                value={qualificationCompleted}
                                type="radio"
                                onchange={onFieldChange}
                                variant="label-hidden"
                                ></lightning-radio-group>                
                <div if:true={qualificationNotCompleted}>
                    <label class="slds-form-element__label">
                        <abbr class="slds-required" title="required">*</abbr>
                        Do you intend to complete this qualification at the same institution?
                    </label>
                    <lightning-radio-group                                     
                                    name="intendToCompleteWithSameInstitute"
                                    data-id="intendToCompleteWithSameInstitute"
                                    options={yesNoOptions}
                                    value={intendToCompleteWithSameInstitute}
                                    type="radio"
                                    onchange={onFieldChange}
                                    variant="label-hidden"
                                    ></lightning-radio-group> 
                </div> 
                <div if:true={transferToMonashResearch}>
                    <label class="slds-form-element__label">
                        <abbr class="slds-required" title="required">*</abbr>
                        Do you wish to transfer this research project/topic to Monash?
                    </label>
                    <lightning-radio-group                                     
                                    name="transferToMonash"
                                    data-id="transferToMonash"
                                    options={yesNoOptions}
                                    value={transferToMonash}
                                    type="radio"
                                    onchange={onFieldChange}
                                    variant="label-hidden"
                                    ></lightning-radio-group> 
                </div>              
                <lightning-input name="endDate"
                                    required
                                    if:false={continueWithMonash}
                                    data-testid="endDate" 
                                    data-id="endDate"
                                    label={completionWithdrawalDateLabel}
                                    type="date"
                                    onchange={onFieldChange}
                                    value={contactQualification.Completion_Withdrawal_Date__c}></lightning-input>                   

                <template if:true={continueWithMonash}>

                    <div class="slds-m-top_medium sectionContainer">
                        <div class="slds-text-longform sectionContainerBody slds-m-top_medium">
                            <div class="grtParagraph">You will be required to upload the following in the <b>Documents section</b>.</div>
                            <ul class="slds-list_dotted">
                                <li class="grtParagraph">details of your enrolment including periods of part and full time enrolment, any period of leave and a statement from your former institution documenting EFTSL consumed.</li>
                                <li class="grtParagraph">A detailed plan/timetable that clearly indicates
                                    <ul class="slds-list_dotted">
                                        <li class="grtParagraph">all work that needs to be completed and</li>
                                        <li class="grtParagraph">when you expect to submit your thesis</li>
                                    </ul>
                                </li>
                                
                            </ul>
                        </div>
                    </div>
                    <lightning-textarea name="formerSupervisor" 
                                label="Former Supervisor/head of
                                        department contact details (Please
                                        also provide names and roles of
                                        anyone you do not wish us to
                                        contact regarding this research
                                        program)" 
                                data-testid="formerSupervisor" 
                                data-id="formerSupervisor"
                                required="true"
                                max-length="500"
                                onchange={onFieldChange}
                                value={contactQualification.Former_Supervisor_Details__c}>
                            </lightning-textarea>
                        <lightning-textarea name="formerThesisTopic" 
                                    label="Former Thesis Topic" 
                                    data-testid="formerThesisTopic" 
                                    data-id="formerThesisTopic"
                                    max-length="1000"
                                    onchange={onFieldChange}
                                    value={contactQualification.Former_Thesis_Topic__c}>
                                </lightning-textarea>
                        <lightning-textarea name="reasonForTransfer" 
                                    label="Reasons for transfer" 
                                    data-testid="reasonForTransfer" 
                                    data-id="reasonForTransfer"
                                    required="true"
                                    max-length="500"
                                    onchange={onFieldChange}
                                    value={contactQualification.Reasons_for_transfer__c}>
                                </lightning-textarea>
                        <lightning-textarea name="additionalDescription" 
                                    label="Please indicate if you will be
                                            continuing with the same area of
                                            research and how much of your prior
                                            research is relevant to your
                                            proposed enrolment" 
                                    data-testid="additionalDescription" 
                                    data-id="additionalDescription"
                                    max-length="1000"
                                    onchange={onFieldChange}
                                    value={contactQualification.Transfer_Description__c}>
                                </lightning-textarea>
                    </template>
            </div>
            
            <div class="slds-form-element slds-p-vertical--large">
                <div class="slds-m-top_medium">                    
                    <button class="primaryButton" onclick={saveCurrentQualification} style="margin-right: 15px;">
                        Save
                    </button>
                    <button class="secondaryButton" onclick={onClickCancel}>
                        Cancel
                    </button>
                </div>
            </div>
        </div>
        </div>
    </div>
    <lightning-spinner if:true={showSpinner} alternative-text="Saving" variant="brand"></lightning-spinner>
</template>
