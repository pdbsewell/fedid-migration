<template>
    <div class="slds-p-around_medium lgc-bg-inverse slds-align_absolute-center">
        <lightning-button variant="inverse" label="Defer Offer" title="Defer Offer action" class="slds-m-left_x-small" onclick={openModal}></lightning-button>
    </div>
    <template if:true={isModalOpen}>
        <!-- Modal/Popup Box LWC starts here -->
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container">
                <!-- Modal/Popup Box LWC header here -->
                <header class="slds-modal__header" style="padding:0px">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeModal}>
                        <lightning-icon icon-name="utility:close"
                            alternative-text="close"
                            variant="inverse"
                            size="small" ></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                </header>
                <!-- Modal/Popup Box LWC body starts here -->
                <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1" if:true={oppty} style="height:73%">
                    <c-offer-wizard record-id={oppty.PrimaryContact__c} is-deferral="true" offer-category={oppty.Offer_Category__c}></c-offer-wizard>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
