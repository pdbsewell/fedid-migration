<template>
    <article class={cardClass} style="box-shadow: 0 2px 2px 0 rgba(0, 0, 0, 0.10);" onclick={toggleSelected}>
        <div class="slds-card__header slds-grid">
            <header class="slds-media slds-media_center slds-has-flexi-truncate">
                <div class="slds-media__body">
                    <div class="slds-card__header-title" style="text-decoration: none;">                        
                        <lightning-layout multiple-rows>
                            <lightning-layout-item size="12">     
                                <b>{contact.Person_ID_unique__c}</b>                                      
                            </lightning-layout-item>
                            <lightning-layout-item size="12">        
                                Last Name: <b>{contact.LastName}</b>
                            </lightning-layout-item>
                            <lightning-layout-item size="12">        
                                First Name: <b>{contact.FirstName}</b>
                            </lightning-layout-item>
                        </lightning-layout>
                    </div>
                </div>
            </header>
        </div>
        <div class="slds-card__body slds-card__body_inner">
            <!-- card body 
            <div class="slds-text-body_regular">
                <lightning-layout multiple-rows>
                    <lightning-layout-item size="12">
                        <lightning-layout>
                            <lightning-layout-item size="4">Name:</lightning-layout-item>
                            <lightning-layout-item size="8">{contact.Name}</lightning-layout-item>
                        </lightning-layout>                                                                        
                    </lightning-layout-item>
                </lightning-layout>
            </div>
            -->
        </div>
    </article>
</template>
