<template>
    <div class="acp-title">
        <p style="font-size:14px;">{acp.acpNumber} - {acp.courseTitle}</p>
        <p>Course Offering: <strong>{acp.courseOfferingCommercementPeriod}</strong></p>
    </div>
    <div class="acp-form">
        <div class="slds-form-element">
            <label class="slds-form-element__label">Credit: New Course Duration</label>
            <div class="slds-form-element__control slds-input-has-fixed-addon">
                <input type="number" class="slds-input" value={acp.adjustedCourseDuration} onchange={handleCourseDurationChange} min="0">
                <span class="slds-form-element__addon">Month or Year</span>
            </div>
        </div>
        <lightning-input type="number" name="rpPoints" label="Credit: Approved Credit Points" value={acp.approvedCreditPoints} min="0" maxlength="3" onchange={handleApprovedCreditPointsChange}></lightning-input>
        <lightning-input type="date" name="startdate" label="Revised Start Date" value={acp.revisedStartDate} onchange={handleRevisedStartDateChange} required></lightning-input>
        <lightning-input type="date" name="enddate" label="Revised End Date" value={acp.revisedEndDate} onchange={handleRevisedEndDateChange} required></lightning-input>
    </div>
</template>
