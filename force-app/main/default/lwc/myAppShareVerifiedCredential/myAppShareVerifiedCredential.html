<template>
    <!-- Modal section -->
    <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open" aria-modal="true">
        <div if:false={showFinalMessage} class="slds-modal__container">
            <!-- Modal header -->
            <header class="slds-modal__header">
                <h2 class="slds-text-heading_medium slds-hyphenate">Share Verified Digital Documents</h2>
            </header>
            <!-- Modal content -->
            <div class="slds-modal__content slds-p-around_medium" style="overflow: initial;">
                <lightning-layout multiple-rows="true">
                    <!-- Select provider dropdown -->
                    <lightning-layout-item lwc:if={hasMoreThanOneProvider} size="12" class="slds-m-bottom_medium">
                        <div class="digitary-provider-dropdown-label">Please select your online credential provider:</div>
                        <lightning-select id="selectProvider"
                                          class="digitary-provider-dropdown"
                                          value={selectedProviderOption}
                                          options={providerOptions}
                                          variant="label-hidden"
                                          onchange={onSelectProvider}>
                        </lightning-select>
                    </lightning-layout-item>
                    <lightning-layout-item size="12">
                        <div class="slds-m-top_small slds-m-bottom_large">
                            You're about to be taken to a new tab to share your documents through a trusted credential
                            provider.
                        </div>
                        Here's what to do next:
                        <ol class="slds-list_ordered">
                            <li>Log into <a href={selectedCredentialProvider.providerUrl} target="_blank">{selectedCredentialProvider.provider}</a></li>
                            <template if:true={extraInstruction}><li>{extraInstruction}</li></template>
                            <li>Copy the&nbsp;
                                <template if:false={checklistItemName}>
                                    Application Id
                                </template>
                                <template if:true={checklistItemName}>
                                    Document Checklist Id
                                </template>
                                &nbsp;below and paste it to the <b>Monash Reference Id</b> field when submitting your document on the {selectedCredentialProvider.provider} website.
                                <lightning-layout vertical-align="center" class="slds-m-top_medium">
                                    <!-- Display applicationName or checklistItemName based on condition -->
                                    <lightning-layout-item>
                                        <a href="javascript:void(0);" onclick={copyToClipboard}><b>{monashReferenceId}</b></a>
                                    </lightning-layout-item>

                                    <!-- Lightning icon for the copy icon -->
                                    <lightning-layout-item class="slds-m-right_small slds-m-bottom_small">
                                        <lightning-icon icon-name="utility:copy" alternative-text="Copy" size="small"
                                                        class="slds-m-left_xx-small"></lightning-icon>
                                    </lightning-layout-item>

                                    <!-- Link for Copy to Clipboard -->
                                    <lightning-layout-item>
                                        <a href="javascript:void(0);" onclick={copyToClipboard}>
                                            <b>Copy to Clipboard</b>
                                        </a>
                                    </lightning-layout-item>
                                </lightning-layout>
                            </li>
                            <li>Check the box below when you've released your qualification documents. {noteText}
                                <!-- Confirmation checkbox -->
                                <lightning-input
                                    type="checkbox"
                                    class="slds-m-vertical_small digitary-confirm-checkbox"
                                    value={isDocumentReleaseConfirmed}
                                    label={confirmReleaseCheckboxLabel}
                                    onclick={handleConfirmReleaseClick}>
                                </lightning-input>
                            </li>
                        </ol>
                    </lightning-layout-item>
                </lightning-layout>
            </div>
            <!-- Modal footer -->
            <footer class="slds-modal__footer">
                <lightning-layout>
                    <!-- Cancel button -->
                    <lightning-layout-item alignment-bump="left">
                        <lightning-button label="Cancel" title="Cancel"
                                          onclick={handleDigitaryModalCancel}></lightning-button>
                    </lightning-layout-item>
                </lightning-layout>
            </footer>
        </div>

        <!-- Final Section -->
        <div if:true={showFinalMessage} class="slds-modal__container">
            <!-- Modal content -->
            <div class="slds-modal__content slds-p-around_medium" style="overflow: initial;">
                <br/>
                All set! Once we received your document from {selectedCredentialProvider.provider}, it will appear
                in the Documents section.
                <br/><br/>
                You can now close this windows and continue with your applicaiton.
                <br/><br/>
            </div>
            <!-- Modal footer -->
            <footer class="slds-modal__footer">
                <lightning-layout>
                    <!-- Exit button -->
                    <lightning-layout-item alignment-bump="left">
                        <lightning-button class="slds-m-left_x-small" variant="brand" label="Exit"
                                          onclick={handleDigitaryModalOkay}></lightning-button>
                    </lightning-layout-item>
                </lightning-layout>
            </footer>
        </div>
    </section>
    <!-- Modal backdrop -->
    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
