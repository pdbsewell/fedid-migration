<!-- sldsValidatorIgnore -->
<template>
    <div class="slds-is-relative">
        <!-- spinner -->
        <template if:true={showSpinner}> 
            <lightning-spinner alternative-text="Loading" class="spins" variant="brand" size="medium"></lightning-spinner>
        </template>
        <!-- content -->
        <lightning-card title="Portal Info" icon-name="standard:customer_portal_users">
            <template if:true={hasRecords}>
                <lightning-button label="Reset Security" slot="actions" onclick={showConfirmation}
                    disabled={disabledResetPassword}>
                </lightning-button>

                <div class="slds-m-around_small slds-list_horizontal">
                    <div class="slds-grid slds-wrap">
                        <!-- Username -->
                        <div class="slds-col slds-size_12-of-12">
                            <p class="slds-text-heading_small"><b>Username</b></p>
                        </div>                    
                        <div class="slds-col slds-size_12-of-12">
                            <template if:true={isActive}>
                                <lightning-badge label="Active" class="slds-m-around_xx-small slds-theme_success"></lightning-badge>
                            </template>
                            <template if:false={isActive}>
                                <lightning-badge label="Inactive" class="slds-m-around_xx-small slds-theme_error"></lightning-badge>
                            </template>
                            <lightning-formatted-text
                                class="slds-text-heading_small slds-truncate"
                                value={username}></lightning-formatted-text>
                        </div>
                        <!-- MFA number -->
                        <template if:true={mobileNumber}>
                            <div class="slds-col slds-size_12-of-12">
                                <p class="slds-text-heading_small"><b>MFA Mobile Number</b></p>
                            </div>         
                            <div class="slds-col slds-size_12-of-12">
                                <template if:true={mobileNumberVerified}>
                                    <lightning-badge label="Verified" class="slds-m-around_xx-small slds-theme_success"></lightning-badge>
                                </template>
                                <template if:false={mobileNumberVerified}>
                                    <lightning-badge label="Unverified" class="slds-m-around_xx-small slds-theme_error"></lightning-badge>
                                </template>
                                <!--<lightning-formatted-text
                                    class="slds-text-heading_small slds-truncate"
                                    value={mobileNumber}></lightning-formatted-text>-->   
                            </div>
                        </template>
                    </div>
                </div>

                <div class="slds-border_top slds-m-bottom_medium"></div>
                <template for:each={experiences} for:item="exp">
                    <lightning-badge key={exp.id} label={exp.name} class="slds-m-left_x-small slds-m-bottom_x-small">
                    </lightning-badge>
                </template>
            </template>
            <template if:false={hasRecords}>
                <div class="slds-border_top"></div>
                <div class="slds-m-left_small slds-p-top_small">
                    <lightning-formatted-text class="slds-text-color_success slds-text-align_left" value={footerMessage}>
                    </lightning-formatted-text>
                </div>
            </template>
        </lightning-card>
        <template if:true={isModalOpen}>
            <div class="slds-modal slds-fade-in-open slds-backdrop">
                <div class="slds-modal__container">
                    <div class="slds-modal__header">
                        <lightning-button-icon label="Close" icon-name="utility:close" alternative-text="Close this window"
                            size="large" variant="bare-inverse" onclick={closeModal} class="slds-modal__close">
                        </lightning-button-icon>
                        <h2 class="slds-text-heading_medium">Confirm Security Reset</h2>
                        <p class="slds-m-top_x-small">Resetting a user's security will reset their password and MFA Mobile Number for all the communities that they have access to.</p>
                        <p class="slds-m-top_x-small">Do you wish to continue?</p>
                    </div>
                    <div class="slds-modal__content slds-p-around_small" style="overflow: visible;">
                        <lightning-combobox name="template"
                                            label="Password Reset Email Template"
                                            value={selectedTemplate}
                                            placeholder="Select Reset Password Email Template"
                                            options={experiencesOptions}
                                            onchange={handleTemplateChange} 
                                            variant="label-hidden">
                        </lightning-combobox>
                    </div>
                    <div class="slds-modal__footer">
                        <lightning-button icon-name="utility:close" label="Close" onclick={closeModal}
                            class="slds-m-left_x-small">
                        </lightning-button>
                        <lightning-button icon-name="utility:reset_password" label="Reset" variant="brand"
                            onclick={handleResetPassword} class="slds-m-left_x-small" disabled={disabledResetPasswordConfirmation}>
                        </lightning-button>
                    </div>
                </div>
            </div>
        </template>
    </div>
</template>
