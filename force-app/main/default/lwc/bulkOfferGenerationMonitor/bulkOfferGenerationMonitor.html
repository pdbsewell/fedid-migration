<template>
    <div class="slds-text-heading_medium">Bulk Offer Generation Monitor</div>
    <div>
        <div class="slds-size_1-of-1" style="margin:10px">
            <lightning-button label="Start" onclick={startBulkBatch} class="slds-m-top_medium slds-size_1-of-1" variant="brand" icon-name="utility:play" disabled={disableBtn}></lightning-button>
        </div>
        <template if:true={jobs}>
            <template for:each={jobs} for:item="job">
                <div key={job.Id} class="slds-size_1-of-1">
                    Job# : {job.Id} - <lightning-formatted-date-time value={job.CreatedDate} year="numeric" month="numeric" day="numeric" hour="2-digit"
                    minute="2-digit" time-zone-name="short" hour12="true"></lightning-formatted-date-time> - {job.TotalJobItems} record(s)
                    <lightning-progress-bar value={job.progressValue} size="large" variant="circular"></lightning-progress-bar>
                </div>
            </template>
        </template>
    </div>
</template>
