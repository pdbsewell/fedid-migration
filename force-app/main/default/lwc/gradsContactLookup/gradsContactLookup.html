<template>
    <div class="slds-form-element">
        <template lwc:if={label}>
            <label class="slds-form-element__label" for="combobox-input">
                <abbr class="slds-required" title="required">* </abbr>{label}
            </label>
        </template>
        <div class="slds-form-element__control">
            <div class="slds-combobox_container">
                <div aria-expanded={isDropdownOpen}
                     class={comboboxClass}
                     role="combobox">
                    <div class="slds-combobox__form-element slds-input-has-icon"
                         role="none">
                        <!-- Input for searching -->
                        <template if:false={hasSelectedRecord}>
                            <div class="slds-input-has-icon slds-input-has-icon_right">
                                <input autocomplete="off"
                                       class="slds-input slds-combobox__input"
                                       data-id="combobox-input"
                                       id="combobox-input"
                                       onblur={handleBlur}
                                       onfocus={handleFocus}
                                       onkeyup={handleKeyUp}
                                       onkeydown={handleKeyDown}
                                       placeholder="Search..."
                                       role="textbox"
                                       type="text"
                                       >
                                <lightning-icon class="slds-input__icon slds-input__icon_right"
                                                icon-name="utility:search"
                                                size="x-small">
                                </lightning-icon>
                            </div>
                        </template>

                        <!-- Selected value display -->
                        <template if:true={hasSelectedRecord}>
                            <div class="slds-input-has-icon slds-input-has-icon_right">
                                <input class="slds-input slds-combobox__input"
                                       data-id="combobox-readonly-input"
                                       readonly
                                       type="text"
                                       value={selectedRecordDisplay}
                                       onkeydown={handleSelectedKeyDown}
                                       required
                                />
                                <button class="slds-button slds-button_icon slds-input__icon slds-input__icon_right"
                                        onclick={handleClearSelection}
                                        title="Remove selected record">
                                    <lightning-icon class="slds-button__icon"
                                                    icon-name="utility:close"
                                                    size="x-small">
                                    </lightning-icon>
                                </button>
                            </div>
                        </template>
                    </div>

                    <!-- Dropdown -->
                    <div class="slds-dropdown slds-dropdown_length-with-icon-7 slds-dropdown_fluid" role="listbox">
                        <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                            <template if:true={hasResults}>
                                <template for:each={searchResults} for:item="record">
                                    <li class="slds-listbox__item" key={record.Id} role="presentation">
                                        <div
                                             data-id={record.Id}
                                             data-person-id={record.Person_ID_unique__c}
                                             onclick={handleRecordSelect}
                                             role="option"
                                             aria-selected={record.isSelected}
                                             class={record.listboxOptionClass}
                                        >
                                            <span class="slds-media__body">
                                                <span class="slds-listbox__option-text">
                                                    {record.Person_ID_unique__c} | {record.Name} | {record.Email}
                                                </span>
                                            </span>
                                        </div>

                                    </li>
                                </template>
                            </template>
                            <template lwc:if={isFetching}>
                                <li class="slds-listbox__item" role="option">
                                    <div class="slds-align_absolute-center slds-p-top_medium">
                                        <div class="slds-spinner slds-spinner_x-small slds-spinner_inline"
                                             role="status">
                                            <span class="slds-assistive-text">Loading</span>
                                            <div class="slds-spinner__dot-a"></div>
                                            <div class="slds-spinner__dot-b"></div>
                                        </div>
                                    </div>
                                </li>
                            </template>
                            <template lwc:elseif={hasNoResults}>
                                <li class="slds-listbox__item" role="presentation">
                                    <div class="slds-media slds-listbox__option slds-listbox__option_plain"
                                         role="option">
                                        <span class="slds-media__body">No results found</span>
                                    </div>
                                </li>
                            </template>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
