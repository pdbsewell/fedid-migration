<template>
    <!--<c-ao-form-header-comp></c-ao-form-header-comp>-->
    <template lwc:if={isLoading} style="height: 200px; position:relative">
        <lightning-spinner variant="brand" size="medium" alternative-text="loading..."></lightning-spinner>
    </template>
    <lightning-card  title="Report/Export Form Submissions">
        <lightning-button label="Export" variant="brand" onclick={handleExport} slot="actions" disabled={disableExport}></lightning-button>
        <div class="slds-grid slds-wrap slds-p-top_small">
           <!-- <div class="slds-col slds-size_2-of-12">
                <span>Search Forms</span>
            </div>-->
            <div class="slds-col slds-size_3-of-12 slds-m-left_x-large">
                <c-aosearchablepicklist lwc:ref="yearPL" options={yearValues} class="required-input1" required=true field-label="Select Year" placeholder="--Select--" onchange={handleYearChange}></c-aosearchablepicklist>
            </div>
            
            
            <div class="slds-col slds-size_3-of-12 slds-m-left_x-large">
                <c-aosearchablepicklist lwc:ref="programPL" options={programOptions} class="required-input" required=true field-label="Select Program" placeholder="--Select--" onchange={handleOnChange} ></c-aosearchablepicklist>
            </div>
           
            <div class="slds-col slds-size_3-of-12 slds-m-left_x-large">
                <c-aosearchablepicklist lwc:ref="formPL" options={formOptions} class="required-input" required=true field-label="Select Form" placeholder="--Select--" onchange={handleOnFormChange}></c-aosearchablepicklist> 
            </div>
            <div class="slds-col slds-size_3-of-12 slds-m-left_x-large">
                <c-aosearchablepicklist lwc:ref="statusPL" options={statusOptions} field-label="Select Status" placeholder="--Select--" onchange={handleStatusChange} disabled={enableStatus}></c-aosearchablepicklist>
            </div>
            <div class="slds-col slds-size_3-of-12 slds-m-left_x-large">
                <lightning-input type="Date" name="fromDateInput" 
                    label= "From Date"
                    onchange={handleDateChange}
                    value={fromDateValue}
                    field-level-help="Select Date Range"
                    date-style="short" >
                </lightning-input>
            </div>
            <div class="slds-col slds-size_3-of-12 slds-m-left_x-large">
                <lightning-input type="Date" name="toDateInput" 
                    label= "To Date"
                    onchange={handleDateChange}
                    value={toDateValue}
                    field-level-help="Select Date Range"
                    class="date-format-hide"
                    date-style="short" >
                </lightning-input>
            </div>
            <div class="slds-col slds-size_3-of-12 slds-m-left_x-large slds-m-top_large">
                <lightning-button
                variant="brand"
                label="Search"
                title="search"
                onclick={handleSearchClick}
                class="slds-m-left_x-small"
              ></lightning-button>
            </div>
        </div>
        <br/>
        <hr></hr>
            <template lwc:if={displaySearch}>
                <div class="slds-grid slds-wrap" style="flex-direction:row-reverse;">
                    <div class="slds-col slds-size_3-of-12 slds-m-right_x-large slds-m-top_large">
                        <lightning-input type="search" name="searchKeyword" placeholder="filter table by keyword"
                            label= "Search"
                            onchange={handleSearchKeyword}
                            value={searchKeyword}
                            variant="label-hidden"
                            >
                        </lightning-input>
                    </div>
                </div>
            </template>
            <template lwc:if={displayDT}>
            <br/>
                    <lightning-datatable 
                        key-field               = "Id"
                        data                    = {recordsToDisplay} 
                        columns                 = {customDT.columns}
                        show-row-number-column  = {customDT.showRowNumberColumn}
                        onsort                  = {handleSort}
                        sorted-by               = {sortField}
                        sorted-direction        = {sortDirection}
                        default-sort-direction  = {sortDirection}
                        hide-checkbox-column
                    ></lightning-datatable>
            
            <div class="slds-grid slds-grid_vertical-align-center slds-grid_align-spread" style="padding-top: 0.5em;">
                <!--RECORDS PER PAGE-->
                <div class="slds-col">
                    <div class="slds-list_inline slds-p-bottom_xx-small">
                        <label class="slds-text-color_weak slds-p-horizontal_x-small" for="recordsPerPage">Page Size:</label>
                        <div class="slds-select_container">
                            <select class="slds-select" id="recordsPerPage" onchange={handleRecordsPerPage}>
                                <template for:each={pageSizeOptions} for:item="option">
                                    <option key={option} value={option}>{option}</option>
                                </template>
                            </select>
                        </div>
                    </div>
                </div>
                <!--PAGE NAVIGATION-->
                <div class="slds-align_absolute-center" style="height:5rem">
                    <lightning-button disabled={disableFirstButton} icon-name="utility:jump_to_left" label="First" class="slds-p-horizontal_x-small" alternative-text="first page" onclick={firstPage}></lightning-button>
                    <lightning-button disabled={disableFirstButton} icon-name="utility:chevronleft" label="Previous" alternative-text="Previous" onclick={previousPage}></lightning-button>
                    &nbsp;
                    <span class="slds-badge">Showing {pageNumber} &nbsp;of&nbsp; {totalPages} &nbsp;&nbsp;Page(s)</span>
                    &nbsp;
                    <lightning-button disabled={disableLastButton} icon-name="utility:chevronright" label="Next" alternative-text="Next" onclick={nextPage} class="slds-p-horizontal_x-small" icon-position="right"></lightning-button>
                    <lightning-button disabled={disableLastButton} icon-name="utility:jump_to_right" label="Last" alternative-text="last page" onclick={lastPage} icon-position="right"></lightning-button>
                </div>
                <!--TOTAL RECORDS-->
                <div class="slds-clearfix">
                    <div class="slds-float_right">
                        <span class="slds-badge"> Total Records: {totalRecords}</span>
                    </div>
                </div>
            </div>
        </template>
        <template lwc:if={displayError}>
            <p class="noRecord">No Record Found</p>
        </template>
        <p slot="footer"></p>
    </lightning-card>
    
</template>
