<template>
    <div class="offer-details-div">
        <template if:true={loading}>
            <lightning-spinner alternative-text="Loading"></lightning-spinner>
        </template>
        <div if:true={hasRendered}>
            <div for:each={elements} for:item="elem" key={elem.Id}>
                <lightning-formatted-rich-text value={elem.description} class="rich-text"></lightning-formatted-rich-text>
                <br/><br/><br/>
            </div>
        </div>
    </div>
</template>
