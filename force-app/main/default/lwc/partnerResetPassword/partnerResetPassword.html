<template>
    <template if:true={resourcesReady}>
        <div class="slds-is-relative slds-grid slds-grid_vertical-align-center slds-grid_align-center" style="background-color:#91B1CE;">
            
            <div class="resetPasswordFrame">
                <div class="resetPasswordForm slds-p-horizontal_large slds-m-horizontal_medium slds-p-vertical_medium">
                    <!-- initial view -->
                    <template if:false={showResetPasswordSuccessNotification}>
                        <lightning-layout multiple-rows>
                            <!-- header -->
                            <lightning-layout-item size="12">
                                <div>
                                    <div style="font-family:'Roboto Condensed', sans-serif; font-size: 40px; line-height: 50px;">
                                        RESET YOUR PASSWORD
                                    </div>
                                    <div class="slds-m-top_small" style="color: #707070;"> 
                                        This will get you back on track quickly.
                                    </div>
                                </div>
                            </lightning-layout-item>
                            <!-- login form -->
                            <lightning-layout-item size="12">
                                <div style="font-family:'Roboto', sans-serif; font-size: 15px; color: #707070;">
                                    <!-- error notification -->
                                    <template if:true={credsError}>
                                        <div style="font-family:'Roboto', sans-serif; font-size: 13px; color: #EE0220;" class="slds-m-top_x-small slds-m-bottom_x-small">                                        
                                            {credsError}
                                        </div>
                                    </template>
                                    <!-- no-error padding -->
                                    <template if:false={credsError}>
                                        <div style="font-family:'Roboto', sans-serif; font-size: 13px; color: #EE0220;" class="slds-m-top_medium"></div>
                                    </template>

                                    <!-- Email -->
                                    <div class="slds-form-element">
                                        <label for="email_field"><b>Username</b></label>
                                        <div class="slds-form-element__control">
                                            <lightning-input class="emailField inputField corneredInput"
                                                placeholder="example@email.com"
                                                type="email" 
                                                name="email_field" 
                                                label="Email"
                                                variant="label-hidden"
                                                value={username}
                                                onchange={changeUsername}
                                                onkeypress={handleKeyPress}
                                                message-when-type-mismatch="Please use the right email address format, for example 'email@domain.com'.">
                                            </lightning-input>
                                            <template if:true={usernameError}>                                                
                                                <span style="font-family:'Roboto', sans-serif; font-size: 13px; color: rgb(194, 57, 52);">
                                                    {usernameError}
                                                </span>
                                            </template>
                                        </div>
                                    </div>
                                    <div class="slds-float_left" style="width: 45%; margin-right: 5%;">
                                        <button class="btn btn--blue applicationAction slds-p-vertical_xx-small slds-m-top_small" style="width: 100%; border: 2px solid #0E6EAC; background-color: #fff; color: #0E6EAC; font-size: 15px;" onclick={redirectLogin}>
                                            <b>Return to login</b>
                                        </button>
                                    </div>
                                </div> 
                            </lightning-layout-item>
                            <lightning-layout-item size="12">
                                <div>
                                    <c-recaptcha-button data-id="crmcaptchabuttonlwc" buttontext={buttonText} onbuttonclicked={handleButtonClick}></c-recaptcha-button>
                                </div>
                            </lightning-layout-item>
                        </lightning-layout>   
                    </template>
                    <!-- success view -->
                    <template if:true={showResetPasswordSuccessNotification}>
                        <lightning-layout multiple-rows>
                            <!-- header -->
                            <lightning-layout-item size="12">
                                <div>
                                    <div style="font-family:'Roboto Condensed', sans-serif; font-size: 40px; line-height: 50px;">
                                        SUCCESS!
                                    </div>
                                    <div class="slds-m-top_small" style="font-family:'Roboto Condensed', sans-serif; font-size: 20px; color: #707070;"> 
                                        An email has been sent to the email address associated to the account with the username: <a style="text-decoration: none;">{username}</a> with further instructions.
                                    </div>
                                </div>
                            </lightning-layout-item>
                            <!-- notification -->
                            <lightning-layout-item size="12">
                                <div class="slds-m-top_medium" style="font-family:'Roboto Condensed', sans-serif; font-size: 20px;">
                                    <span style="font-weight: bold;">No email from us?</span>
                                    <div style="color: #707070;">
                                        <lightning-layout multiple-rows>
                                            <lightning-layout-item size="1">
                                                <center>•</center>
                                            </lightning-layout-item>
                                            <lightning-layout-item size="11">
                                                Make sure the email you provided was correct
                                            </lightning-layout-item>
                                            <lightning-layout-item size="1">
                                                <center>•</center>
                                            </lightning-layout-item>
                                            <lightning-layout-item size="11">
                                                Check your spam folder
                                            </lightning-layout-item>
                                            <lightning-layout-item size="1">
                                                <center>•</center>
                                            </lightning-layout-item>
                                            <lightning-layout-item size="11">
                                                If you have not received an email within 30 minutes, do not hesitate to <a href="https://www.monash.edu/connect" target="_blank" style="text-decoration: none;">contact us</a> for assistance.
                                            </lightning-layout-item>
                                        </lightning-layout>
                                    </div>
                                </div>
                                <center>
                                    <button class="btn btn--blue applicationAction slds-p-vertical_xx-small slds-m-top_small" style="width: 45%; margin-right: 5%; border: 2px solid #0E6EAC; background-color: #fff; color: #0E6EAC; font-size: 15px;" onclick={redirectLogin}>
                                        <b>Return to login</b>
                                    </button>
                                </center>
                            </lightning-layout-item>
                        </lightning-layout>
                    </template>
                </div>
            </div>
        </div>
    </template>
</template>
