<template>
    <template if:false={clauses}>
        <lightning-spinner alternative-text="Loading"></lightning-spinner>
    </template>
    <template if:true={hasClauses}>
        <b>{label}</b>
        <ul>
            <div for:each={clauses} for:item="clause" key={clause.Id}>
                <li>
                    <lightning-formatted-rich-text value={clause.APXT_Redlining__Clause_Revision__r.APXT_Redlining__Clause__r.APXT_Redlining__Text__c}></lightning-formatted-rich-text>
                </li>
            </div>
        </ul>
    </template>
</template>
