<template>
    <template if:true={attachmentId}>
        <div class="wrapper">
            <iframe src="/resource/pdfjs/web/viewer.html" onload={onLoad}></iframe>
        </div>
    </template>
    <template if:false={attachmentId}>
        <lightning-spinner alternative-text="Loading"></lightning-spinner>
        PDF File cannot be displayed
    </template>
</template>
