<template>
    <template if:true={message}>
        {message}
    </template>
    <div class="slds-is-relative">
        <!-- added the shadow manually for internal view component inside a tab issue -->
        <article class="slds-card slds-card_boundary" style="box-shadow: 0 2px 2px 0 rgba(0, 0, 0, 0.10);">
            <template if:true={checklistItem}>                
                <div class="slds-card__header slds-grid">
                    <header class="slds-media slds-media_center slds-has-flexi-truncate">
                        <div class="slds-media__body">
                            <span class="slds-card__header-title">
                                <lightning-layout vertical-align="center">

                                    <!-- toggle  -->      
                                    <lightning-layout-item>
                                        <div onclick={handleDocumentsSectionClick} class={documentsToggleDistance} style="cursor: pointer;">                        
                                            <template if:true={isDocumentSelected}>
                                                <lightning-icon icon-name="utility:chevrondown" size={documentsToggleSize}></lightning-icon>
                                            </template>
                                            <template if:false={isDocumentSelected}>
                                                <lightning-icon icon-name="utility:chevronright" size={documentsToggleSize}></lightning-icon>
                                            </template>
                                        </div>
                                    </lightning-layout-item>

                                    <!-- checklist header icon -->                           
                                    <template if:false={isOtherChecklist}>
                                        <lightning-layout-item>
                                            <!-- show if tagged as Submitted -->
                                            <template if:true={isSubmitted}>
                                                <lightning-icon icon-name="standard:task" size={headerIconSize}></lightning-icon>
                                            </template>
                                            <!-- show if tagged as Requested -->
                                            <template if:true={isRequested}>
                                                <lightning-icon icon-name="utility:warning" variant="warning" size={headerIconSize}></lightning-icon>
                                            </template>
                                            <!-- show if tagged as insufficient -->
                                            <template if:true={isInsufficient}>
                                                <lightning-icon icon-name="utility:warning" variant="warning" size={headerIconSize}></lightning-icon>
                                            </template>
                                            <!-- show if tagged as not required -->
                                            <template if:true={isNotRequired}>
                                                <lightning-icon icon-name="utility:unlinked" size={headerIconSize}></lightning-icon>
                                            </template>    
                                        </lightning-layout-item>
                                    </template>     

                                    <!-- checklist header -->
                                    <lightning-layout-item>   
                                        <!-- assessor - non-other -->  
                                        <template if:false={isOtherChecklist}>
                                            <p class="slds-text-link slds-m-left_x-small" 
                                                style="cursor: pointer; text-decoration: none;" 
                                                onclick={navigateToChecklistItem}>
                                                {checklistItem.fields.Checklist_Requirement__c.value}
                                            </p>
                                            <template if:true={isCredentialProviderAvailable}>
                                                <p class="slds-m-left_x-small">(Document Checklist Id: {checklistItemName})</p>
                                            </template>
                                        </template>
                                        <!-- assessor - other -->  
                                        <template if:true={isOtherChecklist}>
                                            <p class="slds-m-left_x-small">{checklistItem.fields.Checklist_Requirement__c.value}</p>
                                        </template>
                                    </lightning-layout-item>
                                    <lightning-layout-item alignment-bump="left">
                                        
                                    </lightning-layout-item>
                                </lightning-layout>
                            </span>
                        </div>
                        <div class="slds-no-flex slds-float_right">
                            <div style="float: right;">
                                <!-- comments notification -->
                                <template if:true={commentNotification}>
                                    <lightning-badge class={commentNotificationClass} label={commentNotification} onclick={showCommentsWindow}></lightning-badge>
                                </template>
                                <template if:false={isOtherChecklist}>
                                    <lightning-button-menu alternative-text="Actions" icon-size="small" menu-alignment="right" onselect={handleMenuAction} variant="border-filled">
                                        <lightning-menu-item value="RequestDocs" label="Request Documents"></lightning-menu-item>
                                        <template if:false={isNotRequired}>
                                            <lightning-menu-item value="MarkNotRequired" label="Mark as Not Required"></lightning-menu-item>
                                        </template>
                                        <lightning-menu-item value="UploadFile" label="Upload File"></lightning-menu-item>
                                    </lightning-button-menu>
                                </template>
                            </div>
                        </div>
                    </header>
                </div>
                <div class="slds-card__body slds-card__body_inner slds-border_top slds-is-relative">    
                    <!-- On documents toggle -->
                    <template if:true={isDocumentSelected}>
                        <!-- show document details -->
                        <template if:true={documentItems}>

                            <!-- show if there are results -->
                            <template if:true={hasDocumentItems}>
    
                                <lightning-layout multiple-rows="true" padding="horizontal-small" class="slds-m-top_xx-small">
                                    <template for:each={documentItems} for:item='documentItem'>
                                        <lightning-layout-item flexibility="auto" size={fileColumnCount} key={documentItem.contactDocumentId}>

                                            <!-- Show ui for file card -->
                                            <c-document-checklist-assessment-internal-file-card document-details={documentItem} 
                                                            onrefreshdocumentitem={hideFileUploadWindow} 
                                                            application-status={applicationStatus} 
                                                            onfilepreview={onFilePreview}>
                                            </c-document-checklist-assessment-internal-file-card>        
    
                                        </lightning-layout-item>
                                    </template>
                                </lightning-layout>
    
                            </template>

                            <!-- show if there are no results -->
                            <template if:false={hasDocumentItems}>                
                                <template if:false={documentItemId}>
                                    <div class="slds-m-top_x-small">
                                        <span class="slds-m-left_x-small">No Uploaded Documents</span>
                                    </div>
                                </template>
                            </template>
                        </template>
                    </template>              
                </div> 
            </template>  
            <template if:false={checklistItem}>                
                <template if:false={retrieveContactQualLoaded}>
                    <!-- Loading spinner while retrieving checklist item -->
                    <c-document-checklist-assessment-internal-loader loader-count="3"></c-document-checklist-assessment-internal-loader>
                </template>            
                <template if:true={retrieveContactQualLoaded}>
                    <div class="slds-notify slds-notify_alert slds-theme_alert-texture" role="alert" style="min-height: 100px;">
                        <lightning-icon icon-name="utility:warning" alternative-text="Warning!" variant="warning"></lightning-icon>
                        <h2 class="slds-text-heading_medium slds-m-left_x-small" style="color: #080707;">
                            No checklist item found
                        </h2>
                    </div>               
                </template>          
            </template>
        </article>        
    </div>    

    <!-- file upload -->
    <template if:true={showFileUploader}>
        <c-document-checklist-assessment-internal-file-upload onclose={hideFileUploadWindow} 
                                    oncancel={cancelFileUploadWindow} 
                                    checklist={checklistItem} 
                                    onfilepreview={onFilePreview} 
                                    application-status={applicationStatus}>
        </c-document-checklist-assessment-internal-file-upload>
    </template>
    
    <!-- comments -->
    <template if:true={showComments}>
        <c-document-checklist-assessment-internal-comment-list onclose={hideCommentsWindow}
                                comment-items={commentItems}
                                checklist-requirement={checklistItem.fields.Checklist_Requirement__c.value}
                                assessor-view="true"
                                show-new-comment={showNewComment}
                                show-mark-as-not-required-confirmation={showMarkAsNotRequiredConfirmation}
                                comment-title={commentTitle}
                                checklist-item={checklistItem}
                                current-user-name={currentUserName}
                                is-comments-opened={isCommentsOpened}>            
        </c-document-checklist-assessment-internal-comment-list>
    </template>

</template>
