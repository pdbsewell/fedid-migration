<template>
    <div class="slds-box slds-box_x-small" style="overflow:auto;">
        <lightning-card>
            <div class="slds-grid slds-grid_align-spread">
                <h3 slot="title">
                    <lightning-icon icon-name="standard:insights" size="small"></lightning-icon>
                    &nbsp;Action Plan Summary ({totalRecountCount})
                </h3>
                <span>
                    <lightning-button label="" icon-name="utility:refresh" icon-position="center"
                        onclick={refreshSummary}>
                    </lightning-button>
                </span>
            </div>
            <br />
            <div class="slds-box slds-box_x-small" style="overflow:auto;">
                <c-mro-Custom-Type-Datatable key-field="recordId" data={data} columns={columns} show-row-number-column
                    hide-checkbox-column="true" class="slds-table" sorted-by={sortBy} sorted-direction={sortDirection}
                    onsort={doSorting} onrowaction={callRowAction}></c-mro-Custom-Type-Datatable>
            </div>
            <br />
            <div class="slds-align_absolute-center">
                <lightning-button label="Previous" icon-name="utility:chevronleft" onclick={previousHandler}
                    disabled={isPreviousDisable}>
                </lightning-button>

                <span class="slds-badge slds-badge_lightest" style="margin-right: 10px;margin-left: 10px;">
                    Displaying {startingRecord} to {endingRecord} of {totalRecountCount} records.
                    Page {page} of {totalPage}.
                </span>

                <lightning-button label="Next" icon-name="utility:chevronright" icon-position="right"
                    onclick={nextHandler} disabled={isNextDisable}>
                </lightning-button>
            </div>
        </lightning-card>
    </div>
</template>
