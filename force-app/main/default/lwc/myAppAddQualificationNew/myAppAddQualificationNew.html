<template>
    <div class="slds">
        <!-- current/previous notification message -->
        <template if:true={currentPreviousNotification}>
            <div class="slds-card">
                <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-text-heading_medium" role="alert">
                    <lightning-icon icon-name="utility:info_alt"></lightning-icon>
                    <span class="slds-var-m-left_small" style="color: #080707;">
                        {currentPreviousNotification}
                    </span>
                </div>
            </div>
        </template>
        <!-- SPINNER -->
        <template if:true={showSpinner}>
            <lightning-spinner alternative-text="Loading" size="medium" variant="brand"></lightning-spinner>
        </template>

        <!-- DELETE CONFIRMATION POPUP -->
        <template if:true={showConfirmDelete}>
            <div role="alertdialog" tabindex="-1" aria-labelledby="prompt-heading-id" aria-describedby="prompt-message-wrapper" class="slds-modal slds-fade-in-open slds-modal_prompt">
                <div class="slds-modal__container">
                    <div class="slds-modal__header slds-theme_error slds-theme_alert-texture">
                        <h2 class="slds-text-heading_small" id="prompt-heading-id" style="color: #ffffff;">{label.App_DeleteConfirmation}</h2>
                    </div>
                    <div class="slds-modal__content slds-p-around_medium">
                        <p>
                            {label.App_DeleteQualificationLabel}
                        </p>
                    </div>
                    <div class="slds-modal__footer slds-theme_default">
                        <lightning-button label="Yes"
                                          variant="brand"
                                          onclick={onClickConfirmDelete}>
                        </lightning-button>
                        <lightning-button label="No"
                                          onclick={onClickCancelDelete}>
                        </lightning-button>
                    </div>
                </div>
            </div>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
        <!-- END - CONFIRMATION POPUP -->

        <!-- ALERT: ANY Errors on save-->
        <template lwc:if={showErrors}>
            <div>
                <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
                    <div class="slds-modal__container">
                        <header class="slds-modal__header">
                            <h3 id="modal-heading-01" class="slds-text-heading_medium slds-hyphenate">Please complete the following:</h3>
                        </header>
                        <div class="slds-modal__content slds-var-p-around_medium" id="modal-content-id-1">
                            <ul class="slds-list_dotted slds-text-align_left">
                                <template for:each={saveErrors} for:item="error">
                                    <li key={error}>{error}</li>
                                </template>
                            </ul>
                        </div>
                        <footer class="slds-modal__footer">
                            <lightning-button variant="base" label="Close" title="" onclick={onClickCloseAlert} class="slds-button slds-button_neutral"></lightning-button>
                        </footer>
                    </div>
                </section>
                <div class="slds-backdrop slds-backdrop_open"></div>
            </div>
        </template>
        <div class="slds-hide">
            <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_error" role="alert">
                <span class="slds-assistive-text">Error</span>
                <span class="slds-icon_container slds-icon-utility-error slds-var-m-right_x-small" ></span>
                <div class="slds-align-top">Please correct the following:</div>
                <ul class="slds-list_dotted slds-text-align_left">
                    <template for:each={saveErrors} for:item="error">
                        <li key={error}>{error}</li>
                    </template>
                </ul>
                <lightning-button-icon
                        icon-name="utility:close"
                        alternative-text="Close"
                        class="slds-button slds-button_icon slds-notify__close slds-button_icon-inverse"
                        title="Close"
                        onclick={onClickCloseAlert}>
                </lightning-button-icon>
            </div>
        </div>

        <!-- current institution -->
        <template if:true={isAbroadType}>
            <div class="slds-grid slds-gutters slds-wrap">
                <div class="slds-col slds-is-relative">
                    <template if:true={showInstitutionSpinner}>
                        <lightning-spinner variant="brand"></lightning-spinner>
                    </template>
                    <div data-id="currentInstitution" class="sectionContainer slds-wrap">
                        <div class="slds-size_3-of-6 sectionContainerTopBorder"></div>
                        <div class="sectionContainerBody slds-size_5-of-5">
                            <div class="slds-size_5-of-5">
                                <h2>Current Institution</h2>
                            </div>

                            <!-- search/enter institution -->
                            <div class="slds-is-relative">
                                <div class="slds-size_5-of-5" style="margin-top: 10px;">
                                    <p>Monash University has reciprocal Exchange and Study Abroad programs with many institutions around the world. Please use the Partner University look up tool below to search and select your current institution from the results.</p>
                                </div>

                                <div class="slds-size_5-of-5" style="margin-top: 10px;">
                                    <span class="generalText">If your institution cannot be found via search, please enter the details manually.</span>
                                </div>

                                <div class="slds-size_5-of-5" style="margin-top: 20px;">
                                    <span class="generalText"><b>Your current institution</b></span>
                                </div>

                                <!-- institution -->
                                <div class="slds-size_5-of-5" style="margin-top: 10px;">
                                    <template if:false={isApplicationCreatedByPartner}>
                                        <c-input-type-ahead name="institution" label=""
                                                            placeholder="Enter your current institution" value={institutionName}
                                                            options={institutionOptions} onchange={handleInstitutionChange}
                                                            onkeyup={handleInstitutionKeyUp} onclear={handleInstitutionChange}
                                                            is-disabled="false">
                                        </c-input-type-ahead>
                                    </template>
                                    <template if:true={isApplicationCreatedByPartner}>
                                        <div class="slds-size_5-of-5" style="margin-top: 10px;">
                                            <p>{institutionName}</p>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <!-- educational history -->
        <div class="slds-grid slds-gutters slds-wrap">
            <div class="slds-col">
                <!-- START - Academic Qualifications -->
                <div class="sectionContainer slds-wrap">
                    <div class="slds-size_3-of-6 sectionContainerTopBorder"></div>
                    <div class="sectionContainerBody slds-size_5-of-5">
                        <div class="slds-size_5-of-5">
                            <h2>Academic Qualification</h2>
                        </div>

                        <!-- STATE 1 - START: Button to add a new qualification and display existing qualifications -->
                        <template lwc:if={showMain}>
                            <!-- SECTION :TABLE of qualifications  -->
                            <div>
                                <template if:false={noQualificationFound}>
                                    <div class="slds-m-top_medium">
                                        <table class="slds-table slds-table_bordered slds-table_cell-buffer">
                                            <thead>
                                            <tr class="slds-text-title_caps">
                                                <th scope="col">
                                                    <div class="slds-truncate slds-cell-wrap" title="qType">Qualification Type</div>
                                                </th>
                                                <th scope="col">
                                                    <div class="slds-truncate slds-cell-wrap" title="School">Institution/School</div>
                                                </th>
                                                <th scope="col">
                                                    <div class="slds-truncate slds-cell-wrap" title="Assessment Type/Qualification">Assessment Type/Qualification</div>
                                                </th>
                                                <template if:true={allowDelete}>
                                                    <th scope="col">
                                                        <div class="slds-truncate slds-align_absolute-center" title="Action" >Action</div>
                                                    </th>
                                                </template>
                                            </tr>
                                            </thead>
                                            <tbody>
                                            <!-- ITERATION FOR APPLICATION QUALIFICATION PROVIDED VISIBLE ONLY WHEN THIS COMPONENT IS UNDER THE APPLICATION DETAIL -->
                                            <template if:true={isAppComponent}>
                                                <template for:each={filteredQualListDraft} for:item="qualRec">
                                                    <tr key={qualRec}>
                                                        <td>
                                                            <div class="slds-cell-wrap slds-truncate">
                                                                {qualRec.recordTypeLabel}
                                                            </div>
                                                        </td>
                                                        <td>
                                                            <div class="slds-cell-wrap slds-truncate" style="float: left; width: 225px; word-wrap: break-word;">
                                                                <template lwc:if={qualRec.Institution_Name__c}>{qualRec.Institution_Name__c}</template>
                                                                <template lwc:else>{qualRec.Other_Institution__c}</template>
                                                            </div>
                                                        </td>
                                                        <td data-label="Assessment Type/Qualification">
                                                            <div class="slds-cell-wrap slds-truncate" style="float: left; width: 225px; word-wrap: break-word;">
                                                                <template lwc:if={qualRec.Qualification__c}>{qualRec.Qualification__r.Qualification_Name__c}</template>
                                                                <template lwc:else>{qualRec.Other_Qualification__c}</template>
                                                            </div>
                                                        </td>
                                                        <td data-label="Action">
                                                            <div class="slds-truncate slds-align_absolute-center">
                                                                <lightning-button-icon label="Edit"
                                                                                       name={qualRec.Id}
                                                                                       icon-name="utility:edit"
                                                                                       variant="border"
                                                                                       onclick={onClickEdit}
                                                                                       alternative-text="Edit Form"
                                                                                       class="slds-m-left_xx-small">
                                                                </lightning-button-icon>
                                                                <lightning-button-icon name={qualRec.Id}
                                                                                       icon-name="utility:close"
                                                                                       variant="border"
                                                                                       onclick={onClickDelete}
                                                                                       alternative-text="Remove Item"
                                                                                       class="slds-m-left_xx-small">
                                                                </lightning-button-icon>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                </template>

                                                <template for:each={filteredQualListHistorical} for:item="qualRec">
                                                    <tr key={qualRec.Id}>
                                                        <td>
                                                            <div class="slds-cell-wrap slds-truncate">
                                                                {qualRec.recordTypeLabel}
                                                            </div>
                                                        </td>
                                                        <td>
                                                            <div class="slds-cell-wrap slds-truncate" style="float: left; width: 225px; word-wrap: break-word;">
                                                                <template lwc:if={qualRec.Institution_Name__c}>{qualRec.Institution_Name__c}</template>
                                                                <template lwc:else>{qualRec.Other_Institution__c}</template>
                                                            </div>
                                                        </td>
                                                        <td data-label="Assessment Type/Qualification">
                                                            <div class="slds-cell-wrap slds-truncate" style="float: left; width: 225px; word-wrap: break-word;">
                                                                <template lwc:if={qualRec.Qualification__c}>{qualRec.Qualification__r.Qualification_Name__c}</template>
                                                                <template lwc:else>{qualRec.Other_Qualification__c}</template>
                                                            </div>
                                                        </td>
                                                        <td data-label="Action">
                                                            <div class="slds-truncate slds-align_absolute-center">
                                                                <lightning-helptext content="This qualification cannot be edited or deleted" icon-name="utility:preview"></lightning-helptext>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                </template>
                                            </template>
                                            <!-- END - ITERATION FOR APPLICATION QUALIFICATION PROVIDED VISIBLE ONLY WHEN THIS COMPONENT IS UNDER THE APPLICATION DETAIL -->
                                            </tbody>
                                        </table>
                                    </div>
                                </template>

                                <!-- ADD NEW BUTTON -->
                                <template if:false={showQualificationTypeSelect}>
                                    <button class="secondaryButton" onclick={onClickAddNew} style="margin-top: 10px;">
                                        <lightning-icon class="secondaryIcon" icon-name="utility:add" size="small"></lightning-icon>&nbsp;&nbsp;Add New Qualification
                                    </button>
                                </template>
                                <!-- END ADD NEW BUTTON -->
                            </div>
                            <!-- SECTION END:TABLE of qualifications  -->

                        </template>
                        <!-- STATE 2: Select qualification type, persistent until entry complete -->
                        <template if:true={showQualificationTypeSelect}>
                            <div class="slds-m-top_large">
                                <!-- qualification type -->
                                <lightning-select id="selectQualificationType"
                                                  label="Please select the type of qualification you wish to add"
                                                  value={selectedQualRecordTypeId}
                                                  required="true"
                                                  disabled={editingDraft}
                                                  options={qualRecordTypes}
                                                  onchange={onSelectQualificationType}>
                                </lightning-select>
                            </div>
                        </template>

                        <!-- STATE 3: Form to enter new qualification -->
                        <template if:true={showNewQualification}>
                            <div data-id="qualifications">
                                <!-- context specific instructions -->
                                <div class="slds-p-vertical_medium">
                                    <!-- TERTIARY BEGIN -->
                                    <template if:true={terEducQualType}>
                                        <div>
                                            {label.App_TertiaryEducationDetails}&nbsp;{label.App_TertiaryEducationDetails_2}.
                                            <!-- SECTION: TERTIARY COUNTRY -->
                                            <div class="slds-grid slds-wrap slds-grid_pull-padded">
                                                <div class="slds-p-horizontal_small slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-2">
                                                    <div class="slds-form-element__control">
                                                        <lightning-select id="selectCountryTer"
                                                                          label="Country in which you studied"
                                                                          value={qualTertiaryCountryId}
                                                                          required="true"
                                                                          options={countryOptions}
                                                                          onchange={onSelectTertiaryCountry}>
                                                        </lightning-select>
                                                    </div>
                                                </div>
                                            </div>

                                            <!-- SECTION : TERTIARY QUALIFICATION NAME/TITLE -->
                                            <lightning-input name="inputQualTertiaryName"
                                                             value={qualTertiaryName}
                                                             required="true"
                                                             placeholder="Qualification Name, eg. Bachelor of Arts"
                                                             label="Qualification"
                                                             onchange={captureInputs}></lightning-input>
                                            <!-- SECTION END : TERTIARY QUALIFICATION NAME/TITLE -->

                                            <!-- SECTION : TERTIARY AWARDING BODY -->
                                            <div>
                                                <div>Enter the keyword and select your institution from the drop down list.
                                                    If you cannot find your institution, enter it manually.</div>
                                                <lightning-tabset active-tab-value={tabIdTertiaryAwardingBody}>
                                                    <lightning-tab label="Select From List" value="AUS_TER_SEARCH" onactive={onTabSelectInstitution}>
                                                        <c-my-app-search-with-dropdown
                                                                data-id="searchTertiaryAwardingBody"
                                                                selected-result={qualTertiaryAwardingBody}
                                                                map-results={mapTertiaryAwardingBody}
                                                                place-holder="search for awarding body/institution"
                                                                input-label="Awarding Body or Institution"

                                                                object-api-name="Institution__c"
                                                                fields-to-return="['Id', 'Institution_Name__c', 'Institution_Code__c']"
                                                                where-fields="['Type__c', 'ISO_Country_API_Name__c']"
                                                                where-value0="Tertiary"
                                                                where-value1={qualTertiaryCountry}
                                                                search-fields="['Institution_Name__c']"
                                                                label-field="Institution_Name__c"

                                                                onsearchselectevent={onSearchSelectTertiaryAwardingBody}
                                                        ></c-my-app-search-with-dropdown>
                                                    </lightning-tab>
                                                    <lightning-tab label="Enter Manually" value="AUS_TER_MANUAL" onactive={onTabSelectInstitution}>
                                                        <lightning-input name="inputQualAwardingBodyOther"
                                                                         value={qualTertiaryAwardingBodyOther}
                                                                         placeholder="Enter Institution Name"
                                                                         required="true"
                                                                         label="Awarding Body or Institution"
                                                                         onchange={captureInputs}></lightning-input>
                                                    </lightning-tab>
                                                </lightning-tabset>
                                            </div>
                                            <!-- SECTION END : TERTIARY AWARDING BODY -->

                                            <!-- SECTION : TERTIARY ENGLISH INSTRUCTION -->
                                            <!-- Is English the ONLY language of instruction and testing for all courses at the institution where you completed your studies? -->
                                            <lightning-input name="inputQualTertiaryEnglishOnly"
                                                             checked={qualTertiaryEnglishOnly}
                                                             label={label.App_InstructedInEnglish}
                                                             message-toggle-active="Yes"
                                                             message-toggle-inactive="No"
                                                             type="toggle"
                                                             onchange={captureInputs}>
                                            </lightning-input>
                                            <!-- SECTION END : TERTIARY ENGLISH INSTRUCTION -->

                                            <!-- SECTION : TERTIARY FIRST YEAR OF ENROLMENT-->
                                            <lightning-input data-id="inputQualTertiaryFirstYearEnrolment"
                                                             name="inputQualTertiaryFirstYearEnrolment"
                                                             label="First year of enrolment"
                                                             type="text"
                                                             required="true"
                                                             value={qualTertiaryFirstYearEnrolled}
                                                             pattern="(19|20)\d{2}"
                                                             message-when-pattern-mismatch="please enter a valid year"
                                                             onchange={captureInputs}
                                            ></lightning-input>
                                            <!-- SECTION END : TERTIARY FIRST YEAR OF ENROLMENT-->

                                            <!-- SECTION : TERTIARY LAST YEAR OF ENROLMENT-->
                                            <lightning-input data-id="inputQualTertiaryLastYearEnrolment"
                                                             name="inputQualTertiaryLastYearEnrolment"
                                                             type="text"
                                                             required="true"
                                                             label="Last year of enrolment"
                                                             value={qualTertiaryLastYearEnrolled}
                                                             pattern="(19|20)\d{2}"
                                                             message-when-pattern-mismatch="please enter a valid year"
                                                             onchange={captureInputs}
                                            ></lightning-input>
                                            <!-- SECTION END : TERTIARY LAST YEAR OF ENROLMENT-->

                                            <!-- SECTION: TERTIARY LEVEL OF COMPLETION -->
                                            <lightning-select id="selectCompletionLevel"
                                                              label="Level of Completion"
                                                              value={qualTertiaryLevelOfCompletion}
                                                              required="true"
                                                              options={completionLevelOptions}
                                                              onchange={onSelectCompletionLevel}>
                                            </lightning-select>
                                            <!-- SECTION END : TERTIARY LEVEL OF COMPLETION -->
                                            <!-- SECTION: SECONDARY COMMENTS -->
                                            <lightning-textarea name="inputQualTertiaryComments"
                                                                value={qualTertiaryComments}
                                                                label="Comments"
                                                                placeholder="Any other comments"
                                                                max-length={MAX_COMMENTS_LENGTH}
                                                                onchange={captureInputs}
                                            ></lightning-textarea>
                                            <!-- SECTION END: SECONDARY COMMENTS -->
                                        </div>
                                    </template>
                                    <!-- TERTIARY END -->

                                    <!-- SECONDARY BEGIN -->
                                    <template if:true={secEducQualType}>
                                        <div>
                                            <div class="slds-text-body_regular">{label.App_SecondaryEducDetails}</div>
                                            <div class="slds-text-body_regular slds-p-top_medium">{label.App_SecondaryEducDetails_2}</div>
                                            <!-- SECTION: SECONDARY COUNTRY -->
                                            <div class="slds-grid slds-wrap slds-grid_pull-padded">
                                                <div class="slds-p-horizontal_small slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-2">
                                                    <div class="slds-form-element__control">
                                                        <lightning-select id="selectCountrySec"
                                                                          label="Country in which you studied"
                                                                          value={qualSecondaryCountryId}
                                                                          required="true"
                                                                          options={countryOptions}
                                                                          onchange={onSelectSecondaryCountry}>
                                                        </lightning-select>
                                                    </div>
                                                </div>
                                            </div>
                                            <!-- SECTION END: SECONDARY COUNTRY -->
                                            <!-- SECTION : SECONDARY STATE -->
                                            <template if:true={isChinaOrIndia}>
                                                <lightning-input name="inputState"
                                                                 value={qualSecondaryStateProvince}
                                                                 required={isChinaOrIndia}
                                                                 placeholder="State/Province of Study"
                                                                 label="State/Province"
                                                                 onchange={onSelectStateProvince}>
                                                </lightning-input>
                                            </template>
                                            <!-- australian state -->
                                            <template if:true={isAustralia}>
                                                <lightning-select id="selectAusState"
                                                                  label="Australian State in which you studied"
                                                                  value={qualSecondaryState}
                                                                  required={isAustralia}
                                                                  options={ausStateOptions}
                                                                  onchange={onSelectAusState}>
                                                </lightning-select>
                                            </template>
                                            <!-- SECTION END : SECONDARY STATE -->

                                            <!-- SECTION : SECONDARY QUALIFICATION NAME -->
                                            <div class="">
                                                <div>Enter the keyword and select your Qualification from the drop down list.
                                                    If you cannot find your institution, enter it manually.</div>
                                                <lightning-tabset id="secondaryQualificationTabs"
                                                                  active-tab-value={tabIdSecondaryType}
                                                                  variant="scoped">
                                                    <lightning-tab label="Select From List" value="SEC_QUAL_NAME_SEARCH" onactive={onTabSelectQualification} >
                                                        <template lwc:if={isAustralia}>
                                                            <div>
                                                                <c-my-app-search-with-dropdown
                                                                        data-id="searchSecondaryAusQualification"
                                                                        selected-result={qualSecondaryTypeId}
                                                                        place-holder="enter to search for an Australian Secondary qualification"
                                                                        input-label="Qualification Name"
                                                                        object-api-name="Qualification__c"
                                                                        fields-to-return="['Id', 'Qualification_Name__c']"
                                                                        where-fields="['Overseas__c', 'State__c', 'RecordType.Name']"
                                                                        where-value0="false"
                                                                        where-value1={qualSecondaryState}
                                                                        where-value2="Secondary Qualification"
                                                                        optional-where-fields="['State__c']"
                                                                        search-fields="['Qualification_Name__c']"
                                                                        label-field="Qualification_Name__c"

                                                                        onsearchselectevent={onSearchSelectSecondaryQualification}
                                                                ></c-my-app-search-with-dropdown>
                                                            </div>
                                                        </template>
                                                        <template lwc:else>
                                                            <div>
                                                                <c-my-app-search-with-dropdown
                                                                        data-id="searchSecondaryIntlQualification"
                                                                        selected-result={qualSecondaryTypeId}
                                                                        place-holder="enter to search for a secondary qualification"
                                                                        input-label="Qualification Name"

                                                                        object-api-name="Qualification__c"
                                                                        fields-to-return="['Id', 'Qualification_Name__c']"
                                                                        where-fields="['Overseas__c','RecordType.Name', '!%Qualification_Name__c']"
                                                                        where-value0="true"
                                                                        where-value1="Secondary Qualification"
                                                                        where-value2="VTAC"
                                                                        search-fields="['Qualification_Name__c']"
                                                                        label-field="Qualification_Name__c"

                                                                        onsearchselectevent={onSearchSelectSecondaryQualification}
                                                                ></c-my-app-search-with-dropdown>
                                                            </div>
                                                        </template>
                                                    </lightning-tab>
                                                    <lightning-tab label="Enter Manually" value="SEC_QUAL_NAME_MANUAL" onactive={onTabSelectQualification} >
                                                        <lightning-input name="inputQualSecondaryOther"
                                                                         value={qualSecondaryTypeOther}
                                                                         required="true"
                                                                         placeholder="Secondary Qualification Name"
                                                                         label="Name of Secondary Qualification"
                                                                         onchange={captureInputs}></lightning-input>
                                                    </lightning-tab>
                                                </lightning-tabset>
                                            </div>
                                            <!-- SECTION : SECONDARY QUALIFICATION NAME -->

                                            <!-- SECTION : AUSTRALIAN SECONDARY SCHOOL OF ATTENDANCE -->
                                            <template lwc:if={isAustralia}>
                                                <div>
                                                    <div>Enter the keyword and select your School, College or Institution from the drop down list.
                                                        If you cannot find your it, enter it manually.</div>
                                                    <lightning-tabset active-tab-value={tabIdSecondarySchool}>
                                                        <lightning-tab label="Select From List" value="AUS_SEC_SEARCH" onactive={onTabSelectInstitution}>
                                                            <c-my-app-search-with-dropdown
                                                                    data-id="searchSecondarySchool"
                                                                    selected-result={qualSecondarySchool}
                                                                    map-results={mapSecondarySchool}
                                                                    place-holder="enter to search for schools"
                                                                    input-label="School, College or Institution Name"

                                                                    object-api-name="Institution__c"
                                                                    fields-to-return="['Id', 'Institution_Name__c', 'Institution_Code__c', 'Type__c']"
                                                                    where-fields="['Type__c', 'Country__c', 'State__c']"
                                                                    where-value0="Secondary"
                                                                    where-value1={qualSecondaryCountry}
                                                                    where-value2={qualSecondaryState}
                                                                    search-fields="['Institution_Name__c']"
                                                                    label-field="Institution_Name__c"

                                                                    onsearchselectevent={onSearchSelectSecondarySchool}
                                                            ></c-my-app-search-with-dropdown>
                                                        </lightning-tab>
                                                        <lightning-tab label="Enter Manually" value="AUS_SEC_MANUAL" onactive={onTabSelectInstitution}>
                                                            <lightning-input name="inputQualAwardingBodyOtherSec"
                                                                             value={qualSecondarySchoolOther}
                                                                             required="true"
                                                                             placeholder=""
                                                                             label="Enter School Name"
                                                                             onchange={captureInputs}></lightning-input>
                                                        </lightning-tab>
                                                    </lightning-tabset>
                                                </div>
                                            </template>
                                            <template lwc:else>
                                                <div>
                                                    <!-- MANUAL ENTRY of Other Awarding Body / Institution -->
                                                    <lightning-input name="inputQualAwardingBodyOtherSec"
                                                                     value={qualSecondarySchoolOther}
                                                                     required="true"
                                                                     placeholder=""
                                                                     label="Enter School Name"
                                                                     onchange={captureInputs}></lightning-input>
                                                </div>
                                            </template>
                                            <!-- SECTION END : SECONDARY SCHOOL OF ATTENDANCE  -->

                                            <!-- SECTION : SECONDARY ENGLISH INSTRUCTION -->
                                            <!-- Is English the ONLY language of instruction and testing for all courses at the institution where you completed your studies? -->
                                            <lightning-input name="inputQualSecondaryEnglishOnly"
                                                             checked={qualSecondaryEnglishOnly}
                                                             label={label.App_InstructedInEnglish}
                                                             message-toggle-active="Yes"
                                                             message-toggle-inactive="No"
                                                             type="toggle"
                                                             onchange={captureInputs}
                                            ></lightning-input>
                                            <!-- SECTION END : SECONDARY ENGLISH INSTRUCTION -->

                                            <!-- SECTION: SECONDARY Is Qualification Complete? -->
                                            <lightning-input name="inputQualSecondaryIsCompleted"
                                                             checked={qualSecondaryCompleted}
                                                             label="Have you completed this qualification?"
                                                             message-toggle-active="Yes"
                                                             message-toggle-inactive="No"
                                                             type="toggle"
                                                             onchange={captureInputs}
                                            ></lightning-input>
                                            <!-- SECTION END: SECONDARY Is Qualification Complete? -->

                                            <!-- SECTION: SECONDARY YEAR COMPLETION -->
                                            <template lwc:if={qualSecondaryCompleted}>
                                                <div>

                                                    <!-- moving to input text field instead
                                                    <lightning:select aura:id="selectYearCompleted"
                                                                    label="Year of Completion (or current year)"
                                                                    required=""
                                                                    value="{!v.qualSecondaryYearCompleted}"
                                                                    onchange="{!c.onSelectYearCompleted}"
                                                    >
                                                        <aura:iteration var="option" items="{! v.yearCompletedOptions}">
                                                            <option value="{! option.value }" selected="{!if(option.value==v.qualSecondaryYearCompleted)}">{! option.label }</option>
                                                        </aura:iteration>
                                                    </lightning:select>
                                                    -->
                                                    <lightning-input data-id="inputQualSecondaryYearCompleted"
                                                                     name="inputQualSecondaryYearCompleted"
                                                                     label="Year of Completion"
                                                                     type="text"
                                                                     required="true"
                                                                     value={qualSecondaryYearCompleted}
                                                                     pattern="(19|20)\d{2}"
                                                                     message-when-pattern-mismatch="please enter a valid year"
                                                                     onchange={captureInputs}
                                                    ></lightning-input>
                                                </div>
                                            </template>
                                            <!-- SECTION END: SECONDARY YEAR COMPLETION -->
                                            <!-- SECTION: SECONDARY DATE EXPECTED COMPLETION -->
                                            <template lwc:else>
                                                <div>
                                                    <lightning-input id="inputQualSecondaryDateExpected"
                                                                     value={qualSecondaryDateExpected}
                                                                     label="When do you expect to complete your qualification?"
                                                                     onchange={onChangeSecondaryDateExpected}
                                                                     required="true"
                                                                     type="date">
                                                    </lightning-input>
                                                    <template if:true={errorMsgSecondaryDateExpected}>
                                                        <div>
                                                            <div class="slds-form-element__help slds-text-color_error">
                                                                <span class="slds-text-color_error">Please select a date today or later</span>
                                                            </div>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>
                                            <!-- SECTION END: SECONDARY DATE EXPECTED COMPLETION -->

                                            <!-- SECTION: SECONDARY COMMENTS -->
                                            <lightning-textarea name="inputQualSecondaryComments"
                                                                value={qualSecondaryComments}
                                                                label="Comments"
                                                                placeholder="Any other comments"
                                                                max-length={MAX_COMMENTS_LENGTH}
                                                                onchange={captureInputs}>
                                            </lightning-textarea>
                                            <!-- SECTION END: SECONDARY COMMENTS -->
                                        </div>
                                    </template>
                                    <!-- SECONDARY END -->

                                    <!-- OTHER ADMISSIONS BEGIN -->
                                    <template if:true={otherQualType}>
                                        <div>
                                            <div class="slds-text-body_regular">
                                                <lightning-formatted-rich-text
                                                        value={label.App_OtherQualificationDetails}>
                                                </lightning-formatted-rich-text>
                                            </div>

                                            <!-- SECTION: ADMISSION QUALIFICATION NAME -->
                                            <lightning-input name="inputQualAdmissionsName"
                                                             value={qualAdmissionsName}
                                                             placeholder="Qualification Name"
                                                             required="true"
                                                             label="Name of Qualification"
                                                             onchange={captureInputs}></lightning-input>
                                            <!-- SECTION END: ADMISSION QUALIFICATION NAME -->


                                            <!-- SECTION: ADMISSION Is Qualification Complete? -->
                                            <lightning-input name="inputQualAdmissionsIsCompleted"
                                                             checked={qualAdmissionsCompleted}
                                                             label="Have you completed this qualification?"
                                                             message-toggle-active="Yes"
                                                             message-toggle-inactive="No"
                                                             type="toggle"
                                                             onchange={onToggleAdmissionsCompleted}
                                            ></lightning-input>
                                            <!-- SECTION END : ADMISSION Is Qualification Complete? -->

                                            <!-- SECTION: ADMISSION DATE COMPLETED -->
                                            <template if:true={qualAdmissionsCompleted}>
                                                <div>
                                                    <lightning-input id="inputQualAdmissionsDateCompleted"
                                                                     name="inputQualAdmissionsDateCompleted"
                                                                     value={qualAdmissionsDateCompleted}
                                                                     label="Date Achieved"
                                                                     required="true"
                                                                     type="date"
                                                                     message-when-bad-input="Please enter a date today or earlier"
                                                                     onchange={captureInputs}
                                                    ></lightning-input>
                                                </div>
                                            </template>
                                            <!-- SECTION END: ADMISSION DATE COMPLETED -->
                                            <!-- SECTION: ADMISSION DATE EXPECTED -->
                                            <template if:false={qualAdmissionsCompleted}>
                                                <div>
                                                    <lightning-input id="inputQualAdmissionsDateExpected"
                                                                     name="inputQualAdmissionsDateExpected"
                                                                     value={qualAdmissionsDateExpected}
                                                                     label="The date you expect to complete this"
                                                                     type="date"
                                                                     required="true"
                                                                     onchange={captureInputs}
                                                    ></lightning-input>
                                                </div>
                                            </template>
                                            <!-- SECTION END: ADMISSION DATE EXPECTED -->

                                            <!-- SECTION: ADMISSION COMMENTS -->
                                            <lightning-textarea name="inputQualAdmissionsComments"
                                                                value={qualAdmissionsComments}
                                                                label="Comments"
                                                                placeholder="Any other comments"
                                                                max-length={MAX_COMMENTS_LENGTH}
                                                                onchange={captureInputs}
                                            ></lightning-textarea>
                                            <!-- SECTION END: ADMISSION COMMENTS -->
                                        </div>
                                    </template>
                                    <!-- OTHER END -->
                                </div>
                            </div>
                        </template>

                        <!-- SAVE/CANCEL BUTTONS -->
                        <div class="slds-form-element">
                            <template if:true={showSave}>
                                <button title="Save" onclick={onClickSave} class="slds-m-top_large primaryButton" style="margin-right: 15px;">Save</button>
                            </template>
                            <template if:true={showCancel}>
                                <button title="Cancel" onclick={onClickCancel} class="slds-m-top_large secondaryButton" >Cancel</button>
                            </template>
                        </div>
                        <!-- BUTTONS END -->
                    </div>
                </div>
                <!-- END - Academic Qualifications -->

                <!-- START - English Proficiency -->
                <div class="sectionContainer slds-wrap">
                    <div class="slds-size_3-of-6 sectionContainerTopBorder"></div>
                    <div class="sectionContainerBody slds-size_5-of-5">
                        <div class="slds-size_5-of-5">
                            <h2>English Proficiency</h2>
                        </div>

                        <!-- English Proficiency Overview -->
                        <template if:true={showEnglishProficiencySection}>
                            <div class="sectionContainerBody slds-size_5-of-5 slds-m-top_large">
                                <div class="slds-grid slds-wrap slds-m-bottom_large slds-p-horizontal_x-small">
                                    <lightning-formatted-rich-text value={label.myAppEnglishTestEnglishProficiencyHeader}></lightning-formatted-rich-text>
                                </div>
                            </div>
                        </template>

                        <!-- Additional English language proficiency question -->
                        <div class="sectionContainerBody slds-size_5-of-5 slds-m-top_large">
                            <!-- English Proficiency Section -->
                            <div id="englishLanguageProficiency" class="slds-grid slds-wrap slds-m-bottom_large slds-m-top_large">
                                <!-- 6 year schooling question Section -->
                                <lightning-layout-item size="9" class="slds-align-top slds-p-horizontal_x-small">
                                    <lightning-formatted-rich-text value={label.myAppEnglishTestSixYearSchooling}></lightning-formatted-rich-text>
                                </lightning-layout-item>

                                <!-- Radio Group Section -->
                                <lightning-layout-item size="3" class="slds-align-top slds-p-horizontal_x-small slds-grid slds-grid_align-end slds-grid_vertical-align-center">
                                    <lightning-radio-group
                                            data-id="englishLanguageProficiency"
                                            name="English Language Proficiency"
                                            label={label.myAppEnglishTestSixYearSchooling}
                                            required="true"
                                            type="button"
                                            options={yesNoOptions}
                                            onchange={onChangeEnglishLanguageProficiency}
                                            value={englishLanguageProficiency}
                                            variant="label-hidden">
                                    </lightning-radio-group>
                                </lightning-layout-item>
                            </div>

                            <!-- START: Display existing English Test -->
                            <template lwc:if={showMain}>
                                <template if:false={noEnglishProficiencyFound}>
                                    <template if:true={showEnglishTestQualifications}>
                                        <!-- SECTION :TABLE of English Tests  -->
                                        <div class="slds-m-top_medium">
                                            <table class="slds-table slds-table_bordered slds-table_cell-buffer" style="width: 100%;">
                                                <thead  style="width: 100%; min-width: 600px;">
                                                <tr class="slds-text-title_caps">
                                                    <th scope="col">
                                                        <div class="slds-truncate slds-cell-wrap" title="qType">Qualification Type</div>
                                                    </th>
                                                    <th scope="col">
                                                        <div class="slds-truncate slds-cell-wrap" title="Assessment Type/Qualification">Assessment Type/Qualification</div>
                                                    </th>
                                                    <th scope="col">
                                                        <div class="slds-truncate slds-cell-wrap" title="Verification Status">Verification Status</div>
                                                    </th>
                                                    <template if:true={allowDelete}>
                                                        <th scope="col">
                                                            <div class="slds-truncate slds-align_absolute-center" title="Action" >Action</div>
                                                        </th>
                                                    </template>
                                                </tr>
                                                </thead>
                                                <tbody style="width: 100%; min-width: 750px;">
                                                <!-- ITERATION FOR APPLICATION QUALIFICATION PROVIDED VISIBLE ONLY WHEN THIS COMPONENT IS UNDER THE APPLICATION DETAIL -->
                                                <template if:true={isAppComponent}>
                                                    <template for:each={filteredEngQualListDraft} for:item="qualRec">
                                                        <tr key={qualRec}>
                                                            <td>
                                                                <div class="slds-cell-wrap slds-truncate" style="float: left; width: 150px; word-wrap: break-word;">
                                                                    {qualRec.recordTypeLabel}
                                                                </div>
                                                            </td>
                                                            <td data-label="Assessment Type/Qualification">
                                                                <div class="slds-cell-wrap slds-truncate" style="float: left; width: 300px; word-wrap: break-word;">
                                                                    <template lwc:if={qualRec.Qualification__c}>{qualRec.Qualification__r.Qualification_Name__c}</template>
                                                                    <template lwc:else>{qualRec.Other_Qualification__c}</template>
                                                                </div>
                                                            </td>
                                                            <td data-label="Verification Status">
                                                                <div class="slds-cell-wrap slds-truncate" style="float: left; width: 150px; word-wrap: break-word;">
                                                                    {qualRec.Verification_Status__c}
                                                                </div>
                                                            </td>
                                                            <td data-label="Action">
                                                                <div class="slds-truncate slds-align_absolute-center">
                                                                    <lightning-button-icon
                                                                            key={qualRec.Id}
                                                                            label="Edit"
                                                                            name={qualRec.Id}
                                                                            icon-name="utility:edit"
                                                                            variant={qualRec.variant}
                                                                            data-id={qualRec.Id}
                                                                            onclick={onClickEditEnglishTest}
                                                                            alternative-text="Edit Form"
                                                                            class="slds-m-left_xx-small">
                                                                    </lightning-button-icon>
                                                                    <lightning-button-icon name={qualRec.Id}
                                                                                           icon-name="utility:close"
                                                                                           variant="border"
                                                                                           onclick={onClickDelete}
                                                                                           alternative-text="Remove Item"
                                                                                           class="slds-m-left_xx-small">
                                                                    </lightning-button-icon>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    </template>

                                                    <template for:each={filteredEngQualListHistorical} for:item="qualRec">
                                                        <tr key={qualRec.Id}>
                                                            <td>
                                                                <div class="slds-cell-wrap slds-truncate">
                                                                    {qualRec.recordTypeLabel}
                                                                </div>
                                                            </td>
                                                            <td data-label="Assessment Type/Qualification">
                                                                <div class="slds-cell-wrap slds-truncate" style="float: left; width: 225px; word-wrap: break-word;">
                                                                    <template lwc:if={qualRec.Qualification__c}>{qualRec.Qualification__r.Qualification_Name__c}</template>
                                                                    <template lwc:else>{qualRec.Other_Qualification__c}</template>
                                                                </div>
                                                            </td>
                                                            <td data-label="Verification Status">
                                                                <div class="slds-cell-wrap slds-truncate" style="float: left; width: 150px; word-wrap: break-word;">
                                                                    {qualRec.Verification_Status__c}
                                                                </div>
                                                            </td>
                                                            <td data-label="Action">
                                                                <div class="slds-truncate slds-align_absolute-center">
                                                                    <lightning-helptext content="This qualification cannot be edited or deleted" icon-name="utility:preview"></lightning-helptext>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    </template>
                                                </template>
                                                <!-- END - ITERATION FOR APPLICATION QUALIFICATION PROVIDED VISIBLE ONLY WHEN THIS COMPONENT IS UNDER THE APPLICATION DETAIL -->
                                                </tbody>
                                            </table>
                                        </div>
                                    </template>
                                </template>
                            </template>
                            <!-- SECTION END:TABLE of English Tests -->

                            <!-- Add new English Language Requirements  -->
                            <template if:true={showEnglishRequirementSection}>
                                <!-- Question Section - English Language Requirement -->
                                <div id="englishLanguageRequirements" class="slds-grid slds-wrap slds-m-bottom_medium">
                                    <lightning-layout-item size="12" class="slds-align-top slds-p-horizontal_x-small">
                                        <p><strong>{satisfyEnglishRequirement}</strong></p>
                                        <lightning-formatted-rich-text value={label.myAppEnglishTestEnglishMeasure}></lightning-formatted-rich-text>
                                    </lightning-layout-item>
                                    <lightning-layout-item size="12" class="slds-align-top fixed-combobox slds-p-horizontal_x-small slds-m-top_medium">
                                        <lightning-combobox
                                                name="englishOptions"
                                                label={satisfyEnglishRequirement}
                                                value={selectedEnglishRequirement}
                                                placeholder="-- Select an option --"
                                                options={englishOptions}
                                                onchange={onSelectEnglishLanguageReq}
                                                required="true"
                                                variant="label-hidden"
                                                disabled={disableEnglishLanguageRequirements}
                                                dropdown-alignment="auto">
                                        </lightning-combobox>
                                    </lightning-layout-item>
                                </div>

                                <!-- English Type - IELTS Form -->
                                <template if:true={showEnglishTypeOption}>
                                    <div id="englishTypeIelts" class="slds-grid slds-wrap slds-m-top_x-large">
                                        <!-- English Test Type Selection -->
                                        <lightning-layout-item size="6" class="slds-align-top slds-p-horizontal_x-small">
                                            <p><strong>English Test Type<span class="slds-required blue-required" title="Required">*</span></strong></p>
                                            <lightning-combobox
                                                    name="englishTestType"
                                                    id="selectEnglishTestType"
                                                    label="Please select the type of qualification you wish to add"
                                                    placeholder="-- Select --"
                                                    variant="label-hidden"
                                                    value={qualEnglishTestId}
                                                    required="true"
                                                    options={englishTestOptions}
                                                    onchange={onSelectEnglishTestType}
                                                    disabled={disableEnglishLanguageRequirements}
                                                    dropdown-alignment="auto">
                                            </lightning-combobox>
                                        </lightning-layout-item>

                                        <!-- English Test Date Completed -->
                                        <template if:true={showDateCompleted}>
                                            <lightning-layout-item size="6" class="slds-align-top slds-p-horizontal_x-small">
                                                <p><strong>Date Completed<span class="slds-required blue-required" title="Required">*</span></strong></p>
                                                <lightning-input
                                                        id="dateCompleted"
                                                        type="date"
                                                        name="englishTestDate"
                                                        label="English Test Date"
                                                        onchange={onChangeEnglishTestDateCompleted}
                                                        required="true"
                                                        value={qualEnglishTestDateCompleted}
                                                        variant="label-hidden"
                                                        disabled={disableDateInput}>
                                                </lightning-input>
                                                <!-- Date error message -->
                                                <template if:true={errorMsgCompletedDate}>
                                                    <div class="slds-form-element__help slds-text-color_error">
                                                        <span class="slds-text-color_error">Please select today or a previous date.</span>
                                                    </div>
                                                </template>
                                            </lightning-layout-item>
                                        </template>

                                        <!-- English Test Date Expected to be Completed -->
                                        <template if:true={showDateExpected}>
                                            <lightning-layout-item size="6" class="slds-align-top slds-p-horizontal_x-small">
                                                <p><strong>Date expected to be completed<span class="slds-required blue-required" title="Required">*</span></strong></p>
                                                <lightning-input
                                                        id="dateExpected"
                                                        type="date"
                                                        name="englishTestDateExpected"
                                                        label="English Test To Be Completed Date"
                                                        onchange={onChangeEnglishTestDateExpected}
                                                        required="true"
                                                        value={qualEnglishTestDateExpected}
                                                        variant="label-hidden">
                                                </lightning-input>
                                                <!-- Date error message -->
                                                <template if:true={errorMsgExpectedDate}>
                                                    <div>
                                                        <div class="slds-form-element__help slds-text-color_error">
                                                            <span class="slds-text-color_error">Please select today or a future date.</span>
                                                        </div>
                                                    </div>
                                                </template>
                                            </lightning-layout-item>
                                        </template>
                                    </div>
                                </template>

                                <!-- English Test Will completed Notes -->
                                <template if:true={showDateExpected}>
                                    <div id="englishWillCompleteNotes" class="slds-grid slds-wrap slds-p-horizontal_x-small slds-m-top_large">
                                        <p>{englishWillCompleteNotes}</p>
                                    </div>
                                </template>

                                <!-- English Test Report Number -->
                                <div id="englishTestReportNumber" class="slds-grid slds-wrap slds-m-top_x-large">
                                    <template if:true={showTestReportNumber}>
                                        <lightning-layout-item size="6" class="slds-align-top slds-p-horizontal_x-small">
                                            <p><strong>{testReportNumberLabel}<span class="slds-required blue-required" title="Required">*</span></strong></p>
                                            <lightning-input
