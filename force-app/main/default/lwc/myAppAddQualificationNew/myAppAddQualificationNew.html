                                                    type="text"
                                                    name="testReportNumber"
                                                    id="testReportNumber"
                                                    label="Test Report Form Number"
                                                    placeholder=""
                                                    variant="label-hidden"
                                                    value={testReportNumber}
                                                    required="true"
                                                    onchange={captureInputs}
                                                    disabled={disableTestReportFormInput}>
                                            </lightning-input>
                                        </lightning-layout-item>
                                    </template>

                                    <!-- English Overall Score -->
                                    <template if:true={showEnglishTestOverallScore}>
                                        <lightning-layout-item size="6"  class="slds-align-top slds-p-horizontal_x-small">
                                            <p><strong>Overall Score<span class="slds-required blue-required" title="Required">*</span></strong></p>
                                            <lightning-input
                                                    type="number"
                                                    min="0"
                                                    max-length="10"
                                                    step="any"
                                                    name="inputQualEnglishGPAResult"
                                                    data-id="inputQualEnglishGPAResult"
                                                    label="Overall Score"
                                                    variant="label-hidden"
                                                    required="true"
                                                    onchange={captureInputs}
                                                    value={qualAdmissionsGPAResult}
                                                    disabled={disableScoreInput}>
                                            </lightning-input>
                                        </lightning-layout-item>
                                    </template>
                                </div>

                                <!-- English Test Scores Input -->
                                <template if:true={showEnglishTestScores}>
                                    <div id="englishTestScores" class="slds-grid slds-wrap slds-m-top_x-large">
                                        <!-- Listening English Test Score -->
                                        <lightning-layout-item size="3" class="slds-align-top slds-p-horizontal_x-small">
                                            <p><strong>Listening Score<span class="slds-required blue-required" title="Required">*</span></strong></p>
                                            <lightning-input
                                                    type="number"
                                                    min="0"
                                                    max-length="10"
                                                    message-when-too-long="Enter up 10 characters"
                                                    step="any"
                                                    name="inputQualEnglishListeningScore"
                                                    data-id="inputQualEnglishListeningScore"
                                                    label="Listening Score"
                                                    variant="label-hidden"
                                                    value={qualEnglishTestScoreListening}
                                                    required="true"
                                                    onchange={captureInputs}
                                                    disabled={disableScoreInput}>
                                            </lightning-input>
                                        </lightning-layout-item>
                                        <!-- Reading English Test Score -->
                                        <lightning-layout-item size="3" class="slds-align-top slds-p-horizontal_x-small">
                                            <p><strong>Reading Score<span class="slds-required blue-required" title="Required">*</span></strong></p>
                                            <lightning-input
                                                    type="number"
                                                    min="0"
                                                    max-length="10"
                                                    message-when-too-long="Enter up 10 characters"
                                                    step="any"
                                                    name="inputQualEnglishReadingScore"
                                                    data-id="inputQualEnglishReadingScore"
                                                    label="Reading Score"
                                                    variant="label-hidden"
                                                    value={qualEnglishTestScoreReading}
                                                    required="true"
                                                    onchange={captureInputs}
                                                    disabled={disableScoreInput}>
                                            </lightning-input>
                                        </lightning-layout-item>
                                        <!-- Writing English Test Score -->
                                        <lightning-layout-item size="3" class="slds-align-top slds-p-horizontal_x-small">
                                            <p><strong>Writing Score<span class="slds-required blue-required" title="Required">*</span></strong></p>
                                            <lightning-input
                                                    type="number"
                                                    min="0"
                                                    max-length="10"
                                                    message-when-too-long="Enter up 10 characters"
                                                    step="any"
                                                    name="inputQualEnglishWritingScore"
                                                    data-id="inputQualEnglishWritingScore"
                                                    label="Writing Score"
                                                    variant="label-hidden"
                                                    value={qualEnglishTestScoreWriting}
                                                    required="true"
                                                    onchange={captureInputs}
                                                    disabled={disableScoreInput}>
                                            </lightning-input>
                                        </lightning-layout-item>
                                        <!-- Speaking English Test Score -->
                                        <lightning-layout-item size="3" class="slds-align-top slds-p-horizontal_x-small">
                                            <p><strong>Speaking Score<span class="slds-required blue-required" title="Required">*</span></strong></p>
                                            <lightning-input
                                                    type="number"
                                                    min="0"
                                                    max-length="10"
                                                    message-when-too-long="Enter up 10 characters"
                                                    step="any"
                                                    name="inputQualEnglishSpeakingScore"
                                                    data-id="inputQualEnglishSpeakingScore"
                                                    label="Speaking Score"
                                                    variant="label-hidden"
                                                    value={qualEnglishTestScoreSpeaking}
                                                    required="true"
                                                    onchange={captureInputs}
                                                    disabled={disableScoreInput}>
                                            </lightning-input>
                                        </lightning-layout-item>
                                    </div>
                                </template>

                                <!-- Verify and Add English Test -->
                                <template if:true={shouldShowTemplate}>
                                    <div id="englishTestAddAndVerify" class="slds-grid slds-wrap slds-m-bottom_large slds-m-top_x-large">
                                    <lightning-layout-item class="slds-align-top slds-p-horizontal_x-small slds-m-right_medium">
                                        <!-- Verify English Test -->
                                        <template if:true={showVerifyButton}>
                                            <lightning-layout-item size="9" class="slds-align-top slds-p-horizontal_x-small slds-m-top_medium ">
                                                <p>{englishTestVerifyHelpText}</strong></p>
                                            </lightning-layout-item>
                                            <button class={verifyButtonDynamicClass}
                                                    disabled={verifyDisabled}
                                                    onclick={handleVerification}
                                                    title={verifyHelpText}>
                                                Verify Test
                                            </button>
                                        </template>

                                        <!-- Add English Test -->
                                        <template if:true={showAddTestDetailButton}>
                                            <button title="Add Test Detail" onclick={onClickSave} class="primaryButton slds-m-right_medium">{addTestButtonLabel}</button>
                                        </template>

                                        <!-- Add English Test Button after failed validation -->
                                        <template if:true={showAddTestDetailButtonAfterFailedVerification}>
                                            <button title="Add Test Detail" onclick={onClickAddTestOnFailedVerification} class="primaryButton slds-m-right_medium">Add Test Detail</button>
                                        </template>

                                        <!-- Save Will Complete English Test -->
                                        <template if:true={showDateExpected}>
                                            <template if:true={showSaveButton}>
                                                <button title="Save" onclick={onClickSave} class="primaryButton slds-m-right_medium">Save</button>
                                            </template>
                                        </template>

                                        <!-- Cancel Adding English Test -->
                                        <template if:true={showCancelEditButton}>
                                            <button title="Cancel" onclick={onclickCancelEditButton} class="secondaryButton">{cancelCloseButtonLabel}</button>
                                        </template>
                                    </lightning-layout-item>
                                </div>
                                </template>

                                <!-- Verification Message -->
                                <template if:true={showValidationResultSuccess}>
                                    <div id="englishVerificationSuccess" class="slds-grid slds-wrap slds-m-top_large slds-m-bottom_large">
                                        <lightning-layout-item size="12" class="slds-align-top slds-p-horizontal_x-small">
                                            <p style="color: #2574a9;">
                                                {verificationSuccessMessage}
                                            </p>
                                        </lightning-layout-item>
                                    </div>
                                </template>
                                <template if:true= {showValidationResultFail}>
                                    <div id="englishVerificationFail" class="slds-grid slds-wrap slds-m-top_large slds-m-bottom_large">
                                        <lightning-layout-item size="12" class="slds-align-top slds-p-horizontal_x-small">
                                            <p style="color: red;">
                                                {verificationFailMessage}
                                            </p>
                                        </lightning-layout-item>
                                    </div>
                                </template>
                            </template>

                            <!-- Monash English Program Consideration Section -->
                            <template if:true={showEnglishProgramConsideration}>
                                <div id="englishLanguageConsideration" class="slds-grid slds-wrap slds-m-bottom_medium" style="margin-top: 15px;">
                                    <!-- Sentence Section -->
                                    <lightning-layout-item size="9" class="slds-align-top slds-p-horizontal_x-small slds-m-top_medium ">
                                        <p><strong>{monashEnglishProgramConsideration}</strong></p>
                                    </lightning-layout-item>

                                    <!-- Radio Group Section -->
                                    <lightning-layout-item size="3" class="slds-align-top slds-p-horizontal_x-small slds-grid slds-grid_align-end slds-grid_vertical-align-center slds-m-top_medium">
                                        <lightning-radio-group
                                                data-id="englishLanguageConsideration"
                                                name="English Language Consideration"
                                                label={monashEnglishProgramConsideration}
                                                required="true"
                                                type="button"
                                                options={yesNoOptions}
                                                onchange={onChangeEnglishLanguageConsideration}
                                                value={englishLanguageConsideration}
                                                variant="label-hidden">
                                        </lightning-radio-group>
                                    </lightning-layout-item>
                                </div>
                            </template>

                            <!-- Add more English tests -->
                            <template if:true={showAddNewEnglishProficiency}>
                                <div id="addEnglishLanguageTest" class="slds-grid slds-wrap" style="margin-top: 15px;">
                                    <!-- Text Section -->
                                    <lightning-layout-item size="9" class="slds-align-top slds-p-horizontal_x-small slds-m-top_medium ">
                                        <p><strong>{addNewEnglishTest}</strong></p>
                                    </lightning-layout-item>

                                    <!-- Button Section -->
                                    <lightning-layout-item size="3" class="slds-align-top slds-p-horizontal_x-small slds-grid slds-grid_align-end slds-grid_vertical-align-center slds-m-top_medium">
                                        <lightning-radio-group
                                                data-id="addEnglishLanguageTest"
                                                name="Add English Language Test"
                                                label={addNewEnglishTest}
                                                required="true"
                                                type="button"
                                                options={yesNoOptions}
                                                onchange={onChangeAddNewEnglishProficiency}
                                                value={addNewEnglishProficiency}
                                                variant="label-hidden">
                                        </lightning-radio-group>
                                    </lightning-layout-item>
                                </div>
                            </template>
                        </div>
                    </div>
                        </div>
                    </div>
                </div>
                <!-- END - English Proficiency -->

        <!-- CREDIT INTENTION -->
        <template if:true={isNotAbroadType}>
            <template if:true={showCreditIntention}>
                <div class="slds-grid slds-gutters slds-wrap">
                    <div class="slds-col">
                        <!-- Credit Intention -->
                        <div class="sectionContainer slds-wrap">
                            <div class="slds-size_3-of-6 sectionContainerTopBorder"></div>
                            <div class="sectionContainerBody slds-size_5-of-5">
                                <div class="slds-size_5-of-5">
                                    <h2>Credit</h2>
                                </div>
                                <div class="slds-size_5-of-5" style="margin-top: 10px;">
                                    <lightning-formatted-rich-text value={label.myAppEnglishTestCreditText}></lightning-formatted-rich-text>
                                </div>

                                <div class="fieldContainerOverride">
                                    <lightning-layout multiple-rows="true" class="slds-size_5-of-5">
                                        <lightning-layout-item size="9">
                                            <span class="fieldTitle">{label.myAppEnglishTestCreditQuestion}</span>
                                        </lightning-layout-item>
                                        <lightning-layout-item size="3" class="slds-align-top slds-p-horizontal_x-small slds-grid slds-grid_align-end slds-grid_vertical-align-center">
                                            <lightning-radio-group
                                                    data-id="inputCreditIntention"
                                                    name="Credit"
                                                    label={label.myAppEnglishTestCreditQuestion}
                                                    type="button"
                                                    options={trueFalseOptions}
                                                    onchange={onChangeCreditIntention}
                                                    value={creditIntention}
                                                    variant="label-hidden">
                                            </lightning-radio-group>
                                        </lightning-layout-item>
                                    </lightning-layout>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </template>
        <!-- END CREDIT INTENTION -->
    </div>

</template>
