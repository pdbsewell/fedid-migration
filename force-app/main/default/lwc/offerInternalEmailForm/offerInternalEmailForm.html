<template>
    <template if:true={isSelectEmailType}>        
        <div class="slds-align_absolute-center">
            <div class="slds-template__container" style="width: 30%; margin-top: 5vh; background-color: white; border-radius: .25rem; margin-bottom: 50px;">
                <div class="inlinePanel oneRecordActionWrapper">
                    <!-- wizard header -->
                    <div class="actionBody">
                        <div class="forceChangeRecordType" data-aura-class="forceChangeRecordType">
                            <div class="inlineTitle slds-p-top_large slds-p-horizontal_medium slds-p-bottom_medium slds-text-heading--medium">
                                <!-- documents section title -->
                                <lightning-layout vertical-align="center">
                                    <lightning-layout-item size="12">
                                        <h2 class="inlineTitle slds-text-heading--medium slds-p-horizontal_small">Select Offer Template Type</h2>
                                    </lightning-layout-item>       
                                </lightning-layout>
                            </div>
                            <div class="modal__content">
                                <template if:true={templatesList}>
                                    <!-- content section -->
                                    <div class="slds-border_top slds-is-relative slds-p-vertical_medium slds-p-horizontal_small" style="overflow-y:auto;">
                                        <lightning-radio-group name="radioGroup"
                                            label="Email Type"
                                            options={emailType}
                                            value={selectedEmailType}
                                            onchange={onEmailTypeChange}
                                            type="radio"
                                            variant="label-hidden">
                                        </lightning-radio-group>
                                    </div>
                                    <!-- email type actions -->
                                    <div class="slds-p-vertical_x-small slds-border_top">
                                        <lightning-button label="Next" 
                                                        onclick={doSelectEmailType} 
                                                        variant="brand" 
                                                        class="slds-m-right_x-small slds-m-bottom_x-small slds-float_right">
                                        </lightning-button>
                                        <lightning-button label="Close" 
                                            onclick={navigateToOppPage}
                                            variant="brand" 
                                            class="slds-m-right_x-small slds-m-bottom_x-small slds-float_right">
                                        </lightning-button>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>
    <template if:false={isSelectEmailType}>
        <template if:false={showPreview}>
            <!-- header -->
            <section class="slds-docked-composer slds-grid slds-grid_vertical" style="width: 100%; background-color: #ffffff;">
                <header class="slds-docked-composer__header slds-grid slds-shrink-none" aria-live="assertive">
                    <!-- form header -->
                    <div class="slds-media slds-media_center slds-no-space">
                        <div class="slds-media__figure slds-m-right_x-small">
                            <span class="slds-icon_container">
                                <lightning-layout vertical-align="center">
                                    <!-- notes header icon -->
                                    <lightning-layout-item>
                                        <lightning-icon icon-name="utility:email" size="x-small"></lightning-icon>
                                    </lightning-layout-item>
                                </lightning-layout>
                            </span>
                        </div>
                        <div class="slds-media__body">
                            <lightning-layout vertical-align="center">
                                <!-- email header text -->
                                <lightning-layout-item>
                                    <h2 class="slds-truncate">{emailSubject}</h2>
                                </lightning-layout-item>
                            </lightning-layout>
                        </div>
                    </div>
                </header>
                <div class="slds-docked-composer__body" style="background-color: #ffffff; margin-left: -1px; margin-right: -1px;">
                    <lightning-layout multiple-rows>
                        <lightning-layout-item size="12" padding="vertical-small">
                            <!-- from address -->
                            <div class="slds-border_bottom slds-p-horizontal_medium slds-p-vertical_xx-small">
                                <lightning-layout vertical-align="center">
                                    <lightning-layout-item size="1" padding="vertical-small">
                                        <!--<span class="slds-text-color_destructive">* </span>-->
                                        <span class="slds-text-body_medium">From</span>
                                    </lightning-layout-item>
                                    <lightning-layout-item size="11" padding="vertical-small">
                                        <lightning-input name="emailFrom" 
                                            class="emailFrom"
                                            type="email" 
                                            label="From"
                                            variant="label-hidden" 
                                            value={emailFromAddress}
                                            onchange={emailFromAddressChange}>
                                        </lightning-input>
                                    </lightning-layout-item>
                                </lightning-layout>
                            </div>
                        </lightning-layout-item>
                        <lightning-layout-item size="12" padding="vertical-small">
                            <!-- to address -->
                            <div class="slds-border_bottom slds-p-horizontal_medium slds-p-vertical_xx-small">
                                <lightning-layout vertical-align="center">
                                    <lightning-layout-item size="1" padding="vertical-small">
                                        <!--<span class="slds-text-color_destructive">* </span>-->
                                        <span class="slds-text-body_medium">To</span>
                                    </lightning-layout-item>
                                    <lightning-layout-item size="11" padding="vertical-small">
                                        <span>                                                    
                                            <template if:true={opportunity}>
                                                <lightning-icon icon-name="utility:email" size="xx-small"></lightning-icon> {opportunity.PrimaryContact__r.Email} (Applicant)
                                            </template>
                                        </span>
                                    </lightning-layout-item>
                                    <!--<lightning-layout-item size="1" padding="vertical-small" alignment-bump="left">
                                        <div class="slds-float_right">
                                            <lightning-button-icon icon-name="utility:add"  alternative-text="Add Email"></lightning-button-icon>
                                        </div>
                                    </lightning-layout-item>-->
                                </lightning-layout>
                            </div>
                        </lightning-layout-item>
                        <lightning-layout-item size="12">
                            <!-- cc address -->
                            <div class="slds-border_bottom slds-p-horizontal_medium slds-p-vertical_xx-small">
                                <lightning-layout vertical-align="center">
                                    <lightning-layout-item size="1" padding="vertical-small">
                                        <span class="slds-text-body_medium">Cc</span>
                                    </lightning-layout-item>
                                    <lightning-layout-item flexibility="auto" padding="vertical-small">
                                        <!-- cc'ed emails -->
                                        <!-- agent email -->
                                        <template if:true={opportunity}>
                                            <template if:true={opportunity.Agent_Account__c}>
                                                <template if:true={opportunity.Agent_Account__r.Email__c}>
                                                    <span class="slds-m-right_small">
                                                        <lightning-icon icon-name="utility:email" size="xx-small"></lightning-icon> {opportunity.Agent_Account__r.Email__c} (Agent)
                                                    </span>
                                                </template>
                                            </template>
                                        </template>
                                        <!-- sponsor email 
                                        <template if:true={application.Sponsor_Email_Address__c}>
                                            <span class="slds-m-right_small">
                                                <lightning-icon icon-name="utility:email" size="xx-small"></lightning-icon> {application.Sponsor_Email_Address__c} (Sponsor)
                                            </span>
                                        </template>-->
                                        <!-- proxy email 
                                        <template if:true={application.Proxy_Email_Address__c}>
                                            <span class="slds-m-right_small">
                                                <lightning-icon icon-name="utility:email" size="xx-small"></lightning-icon> {application.Proxy_Email_Address__c} (Proxy)
                                            </span>
                                        </template>-->
                                        <!-- manually added addresses -->
                                        <template for:each={ccAddresses} for:item="email">
                                            <span class="slds-m-right_small" key={email}>                                                        
                                                <lightning-icon icon-name="utility:email" size="xx-small"></lightning-icon> {email}
                                                <lightning-button-icon icon-name="utility:close" 
                                                    alternative-text="Remove email address" 
                                                    variant="bare"
                                                    onclick={removeAddress}
                                                    data-address={email}>
                                                </lightning-button-icon>
                                            </span>
                                        </template>                                            
                                    </lightning-layout-item>
                                    <!-- Actions -->
                                    <lightning-layout-item flexibility="auto" padding="vertical-small" alignment-bump="left">
                                        <template if:true={showAddCc}>
                                            <lightning-layout vertical-align="center">
                                                <lightning-layout-item alignment-bump="left">
                                                    <div style="width: 200px;">
                                                        <lightning-input name="ccEmail"
                                                            class="ccEmail"
                                                            type="email"
                                                            value={newCcAddress}
                                                            label="CcEmail"
                                                            variant="label-hidden"
                                                            placeholder="Add CC Address here..."
                                                            onchange={onNewCcAddress}
                                                            onkeydown={addCcAddress}
                                                            message-when-pattern-mismatch="Please enter correct email format.">
                                                        </lightning-input>
                                                    </div>
                                                </lightning-layout-item>
                                                <lightning-layout-item>
                                                    <lightning-button label="Add"
                                                        class="slds-m-left_x-small"
                                                        alternative-text="Add Email Address here..." 
                                                        variant="brand"                                                                
                                                        onclick={hideAddCC}>
                                                    </lightning-button>
                                                </lightning-layout-item>
                                            </lightning-layout>
                                        </template>
                                        <template if:false={showAddCc}>
                                            <lightning-layout vertical-align="center">
                                                <lightning-layout-item alignment-bump="left">
                                                    <lightning-button-icon icon-name="utility:add" 
                                                        alternative-text="Add Email Address here..." 
                                                        variant="brand"
                                                        onclick={showAddCC}>
                                                    </lightning-button-icon>
                                                </lightning-layout-item>
                                            </lightning-layout>
                                        </template>
                                    </lightning-layout-item>
                                        <!-- add email 
                                        <lightning-layout vertical-align="center">
                                            <template if:true={showAddCc}>
                                                <lightning-layout-item flexibility="auto">
                                                    <lightning-input type="email"
                                                        label="CcEmail"
                                                        variant="label-hidden"
                                                        placeholder="Add CC Address here...">
                                                    </lightning-input>
                                                </lightning-layout-item>
                                                <lightning-layout-item size="2">
                                                    <lightning-button-icon icon-name="utility:add" 
                                                        alternative-text="Add Email Address here..." 
                                                        variant="brand"
                                                        onclick={hideAddCC}
                                                        size="x-small">
                                                    </lightning-button-icon>
                                                </lightning-layout-item>
                                            </template>
                                            <template if:false={showAddCc}>
                                                <lightning-layout-item size="2" padding="vertical-small">
                                                    <lightning-button-icon icon-name="utility:add" 
                                                        alternative-text="Add Email Address here..." 
                                                        variant="brand"
                                                        onclick={showAddCC}
                                                        size="x-small">
                                                    </lightning-button-icon>
                                                </lightning-layout-item>
                                            </template>
                                        </lightning-layout>-->
                                </lightning-layout>
                            </div>
                        </lightning-layout-item> 
                        <!--<lightning-layout-item size="12" padding="vertical-small">
                            bcc address 
                            <div class="slds-border_bottom slds-p-horizontal_medium slds-p-vertical_xx-small">
                                <lightning-layout vertical-align="center">
                                    <lightning-layout-item size="1" padding="vertical-small">
                                        <span class="slds-text-body_medium">Bcc</span>
                                    </lightning-layout-item>
                                    <lightning-layout-item size="10" padding="vertical-small">
                                        
                                    </lightning-layout-item>
                                    <lightning-layout-item size="1" padding="vertical-small" alignment-bump="left">
                                        <div class="slds-float_right">
                                            <lightning-button-icon icon-name="utility:add"  alternative-text="Add Email"></lightning-button-icon>
                                        </div>
                                    </lightning-layout-item>
                                </lightning-layout>
                            </div>
                        </lightning-layout-item>-->
                        <lightning-layout-item size="12" padding="vertical-small">
                            <!-- subject -->
                            <div class="slds-border_bottom slds-p-horizontal_medium slds-p-vertical_xx-small">
                                <lightning-layout vertical-align="center">
                                    <lightning-layout-item size="1" padding="vertical-small">
                                        <!--<span class="slds-text-color_destructive">* </span>-->
                                        <span class="slds-text-body_medium">Subject</span>
                                    </lightning-layout-item>
                                    <lightning-layout-item size="11" padding="vertical-small">
                                        <lightning-input name="emailSubject" 
                                            label="Subject" 
                                            variant="label-hidden" 
                                            value={emailSubject}
                                            onchange={emailSubjectChange}>
                                    </lightning-input>
                                    </lightning-layout-item>
                                </lightning-layout>
                            </div>
                        </lightning-layout-item>
                        <template if:true={showAttachFiles}>
                            <lightning-layout-item size="3" padding="vertical-small">
                                <!-- attach files -->
                                <div style="height: 45vh; overflow: auto;">
                                    <div class="slds-card__header slds-grid">
                                        <header class="slds-media slds-media_center slds-has-flexi-truncate">
                                            <div class="slds-media__figure">
                                                <lightning-icon icon-name="action:share_file" alternative-text="Attach File" title="Attach File" size="xx-small"></lightning-icon>
                                            </div>
                                            <div class="slds-media__body">
                                                <h2 class="slds-card__header-title">
                                                    <span>Attach Files</span>
                                                </h2>
                                            </div>
                                        </header>
                                    </div>
                                    <div class="slds-card__body slds-card__body_inner slds-border_top slds-p-top_x-small">
                                        <lightning-checkbox-group name="Files"
                                            label="Files"
                                            options={fileOptions}
                                            value={selectedFiles}
                                            onchange={handleFileSelect}
                                            variant="label-hidden">
                                        </lightning-checkbox-group>
                                        <!-- Show files options in here 
                                        <template for:each={relatedFiles} for:item="file">
                                            <div key={file.ContentDocumentId} class="slds-m-top_xx-small slds-p-bottom_xx-small slds-border_bottom">
                                                <lightning-input type="checkbox" label={file.ContentDocument.Title}></lightning-input>
                                            </div>
                                        </template>-->
                                    </div>
                                </div>
                            </lightning-layout-item>
                        </template>
                        <lightning-layout-item size={emailContentSize} padding="vertical-small">
                            <!-- email content -->
                            <div>
                                <lightning-input-rich-text value={emailContentPreview}
                                    formats={formats}
                                    onchange={emailContentChange}>
                                </lightning-input-rich-text>  
                            </div>
                        </lightning-layout-item>
                    </lightning-layout>
                </div>
                <footer class="slds-docked-composer__footer slds-shrink-none" style="margin-left: -1px; margin-right: -1px; border-radius: 0 0 4px 4px; margin-bottom: 50px;">
                    <template if:true={relatedFiles}>
                        <div class="slds-col_bump-right slds-text-align_right">
                            <lightning-button-stateful
                                label-when-off="Attach Files"
                                label-when-on="Attach Files"
                                label-when-hover="Attach Files"
                                icon-name-when-off="utility:add"
                                icon-name-when-on="utility:check"
                                icon-name-when-hover="utility:check"
                                selected={showAttachFiles}
                                onclick={handleAttachFileClick}>
                            </lightning-button-stateful>
                        </div>
                    </template>
                    <div class="slds-col_bump-left slds-text-align_right">
                        <lightning-button label="Preview" 
                            icon-name="utility:preview" 
                            class="slds-m-left_x-small"
                            onclick={showPreviewForm}
                            variant="brand">
                        </lightning-button>
                        <lightning-button label="Send" 
                            class="slds-m-left_x-small"
                            onclick={immediateSendEmail}
                            variant="brand"
                            disabled={emailLoading}>
                        </lightning-button>
                    </div>
                </footer>
            </section>
        </template>

        <template if:true={showPreview}>
            <!-- header -->
            <section class="slds-docked-composer slds-grid slds-grid_vertical slds-is-relative" style="width: 100%; background-color: #ffffff;">
                <header class="slds-docked-composer__header slds-grid slds-shrink-none" aria-live="assertive">
                    <!-- form header -->
                    <div class="slds-media slds-media_center slds-no-space">
                        <div class="slds-media__figure slds-m-right_x-small">
                            <span class="slds-icon_container">
                                <lightning-layout vertical-align="center">
                                    <!-- notes header icon -->
                                    <lightning-layout-item>
                                        <lightning-icon icon-name="utility:email" size="x-small"></lightning-icon>
                                    </lightning-layout-item>
                                </lightning-layout>
                            </span>
                        </div>
                        <div class="slds-media__body">
                            <lightning-layout vertical-align="center">
                                <!-- email header text -->
                                <lightning-layout-item>
                                    <h2 class="slds-truncate">{emailSubject}</h2>
                                </lightning-layout-item>
                            </lightning-layout>
                        </div>
                    </div>
                    <!-- upper right actions -->
                    <div class="slds-col_bump-left slds-shrink-none">
                        <lightning-button-icon icon-name="utility:close"  
                                            alternative-text="Settings" 
                                            variant="bare"
                                            onclick={closeWindow}>
                        </lightning-button-icon>
                    </div>
                </header>  
                <div class="slds-docked-composer__body slds-is-relative slds-p-bottom_x-small" style="background-color: #ffffff; margin-left: -1px; margin-right: -1px;">
                    <template if:true={selectedValues}>
                        <div class="slds-card__header slds-grid slds-border_bottom slds-p-bottom_small">
                            <header class="slds-media slds-media_center slds-has-flexi-truncate">
                                <div class="slds-media__figure">
                                    <lightning-icon icon-name="action:share_file" alternative-text="Attach File" title="Attach File" size="xx-small"></lightning-icon>
                                </div>
                                <div class="slds-media__body">
                                    <h2 class="slds-card__header-title">
                                        <span>Attached Files</span>
                                    </h2>
                                    {selectedValuesName}
                                </div>
                            </header>
                        </div>
                    </template>
                    <lightning-layout multiple-rows>
                        <lightning-layout-item size="12" padding="bottom-small">
                            <!-- email content -->
                            <div class="slds-align_absolute-center"> 
                                <template if:true={selectedValues}>
                                    <lightning-formatted-rich-text value={emailContentPreview} style="height: 54vh;">                                        
                                    </lightning-formatted-rich-text>      
                                </template>
                                <template if:false={selectedValues}>
                                    <lightning-formatted-rich-text value={emailContentPreview} style="height: 61vh;">                                        
                                    </lightning-formatted-rich-text>    
                                </template>
                            </div>
                        </lightning-layout-item>
                    </lightning-layout>                
                </div>
                <footer class="slds-docked-composer__footer slds-shrink-none slds-is-relative" style="margin-left: -1px; margin-right: -1px; border-radius: 0 0 4px 4px; margin-bottom: 50px;">                
                    <template if:true={emailLoading}>
                        <!-- Spinner loader -->
                        <lightning-spinner alternative-text="Loading" variant="brand" size="medium"></lightning-spinner>
                    </template>
                    <div class="slds-col_bump-left slds-text-align_right">
                        <lightning-button label="Back" title="Back" onclick={hidePreviewForm} disabled={emailLoading}></lightning-button>
                        <lightning-button variant="brand" 
                            label="Send" 
                            class="slds-m-left_x-small"
                            onclick={sendEmail}
                            disabled={emailLoading}>
                        </lightning-button>
                    </div>
                </footer>
            </section>
        </template>
    </template>
</template>
