<template>
  <template if:true={showSpinner}>
      <div class="demo-only" style="height:6rem">
          <div class="slds-spinner_container">
            <div role="status" class="slds-spinner slds-spinner_small">
              <span class="slds-assistive-text">Loading</span>
              <div class="slds-spinner__dot-a"></div>
              <div class="slds-spinner__dot-b"></div>
            </div>
          </div>
        </div>
  </template>

  <template if:true={isLoaded}>
    <div>
      <div class="slds-align_absolute-center" style="height:2rem">
        <div
          class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_warning"
          role="alert"
        >
          <span class="slds-assistive-text">warning</span>
          <span
            class="slds-icon_container slds-icon-utility-warning slds-m-right_x-small"
            title="Warning"
          >
            <svg class="slds-icon slds-icon_x-small" aria-hidden="true">
              <use
                xlink:href="/assets/icons/utility-sprite/svg/symbols.svg#warning"
              ></use>
            </svg>
          </span>
          <h2>{regenStatusLabel}</h2>
        </div>
      </div>
    </div>

    <br />
    <div class="slds-align_absolute-center" style="height:2rem">
      <template if:true={canUseRegenButton}>
        <lightning-button
          name="regen"
          onclick={DoRegenerate}
          label="Regenerate Offer"
        ></lightning-button>
      </template>
    </div>

    <br />

    <template if:true={isSaving}>
      <div>
        <div class="slds-align_absolute-center" style="height:2rem">
          <div
            class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_warning"
            role="alert"
          >
            <span class="slds-assistive-text">warning</span>
            <span
              class="slds-icon_container slds-icon-utility-warning slds-m-right_x-small"
              title="Warning"
            >
              <svg class="slds-icon slds-icon_x-small" aria-hidden="true">
                <use
                  xlink:href="/assets/icons/utility-sprite/svg/symbols.svg#warning"
                ></use>
              </svg>
            </span>
            <h2>Saving do not close.</h2>
          </div>
        </div>
      </div>
    </template>
  </template>
</template>
