<template>
    <!--LOADING SPINNER-->
    <template if:true={showSpinner}> 
        <div class="slds-is-relative" style="min-height: 200px;">
            <lightning-spinner alternative-text="Loading" class="spins" variant="brand" size="large"></lightning-spinner>
        </div>            
    </template>
    <!--LOADING SCREEN-->
    <template if:false={showSpinner}>
        <lightning-layout multiple-rows="true">
            <lightning-layout-item size="6" padding="around-small">
                <lightning-helptext content="Selecting this will only send emails to the members of the campaign who are not new. A new student would not have been added to an ISE campaign previously."></lightning-helptext>
                <lightning-input type="checkbox" data-id="checkbox2" label="Include  U18 students under ISE care in the previous semester" checked={prevU18} onchange={handlePrevU18Change} ></lightning-input>
            </lightning-layout-item>

            <lightning-layout-item size="6" padding="around-small">
                <lightning-helptext content="Selecting this will only send emails to the new U18 students. A new student would not have been added to an ISE campaign previously."></lightning-helptext>
                <lightning-input type="checkbox" data-id="checkbox3" label="Include  U18 students who are new to ISE care (only this semester)" checked={newU18} onchange={handleNewU18Change} ></lightning-input>
            </lightning-layout-item>

            <lightning-layout-item size="6" padding="around-small">
                <lightning-combobox name="Select One" label="Email Template" required placeholder="Select an Option" options={myList} value={selectedEmailtemplate} onchange={handlePicklistChange}>
                </lightning-combobox>
            </lightning-layout-item>
            
            <lightning-layout-item  size="6" padding="around-small">
                <lightning-combobox name="" label="Campus" value={value} required options={options} onchange={handleCampusChange}></lightning-combobox>
                <template for:each={allValues} for:item="val">
                    <lightning-pill key={val} name={val} label={val} onremove={handleCampusRemove}></lightning-pill>
                </template>
            </lightning-layout-item>

            <lightning-layout-item size="6" padding="around-small">
                <lightning-helptext content="Please select this field if you want to send calendar invites and also create an enquiry for each recipient."></lightning-helptext>
                <lightning-input type="checkbox" data-id="checkbox4" label="Include a Calendly Invite" checked={addEnquiry} onchange={handleEnquiryChange}></lightning-input>
            </lightning-layout-item> 

            <lightning-layout-item size="6" padding="around-small">
                <lightning-helptext content="Select this checkbox if you want to CC guardians in the email."></lightning-helptext>
                <lightning-input type="checkbox" data-id="checkbox5" label="Select to CC guardians in the email" checked={guardians} onchange={handleGuardiansChange}></lightning-input>
            </lightning-layout-item>

            <template if:true={addEnquiry}>
                <lightning-layout-item size="12" padding="around-small" >
                    <lightning-input type="text" label="Event Invite URL" placeholder="https://calendly.com/international-student ... " value={eventURL} onchange={handleEventInviteChange}>
                    </lightning-input>    
                </lightning-layout-item>
            </template>

            
            
            <lightning-layout-item size="12" padding="around-small" >
                <div style="float: right;">
                    <lightning-button style="padding-right:20px" label="Preview" variant="brand" onclick={previewFile} icon-name="utility:process" title="Preview"></lightning-button>
                    <lightning-button label="Send Email" variant="brand" onclick={emailOnClick} icon-name="utility:process" title="Send Email"></lightning-button>
                </div>   
            </lightning-layout-item> 
            
            <template if:true={renderEmailTempPreview}>
                <lightning-layout-item size="12" padding="around-small" >
                    <lightning-formatted-rich-text value={emailTempPreview} disabled></lightning-formatted-rich-text>
                </lightning-layout-item>
            </template>
            
                        
        </lightning-layout>
    </template>
</template>
