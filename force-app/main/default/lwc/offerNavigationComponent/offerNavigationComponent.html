<template>
    
    <div if:true={loading}>
        <lightning-spinner alternative-text="Loading"></lightning-spinner>
    </div>
    <div class="btn-class" if:true={hasRendered}>
        <button type="button" class={backBtnClass} onclick={previousHandler}>Back</button>
        
        <button type="button" class={nextBtnClass} onclick={nextHandler} disabled={nextBtnDisabled}>{continueBtnText}</button>
    </div>
</template>
