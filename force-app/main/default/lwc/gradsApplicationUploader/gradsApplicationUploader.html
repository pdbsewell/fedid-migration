<template>

    <lightning-card title="Graduation Application Uploader" icon-name="action:upload">
        <lightning-spinner if:true={loading}></lightning-spinner>

        <template lwc:if={isAccessible}>
            <!-- Operation Selection -->
            <div class="slds-m-bottom_medium slds-text-align_center">
                <h2>Select Operation</h2>
                <div class="slds-form-element slds-m-bottom_medium">
                    <lightning-radio-group
                        name="operation"
                        options={operationOptions}
                        value={operationType}
                        onchange={handleOperationChange}
                        type="button"
                        class=""
                        label="">;
                    </lightning-radio-group>
                </div>

                <!-- File Upload Section -->
                <h2>Select CSV File</h2>
                <p if:true={selectedOperation}>
                    {operationInstructions}
                </p>
                <template if:false={selectedOperation}>
                    <p>Please select an operation before uploading a file.</p>
                </template>
                <lightning-input
                        type="file"
                        multiple="false"
                        accept=".csv"
                        onchange={fileSelected}
                        lwc:if={selectedOperation}>
                </lightning-input>
            </div>
        </template>
        <template lwc:else>
            <div class="slds-m-around_medium slds-text-align_center">
                <h2 class="no-access">You do not have access to this feature</h2>
            </div>
        </template>

        <!-- Data Preview -->
        <template if:true={inputRows.length}>
            <div class="slds-m-around_medium slds-text-align_center">
                <h2>Review Data</h2>
                <div class="table-container slds-box_border" style={inputTableStyle}>
                    <lightning-datatable
                            key-field="id"
                            hide-checkbox-column
                            data={inputRows}
                            columns={inputColumns}
                            min-column-width="150"
                    >
                    </lightning-datatable>
                </div>
                <p>Total Rows: {inputRows.length}</p>
                <div class="slds-text-align_center slds-m-top_medium">
                    <lightning-button
                            variant="brand"
                            label="Process CSV"
                            title="Save" onclick={createApplications}
                            class="slds-m-left_small">
                    </lightning-button>
                </div>
            </div>
        </template>

        <!-- Error Output Section -->
        <template if:true={errorMessage}>
            <div class="error-message slds-m-horizontal_medium">
                {errorMessage}
            </div>
        </template>
        <template if:true={errorRows.length}>
            <div class="slds-m-around_medium">
                <div class="table-container slds-box_border" style={errorTableStyle}>
                    <lightning-datatable
                            key-field="key"
                            hide-checkbox-column
                            show-row-number-column
                            data={errorRows}
                            columns={errorColumns}>
                    </lightning-datatable>
                </div>
                <div class="slds-text-align_center slds-m-top_medium">
                    <lightning-button
                            label="Download Errors"
                            title="Download action"
                            icon-name="utility:download"
                            onclick={downloadErrorsCsv}>
                    </lightning-button>
                </div>
            </div>
        </template>

        <template if:true={doneMessage}>
            <div class="success-message slds-m-horizontal_medium">
                {doneMessage}
            </div>
        </template>

    </lightning-card>

</template>
