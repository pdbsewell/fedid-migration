<template>
    <div if:true={fullApplication.Application} class="slds-grid slds-gutters slds-wrap" style="width: 100%;">
        <div class="slds-col" style="width: 100%;">
            <!-- Contact Details -->
            <div data-testid="contactDetailsSection" class="sectionContainer slds-wrap" style="padding: 0 15px 0 0;">
                <div class="slds-size_3-of-6 sectionContainerTopBorder"></div>
                <div class="sectionContainerBody slds-size_5-of-5">
                    <div class="slds-size_5-of-5">
                        <h2>Contact Details</h2>
                    </div>
                    <div class="slds-size_5-of-5">
                        <!-- KEY APPLICATION DATA -->                        
                        <div class="slds-section section-float">
                            <div class="slds-col--padded">
                                <form class="slds-form--stacked">
                                    <div class="slds-grid slds-wrap slds-grid--pull-padded slds-p-vertical--medium iteration-block">
                                        <div class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                            <div class="slds-text-title">Title</div>
                                            <div data-testid="salutation" class="slds-text-body--regular">{salutation}</div>
                                        </div>
                                        
                                        <div if:false={isMononymousName} class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                            <div class="slds-text-title">Legal given name(s)</div>
                                            <div data-testid="firstName" class="slds-text-body--regular">{fullApplication.Application.Applicant__r.First_Name__c}</div>
                                        </div>
                                        
                                        <div class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                            <div lwc:if={isMononymousName}>
                                                <div data-testid="legalMononymousName" class="slds-text-title">Legal name (Mononymous)</div>
                                            </div>
                                            <div lwc:else>
                                                <div class="slds-text-title">Legal last name</div>
                                            </div>
                                            <div data-testid="lastName" class="slds-text-body--regular">{fullApplication.Application.Applicant__r.Last_Name__c}</div>
                                        </div>
                                        
                                        <div lwc:if={fullApplication.Application.Applicant__r.Preferred_Name__c} class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                            <div lwc:if={isMononymousName}>
                                                <div class="slds-text-title">Preferred Name</div>
                                            </div>
                                            <div lwc:else>
                                                <div class="slds-text-title">Preferred First Name</div>
                                            </div>
                                            <div data-testid="preferredName" class="slds-text-body--regular">{fullApplication.Application.Applicant__r.Preferred_Name__c}</div>
                                        </div>
                                        
                                        <div class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                            <div class="slds-text-title">Birth Date</div>
                                            <div class="slds-text-body--regular">
                                                <lightning-formatted-date-time value={fullApplication.Application.Applicant__r.Birthdate} year="numeric" day="2-digit" month="2-digit" time-zone="Australia/Melbourne"></lightning-formatted-date-time>
                                            </div>
                                        </div>
                                        <div class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                            <div class="slds-text-title">Gender</div>
                                            <div data-testid="gender" class="slds-text-body--regular">{fullApplication.Application.Applicant__r.Gender__c}</div>
                                        </div>
                                        
                                        <div lwc:if={fullApplication.Application.Applicant__r.Pronouns_V2__c} class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                            <div class="slds-text-title">Pronoun</div>
                                            <div data-testid="pronouns" class="slds-text-body--regular">{fullApplication.Application.Applicant__r.Pronouns_V2__c}</div>
                                        </div>
                                        
                                        <div class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                            <div class="slds-text-title">Street</div>
                                            <div data-testid="mailingStreet" class="slds-text-body--regular">{fullApplication.Application.Applicant__r.MailingStreet}</div>
                                        </div>
                                        
                                        <div lwc:if={fullApplication.Application.Applicant__r.MailingCity} class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                            <div class="slds-text-title">City</div>
                                            <div data-testid="mailingCity" class="slds-text-body--regular">{fullApplication.Application.Applicant__r.MailingCity}</div>
                                        </div>
                                        
                                        <div lwc:if={fullApplication.Application.Applicant__r.MailingState} class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                            <div class="slds-text-title">State</div>
                                            <div data-testid="mailingState" class="slds-text-body--regular">{fullApplication.Application.Applicant__r.MailingState}</div>
                                        </div>
                                        
                                        <div lwc:if={fullApplication.Application.Applicant__r.MailingPostalCode} class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                            <div class="slds-text-title">Postcode</div>
                                            <div data-testid="mailingPostCode" class="slds-text-body--regular">{fullApplication.Application.Applicant__r.MailingPostalCode}</div>
                                        </div>
                                        
                                        <div class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                            <div class="slds-text-title">Country</div>
                                            <div data-testid="mailingCountry" class="slds-text-body--regular">{fullApplication.Application.Applicant__r.MailingCountry}</div>
                                        </div>
                                        
                                        <div lwc:if={fullApplication.Application.Applicant__r.Phone} class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                            <div class="slds-text-title">Phone</div>
                                            <div data-testid="phone" class="slds-text-body--regular">{fullApplication.Application.Applicant__r.Phone}</div>
                                        </div>
                                        
                                        <div lwc:if={fullApplication.Application.Applicant__r.MobilePhone} class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                            <div class="slds-text-title">Mobile</div>
                                            <div data-testid="mobilePhone" class="slds-text-body--regular">{fullApplication.Application.Applicant__r.MobilePhone}</div>
                                        </div>
                                        
                                        <div class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                            <div class="slds-text-title">Email</div>
                                            <div data-testid="email" class="slds-text-body--regular">{fullApplication.Application.Applicant__r.Email}</div>
                                        </div>
                                    
                                        <div lwc:if={fullApplication.Application.Applicant__r.Previous_Monash_ID__c} class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                            <div class="slds-text-title">Previous Monash ID</div>
                                            <div data-testid="previousMonashId" class="slds-text-body--regular">{fullApplication.Application.Applicant__r.Previous_Monash_ID__c}</div>
                                        </div>
                        
                                        <div lwc:if={fullApplication.Application.Applicant__r.Previously_Studied_at_Monash__c} class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                            <div class="slds-text-title">Previously Studied at Monash?</div>
                                            <div class="slds-text-body--regular">Yes</div>
                                        </div>

                                        <div lwc:if={isResidencyStatusOnSite} class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                            <div class="slds-text-title">Residency Status</div>
                                            <div data-testid="residencyStatus" class="slds-text-body--regular">{fullApplication.Application.Residency_Status__c}</div>
                                        </div>
                                        
                                        <div lwc:if={fullApplication.Application.HasDisabilities__c} class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                            <div class="slds-text-title">Disability, mental health or ongoing medical condition</div>
                                            <div data-testid="hasDisabilities" class="slds-text-body--regular">{fullApplication.Application.HasDisabilities__c}</div>
                                        </div>
                                        
                                        <div lwc:if={fullApplication.Application.Existing_Aus_disability_support__c} class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2 slds-has-divider--bottom-space">
                                            <div class="slds-text-title">Registered for Disability Support?</div>
                                            <div data-testid="existingDisabilitySupport" class="slds-text-body--regular">{fullApplication.Application.Existing_Aus_disability_support__c}</div>
                                        </div>
                                        
                                        <div lwc:if={isAboriginalTorresStraitIslander} class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                            <div class="slds-text-title">Aboriginal Torres Strait Islander?</div>
                                            <div data-testid="aboriginalTorresStraitIslander" class="slds-text-body--regular">{fullApplication.Application.Applicant__r.Aboriginal_or_Torres_Strait_Islander__c}</div>
                                        </div>                                            
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>  
            <!-- Course Preferences -->
            <div data-testid="coursePreferenceSection" class="sectionContainer slds-wrap" style="padding: 0 15px 0 0;">
                <div class="slds-size_3-of-6 sectionContainerTopBorder"></div>
                <div class="sectionContainerBody slds-size_5-of-5">
                    
                    <div lwc:if={preferencesAvailable} class="slds-size_5-of-5">
                        <h2>Course Preferences</h2>
                        <table class="slds-table slds-table--bordered slds-table--cell-buffer slds-table--fixed-layout ">
                            <thead>
                                <tr class="slds-text-title_caps">
                                    <th scope="col">
                                        <div class="slds-truncate" title="Preference Number">Order</div>
                                    </th>
                                    <th scope="col">
                                        <div class="slds-truncate" title="Course Title">Course Code &amp; Title</div>
                                    </th>
                                    <th scope="col">
                                        <div class="slds-cell-wrap" title="Attendance Mode">Full/Part Time, On/Off Campus</div>
                                    </th>
                                    <th scope="col">
                                        <div class="slds-truncate" title="Type of Place">Fee Type</div>
                                    </th>
                                    <th scope="col">
                                        <div class="slds-truncate" title="Location">Location</div>
                                    </th>
                                    <th scope="col">
                                        <div class="slds-truncate" title="Course Period">Course Start</div>
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={fullApplication.Preferences} for:item="pref">                                    
                                    <tr lwc:if={pref} key={pref.Id}>
                                        <td data-label="Preference Number">
                                            <div data-testid="preferenceNumber" class="slds-truncate">{pref.Preference_Number__c}</div>
                                        </td>                                            
                                        <td lwc:if={pref.Unit_Set_Description__c} data-label="Course Title">
                                            <div data-testid="courseTitleWithDescription" class="slds-cell-wrap">{pref.Course_Code__c} - {pref.Course_Title__c} - {pref.Unit_Set_Description__c}</div>
                                        </td>
                                        <td lwc:else data-label="Course Title">
                                            <div data-testid="courseTitleWithCode" class="slds-cell-wrap">{pref.Course_Code__c} - {pref.Course_Title__c}</div>
                                        </td>                                                
                                        <td data-label="Full/Part Time, On/Off Campus">
                                            <div data-testid="courseAttendanceType" class="slds-wrap">{pref.Course_Offering__r.Attendance_Type_Description__c}&nbsp;{pref.Course_Offering__r.Attendance_Mode_Description__c}</div>
                                        </td>
                                        <td data-label="Place">
                                            <div data-testid="courseTypeOfPlaceDescription" class="slds-truncate">{pref.Course_Offering__r.Type_of_Place_Description__c}</div>
                                        </td>
                                        <td data-label="Location">
                                            <div data-testid="courseLocationDescription" class="slds-truncate">{pref.Course_Offering__r.Location_Description__c}</div>
                                        </td>
                                        <td data-label="Course Start">
                                            <div data-testid="courseAdmissionCalenderDescription" class="slds-cell-wrap">{pref.Course_Offering__r.Admission_Calendar_Description__c}</div>
                                        </td>
                                    </tr>
                                </template>                                
                            </tbody>
                        </table>
                    </div>
                    <div lwc:else class="slds-size_5-of-5">
                        <span class="fieldTitle">        
                            <h2><lightning-icon class="slds-m-right_x-small" icon-name="utility:warning" alternative-text="Warning!" variant="warning" title="warning variant"></lightning-icon>Course Preferences</h2>
                        </span>
                        <div style="font-size:20px;font-family:Roboto">
                            No Course Preference selected
                        </div>
                    </div>
                </div>
            </div>

            
            <div if:true={isStudyAbroadOrExchange}>
                <!-- Duration of study -->
                <div data-testid="durationOfStudy" class="sectionContainer slds-wrap">
                    <div class="slds-size_3-of-6 sectionContainerTopBorder"></div>
                    <div class="sectionContainerBody slds-size_5-of-5">                        
                        <div if:true={durationAvailable} class="slds-size_5-of-5">
                            <span class="fieldTitle"><h2>Duration of study</h2></span>
                        </div>    
                        <div if:false={durationAvailable} class="slds-size_5-of-5">
                            <span class="fieldTitle">        
                                <h2><lightning-icon class="slds-m-right_x-small" icon-name="utility:warning" alternative-text="Warning!" variant="warning" title="warning variant"></lightning-icon>Duration of study</h2>
                            </span>
                        </div>
                        
                        <div class="slds-size_5-of-5" style="margin-top: 10px;">
                            <div style="font-size:20px;font-family:Roboto">
                                How many semesters do you plan to stay?
                            </div>
                        </div>
                        <div class="slds-size_5-of-5" style="margin-top: 10px;">
                            <ul class="slds-list_horizontal  slds-wrap">
                                <li class="slds-item" style="font-size:14px;font-family:Roboto !important;margin-right: 50px;">
                                    <lightning-input type="checkbox" style="width: 25px;float:left;"
                                    checked={oneSem}
                                    label=""
                                    id="onesem"
                                    name="onesem"
                                    disabled="true"
                                    ></lightning-input>
                                    One semester</li>
                                <li class="slds-item" style="font-size:14px;font-family:Roboto !important;">
                                    <lightning-input type="checkbox" style="width: 25px;float:left;"
                                    label=""
                                    aura:id="twosem"
                                    name="twosem"
                                    checked={twoSem}
                                    disabled="true"
                                    ></lightning-input>Two semesters</li>
                            </ul>
                        </div>
                    </div>                
                </div>
                <!-- Unit Selection -->
                <div data-testid="unitSection" if:true={showUnitsSection} class="sectionContainer slds-wrap">
                    <div class="slds-size_3-of-6 sectionContainerTopBorder"></div>
                    <div class="sectionContainerBody slds-size_5-of-5">
                        <div class="slds-size_5-of-5">
                            <span class="fieldTitle">
                                <h2>Unit Selection</h2>
                            </span>
                        </div><br/>
                        <div style="font-size: 20px;font-family:Roboto Condensed;font-weight:bold;">Your Study Plan</div>
                        <div style="font-family:Roboto;font-size: 16px;">In order of preference, please list {minimumUnits} - {maximumUnits}
                                units per semester to be assessed.
                        </div><br />
                        
                        <div if:true={showPreReq} class="slds-size_4-of-5" style="background:#EDEDED;">
                            <div class="slds-p-around_small">
                                <div style="font-size: 20px;font-family:Roboto Condensed;font-weight:bold;">Evidence of prerequisites
                                </div>
                                <div style="font-family:Roboto;font-size: 16px;">You have selected units that have prerequisites, as
                                    indicated by the units highlighted in red below.<br/> You need to provide evidence that you have
                                    met these prerequisites by uploading supporting documentation in the Other Documents section
                                    on the Documents page in this application.<br /> Please consult the Handbook for the individual
                                    requirements for each unit you have selected.</div>
                            </div>
                        </div>                    
                        <br/>                    
                        <div data-testid="studyPlanSem1" if:true={isSem1RowListFound} class="container">
                            <div style="font-size: 16px;font-family:Roboto Condensed;font-weight:bold;">{sem1StudyPlanDesc}</div>
                            <table style="width: 770px;">
                                <thead>
                                    <tr>
                                        <th style="background-color:#006dae;color:white"><span class="slds-cell-wrap">Unit
                                                Code</span></th>
                                        <th style="background-color:#006dae;color:white"><span class="slds-cell-wrap">Unit
                                                Title</span></th>
                                        <th style="background-color:#006dae;color:white"><span
                                                class="slds-cell-wrap">Campus</span></th>
                                        <th style="background-color:#006dae;color:white;">
                                            <span class="slds-cell-wrap">Faculty</span>
                                        </th>
                                        <th style="background-color:#006dae;color:white"><span class="slds-cell-wrap">Teaching
                                                Period</span></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={selectedSem1RowsList} for:item="item">                                    
                                        <tr key={item.Id}>
                                            <td data-testid="studyPlanUnitCode" style={item.PreReq}><span class="slds-cell-wrap">{item.UnitCode}</span></td>
                                            <td data-testid="studyPlanUnitTitle" style={item.PreReq}><span class="slds-cell-wrap">{item.UnitTitle}</span></td>
                                            <td data-testid="studyPlanCampus" style={item.PreReq}><span class="slds-cell-wrap">{item.Campus}</span></td>
                                            <td data-testid="studyPlanFacultyName" style={item.PreReq}><span class="slds-cell-wrap">{item.FacName}</span></td>
                                            <td data-testid="studyPlanTeachingPeriod" style={item.PreReq}><span class="slds-cell-wrap">{item.TP}</span></td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div data-testid="currentInstituteSection" class="slds-grid slds-gutters slds-wrap">
                    <div class="slds-col slds-is-relative">
                        <div class="sectionContainer slds-wrap">
                            <div class="slds-size_3-of-6 sectionContainerTopBorder"></div>
                            <div class="sectionContainerBody slds-size_5-of-5">
                                <div class="slds-size_5-of-5">
                                    <h2>Current Institution</h2>
                                </div>
                                <div data-testid="currentInstitutePartnerName" class="slds-text-align_left" style="font-size:30px; font-family: Roboto;">{fullApplication.Application.Partner_Name__c}</div>
                            </div>
                        </div>
                    </div>            
                </div>
            </div>

            <!-- Tertiary Qualifications -->
            <div data-testid="tertiaryQualificationSection" if:true={isTertiaryQualification} class="sectionContainer slds-wrap" style="padding: 0 15px 0 0;">
                <div class="slds-size_3-of-6 sectionContainerTopBorder"></div>
                <div class="sectionContainerBody slds-size_5-of-5">
                    <div class="slds-size_5-of-5">
                        <h2>Tertiary Qualifications</h2>
                    </div>

                    <div class="slds-size_5-of-5">
                        <table class="slds-table slds-table--bordered slds-table--cell-buffer slds-table--fixed-layout ">
                            <thead>
                            <tr class="slds-text-title_caps">
                                <th scope="col">
                                    <div class="slds-truncate" title="Institution/School">Institution/School</div>
                                </th>
                                <th scope="col">
                                    <div class="slds-truncate" title="Assessment Type/Qualification">Assessment Type/Qualification</div>
                                </th>
                                <th scope="col">
                                    <div class="slds-truncate" title="Awarding Country">Awarding Country</div>
                                </th>
                                <th scope="col">
                                    <div class="slds-truncate" title="Awarding Country">First Year Enrolled</div>
                                </th>
                                <th scope="col">
                                    <div class="slds-truncate" title="Level of Completion">Level of Completion</div>
                                </th>
                            </tr>
                            </thead>
                            <tbody>
                                <template for:each={tertiaryQualifications} for:item="qual">                                    
                                    <tr key={qual.Id}> 
                                        <td if:true={qual.Institution_Name__c} data-label="Institution Name">
                                            <div data-testid="tertiaryQualificationInstituteName" class="slds-cell-wrap slds-truncate" style="float: left; width: 150px; word-wrap: break-word;">{qual.Institution_Name__c}</div>
                                        </td>                                        
                                        <td if:false={qual.Institution_Name__c} data-label="Institution Name">
                                            <div data-testid="tertiaryQualificationOtherInstitute" class="slds-cell-wrap slds-truncate" style="float: left; width: 150px; word-wrap: break-word;">{qual.Other_Institution__c}</div>
                                        </td>                                        
                                        <td data-label="Course Title">
                                            <div data-testid="tertiaryQualificationTitle" class="slds-cell-wrap slds-truncate" style="float: left; width: 150px; word-wrap: break-word;">{qual.Other_Qualification__c}</div>
                                        </td>
                                        <td data-label="Awarding Country">
                                            <div data-testid="tertiaryQualificationCountry" class="slds-cell-wrap">{qual.Qualification_Country__r.Name}</div>
                                        </td>
                                        <td data-label="First Year Enrolled">
                                            <div data-testid="tertiaryQualificationFirstYear" class="slds-cell-wrap">{qual.First_Year_Enrolled__c}</div>
                                        </td>
                                        <td data-label="Level of Completion">
                                            <div data-testid="tertiaryQualificationStatus" class="slds-cell-wrap">{qual.Status__c}</div>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <!-- Secondary Qualifications -->
            <div data-testid="secondaryQualificationSection" if:true={isSecondaryQualification} class="sectionContainer slds-wrap" style="padding: 0 15px 0 0;">
                <div class="slds-size_3-of-6 sectionContainerTopBorder"></div>
                <div class="sectionContainerBody slds-size_5-of-5">
                    <div class="slds-size_5-of-5">
                        <h2>Secondary Qualifications</h2>
                    </div>

                    <div class="slds-size_5-of-5">
                        <!--QUALIFICATIONS TABLE -->
                        <table class="slds-table slds-table--bordered slds-table--cell-buffer slds-table--fixed-layout ">
                            <thead>
                            <tr class="slds-text-title_caps">
                                <th scope="col">
                                    <div class="slds-truncate" title="Institution/School">Institution/School</div>
                                </th>
                                <th scope="col">
                                    <div class="slds-truncate" title="Assessment Type/Qualification">Assessment Type/Qualification</div>
                                </th>
                                <th scope="col">
                                    <div class="slds-truncate" title="Awarding Country">Awarding Country</div>
                                </th>
                                <th scope="col">
                                    <div class="slds-truncate" title="Level of Completion">Year of Completion</div>
                                </th>
                            </tr>
                            </thead>
                            <tbody>
                                <template for:each={secondaryQualifications} for:item="sec">                                    
                                    <tr key={sec.Id}>                                        
                                        <td if:true={sec.Institution_Name__c} data-label="Institution Name">
                                            <div data-testid="secondaryQualificationInstituteName" class="slds-cell-wrap slds-truncate" style="float: left; width: 150px; word-wrap: break-word;">{sec.Institution_Name__c}</div>
                                        </td>
                                        <td if:false={sec.Institution_Name__c} data-label="Institution Name">
                                            <div data-testid="secondaryQualificationOtherInstitute" class="slds-cell-wrap slds-truncate" style="float: left; width: 150px; word-wrap: break-word;">{sec.Other_Institution__c}</div>
                                        </td>
                                        <td if:true={sec.Qualification__c} data-label="Course Title">
                                            <div data-testid="secondaryQualificationName" class="slds-cell-wrap slds-truncate" style="float: left; width: 150px; word-wrap: break-word;">{sec.Qualification__r.Qualification_Name__c}</div>
                                        </td>
                                        <td if:false={sec.Qualification__c} data-label="Course Title">
                                            <div data-testid="secondaryQualificationOtherName" class="slds-cell-wrap slds-truncate" style="float: left; width: 150px; word-wrap: break-word;">{sec.Other_Qualification__c}</div>
                                        </td>
                                        <td data-label="Awarding Country">
                                            <div data-testid="secondaryQualificationCountry" class="slds-cell-wrap">{sec.Qualification_Country__r.Name}</div>
                                        </td>
                                        <td data-label="Year of Completion">
                                            <div data-testid="secondaryQualificationYearOfCompletion" class="slds-cell-wrap">{sec.Year_of_Completion__c}</div>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Sponsorship / Proxy Details -->
            <div data-testid="sposnorshipOrProxySection" if:true={isSponsorshipOrProxy} class="sectionContainer slds-wrap" style="padding: 0 15px 0 0;">
                <div class="slds-size_3-of-6 sectionContainerTopBorder"></div>
                <div class="sectionContainerBody slds-size_5-of-5">
                    <div class="slds-size_5-of-5">
                        <h2>Sponsorship / Proxy Details</h2>
                    </div>

                    <div class="slds-size_5-of-5">
                        <div class="slds-section section-float">
                            <div class="slds-section section-float">
                                <div class="slds-col--padded">
                                    <form class="slds-form--stacked">
                                        <div class="slds-grid slds-wrap slds-grid--pull-padded slds-p-vertical--medium iteration-block">
                                            <template lwc:if={isSponsorship}>                                                
                                                <div if:true={fullApplication.Application.Sponsor_Name__c} class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                                    <div class="slds-text-title">Name of the sponsor/scholarship</div>
                                                    <div data-testid="sponsorName" class="slds-text-body--regular">{fullApplication.Application.Sponsor_Name__c }</div>
                                                </div>                                                                                        
                                                <div if:true={fullApplication.Application.Sponsor_Scholarship_organisation__c} class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                                    <div class="slds-text-title">Sponsor / Scholarship organisation</div>
                                                    <div data-testid="sponsorOrganisation" class="slds-text-body--regular">{fullApplication.Application.Sponsor_Scholarship_organisation__c }</div>
                                                </div>                                                
                                                <!-- sponsor email -->                                                
                                                <div if:true={fullApplication.Application.Sponsor_Email_Address__c} class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                                    <div class="slds-text-title">Sponsor Email Address</div>
                                                    <div data-testid="sponsorEmail" class="slds-text-body--regular">{fullApplication.Application.Sponsor_Email_Address__c}</div>
                                                </div>                                                
                                            </template>
                                            <template lwc:else>                                                
                                                <div if:true={fullApplication.Application.Sponsor_Name__c} class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                                    <div class="slds-text-title">Name of Proxy</div>
                                                    <div data-testid="proxyName" class="slds-text-body--regular">{fullApplication.Application.Sponsor_Name__c }</div>
                                                </div>                                            
                                                <div if:true={fullApplication.Application.Sponsor_Scholarship_organisation__c} class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                                    <div class="slds-text-title">Proxy Relationship to you</div>
                                                    <div data-testid="proxyOrganisation" class="slds-text-body--regular">{fullApplication.Application.Sponsor_Scholarship_organisation__c }</div>
                                                </div>                                                
                                                <!-- proxy email -->                                                
                                                <div if:true={fullApplication.Application.Proxy_Email_Address__c} class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                                    <div class="slds-text-title">Proxy Email Address</div>
                                                    <div data-testid="proxyEmail" class="slds-text-body--regular">{fullApplication.Application.Proxy_Email_Address__c}</div>
                                                </div>                                                
                                            </template>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Other Qualifications -->
            <div data-testid="otherQualificationSection" if:true={isOtherQualification} class="sectionContainer slds-wrap" style="padding: 0 15px 0 0;">
                <div class="slds-size_3-of-6 sectionContainerTopBorder"></div>
                <div class="sectionContainerBody slds-size_5-of-5">
                    <div class="slds-size_5-of-5">
                        <h2>Other Qualifications</h2>
                    </div>

                    <div class="slds-size_5-of-5">
                        <!--QUALIFICATIONS TABLE -->
                        <table class="slds-table slds-table--bordered slds-table--cell-buffer slds-table--fixed-layout ">
                            <thead>
                            <tr class="slds-text-title_caps">
                                <th scope="col">
                                    <div class="slds-truncate" title="Assessment Type/Qualification">Assessment Type/Qualification</div>
                                </th>
                                <th scope="col">
                                    <div class="slds-truncate" title="Date Achieved">Date Achieved</div>
                                </th>
                            </tr>
                            </thead>
                            <tbody>
                            <template for:each={otherQualifications} for:item="other">                                    
                                <tr key={other.Id}>
                                    <td data-label="Course Title">
                                        <div data-testid="otherQualificationTitle" class="slds-truncate slds-truncate" style="float: left; width: 300px; word-wrap: break-word;">{other.Other_Qualification__c}</div>
                                    </td>
                                    <td data-label="Date Achieved">                                        
                                        <div class="slds-truncate">
                                            <lightning-formatted-date-time data-testid="otherQualificationDateAchieved" value={other.Date_Achieved__c} year="numeric" day="2-digit" month="2-digit"></lightning-formatted-date-time>
                                        </div>
                                    </td>
                                </tr>
                            </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- English Tests -->
            <div data-testid="engQualificationSection" if:true={isEnglighQualification} class="sectionContainer slds-wrap" style="padding: 0 15px 0 0;">
                <div class="slds-size_3-of-6 sectionContainerTopBorder"></div>
                <div class="sectionContainerBody slds-size_5-of-5">
                    <div class="slds-size_5-of-5">
                        <h2>English Tests</h2>
                    </div>

                    <div class="slds-size_5-of-5">
                        <!--QUALIFICATIONS TABLE -->
                        <table class="slds-table slds-table--bordered slds-table--cell-buffer slds-table--fixed-layout ">
                            <thead>
                            <tr class="slds-text-title_caps">
                                <th scope="col">
                                    <div class="slds-truncate" title="Assessment Type/Qualification">Assessment Type/Qualification</div>
                                </th>
                                <th scope="col">
                                    <div class="slds-cell-wrap" title="Date of Completion">Date of Completion</div>
                                </th>
                                <th scope="col">
                                    <div class="slds-cell-wrap" title="Score">Score</div>
                                </th>
                            </tr>
                            </thead>
                            <tbody>
                                <template for:each={englishQualifications} for:item="eng">                                    
                                    <tr key={eng.Id}>
                                        <td data-label="Course Title">
                                            <div data-testid="engQualificationName" class="slds-cell-wrap slds-truncate" style="float: left; width: 300px; word-wrap: break-word;">{eng.Qualification__r.Qualification_Name__c}</div>
                                        </td>                                        
                                        <td if:false={eng.isTestCompleted__c} data-label="Expected Date of Completion">
                                            <div class="slds-truncate">
                                                <lightning-formatted-date-time data-testid="engQualificationExpectedDateOfCompletion" value={eng.Expected_date_of_completion__c} year="numeric" day="2-digit" month="2-digit"></lightning-formatted-date-time>
                                            </div>
                                        </td>
                                        <td if:true={eng.isTestCompleted__c}  data-label="Date of Completion">
                                            <div class="slds-truncate">
                                                <lightning-formatted-date-time data-testid="engQualificationDateOfCompletion" value={eng.Date_Achieved__c} year="numeric" day="2-digit" month="2-digit"></lightning-formatted-date-time>
                                            </div>
                                        </td>                                        
                                        <td data-label="Overall Score">
                                            <div data-testid="engQualificationOverallScore" class="slds-truncate">{eng.Score__c}</div>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>                            
                        </table>
                    </div>
                </div>
            </div>

            <!-- Work Experience -->
            <div data-testid="workExperience" if:true={hasWorkExperience} class="sectionContainer slds-wrap" style="padding: 0 15px 0 0;">
                <div class="slds-size_3-of-6 sectionContainerTopBorder"></div>
                <div class="sectionContainerBody slds-size_5-of-5">
                    <div class="slds-size_5-of-5">
                        <h2>Work Experience</h2>
                    </div>

                    <div class="slds-size_5-of-5">
                        <table class="slds-table slds-table--bordered slds-table--cell-buffer slds-table--fixed-layout ">
                            <thead>
                            <tr class="slds-text-title_caps">
                                <th scope="col">
                                    <div class="slds-truncate" title="Employer Name">Employer Name</div>
                                </th>
                                <th scope="col">
                                    <div class="slds-truncate" title="Position">Position</div>
                                </th>
                                <th scope="col">
                                    <div class="slds-truncate" title="Start Date">Start Date</div>
                                </th>
                                <th scope="col">
                                    <div class="slds-truncate" title="End Date">End Date</div>
                                </th>
                            </tr>
                            </thead>
                            <tbody>
                                <template for:each={fullApplication.Experience} for:item="work">                                    
                                    <tr key={work.Id}>
                                        <td data-label="Employer Name">
                                            <div data-testid="employerName" class="slds-truncate">{work.Employer_Name__c}</div>
                                        </td>
                                        <td data-label="Position">
                                            <div data-testid="workPosition" class="slds-truncate">{work.Position__c}</div>
                                        </td>
                                        <td data-label="Start Date">
                                            <div class="slds-truncate">
                                                <lightning-formatted-date-time data-testid="workStartDate" value={work.Start_Date__c} year="numeric" day="2-digit" month="2-digit"></lightning-formatted-date-time>
                                            </div>
                                        </td>
                                        <td data-label="End Date">                                            
                                            <div if:true={work.End_Date__c} class="slds-truncate">
                                                <lightning-formatted-date-time data-testid="workEndDate" value={work.End_Date__c} year="numeric" day="2-digit" month="2-digit"></lightning-formatted-date-time>
                                            </div>                                            
                                            <div data-testid="workOngoing" if:false={work.End_Date__c} class="slds-truncate">Ongoing</div>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>                            
                        </table>
                    </div>
                </div>
            </div>

            <!-- Parent Guardian Details -->
            <div data-testid="guardianSection" if:true={fullApplication.Application.Guardian_Full_Name__c} class="sectionContainer slds-wrap" style="padding: 0 15px 0 0;">
                <div class="slds-size_3-of-6 sectionContainerTopBorder"></div>
                <div class="sectionContainerBody slds-size_5-of-5">
                    <div class="slds-size_5-of-5">
                        <h2>Parent Guardian Details</h2>
                    </div>
                    <div class="slds-size_5-of-5">
                        <div class="slds-section section-float">
                            <div class="slds-col--padded">
                                <form class="slds-form--stacked">
                                    <div class="slds-grid slds-wrap slds-grid--pull-padded slds-p-vertical--medium iteration-block">
                                        <div class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                            <div class="slds-text-title">Guardian Full Name</div>
                                            <div data-testid="guardianFullName" class="slds-text-body--regular">{fullApplication.Application.Guardian_Full_Name__c}</div>
                                        </div>
                                        <div class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                            <div class="slds-text-title">Guardian Phone Number</div>
                                            <div data-testid="guardianPhoneNumber" class="slds-text-body--regular">{fullApplication.Application.Guardian_Phone_Number__c}</div>
                                        </div>
                                        <div class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                            <div class="slds-text-title">Guardian Email Address</div>
                                            <div data-testid="guardianEmailAddress" class="slds-text-body--regular">{fullApplication.Application.Guardian_Email_Address__c}</div>
                                        </div>
                                        <div class="slds-p-horizontal--small slds-size--1-of-2 slds-medium-size--1-of-2 slds-large-size--1-of-2  slds-has-divider--bottom-space">
                                            <div class="slds-text-title">Guardian Relationship</div>
                                            <div data-testid="guardianRelationship" class="slds-text-body--regular">{fullApplication.Application.Guardian_Relationship__c}</div>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <lightning-spinner if:true={showSpinner} alternative-text="Loading" variant="brand"></lightning-spinner>
</template>
