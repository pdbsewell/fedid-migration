<template>
    <template if:true={showSpinner}> 
        <div class="slds-is-relative" style="min-height: 200px;">
            <lightning-spinner alternative-text="Loading" class="spins" variant="brand" size="large"></lightning-spinner>
        </div>            
    </template>
    <template if:false={showSpinner}>
        <lightning-layout multiple-rows="true">
            <lightning-layout-item size="12" >
                <div class="slds-text-heading_large slds-text-align_center">
                    Enrolment Amendment Information
                </div>
            </lightning-layout-item>
            <lightning-layout-item size="6" padding="around-small">
                <lightning-combobox name="StaffOrg"
                                    required
                                    label="Staff Organisation Unit"
                                    value={staffOrgUnitSelectedValue}
                                    options={staffOrgUnitOptions}
                                    onchange={handleStaffOrgUnitChange} >
                </lightning-combobox>
            </lightning-layout-item>
            <lightning-layout-item size="6" padding="around-small">
                <lightning-combobox name="ReqType"
                                    required
                                    label="Request Type"
                                    value={reqTypeSelectedValue}
                                    options={reqTypeOptions}
                                    onchange={handleReqTypeChange} >
                </lightning-combobox>
            </lightning-layout-item>
            <lightning-layout-item size="6" padding="around-small">
                <lightning-input type="number" label="How many individual student records ?" pattern="^(0|[1-9][0-9]*)$" max-length="3" max="999" min="0"
                    value={howManyIndivStudentRecds} required onchange={handleHowManyIndivStudentRecdsChange}>
                </lightning-input>
            </lightning-layout-item>
            <template if:true={otherFreeText}> 
                <lightning-layout-item size="12" padding="around-small">
                    <lightning-input type="text" required label="Details : " value={details} onchange={handleDetailsChange}>
                    </lightning-input>
                </lightning-layout-item>
            </template>
            <lightning-layout-item size="6" padding="around-small">
                <lightning-input type="text" label="Is this a bulk request, or a single-student ?"
                    value={bulkSinglRequest} required onchange={handleBulkSinglRequestChange}>
                </lightning-input>
            </lightning-layout-item>
            <lightning-layout-item size="6" padding="around-small">
                <lightning-input type="text" label="Comments/Further Information : "
                    value={commentFurtherInfo} onchange={handleCommentFurtherInfo}>
                </lightning-input>
            </lightning-layout-item>
            <lightning-layout-item size="6" padding="around-small">
                <lightning-input type="text" label="Course Code : "
                    value={courseCode} required onchange={handleCourseCode}>
                </lightning-input>
            </lightning-layout-item>
            <lightning-layout-item size="6" padding="around-small">
                <lightning-input type="date" label="Date request was received from the Student : "
                    value={reqReceiveDate} required onchange={handleReqReceiveDate}>
                </lightning-input>
            </lightning-layout-item>
            <lightning-layout-item size="12" padding="around-small">
                <div class="slds-cell-wrap slds-truncate" style="word-wrap: break-word;">
                    <lightning-input type="text" label="If the request is due to a University error, provide an additional explanation:  "
                        value={reqUnivError} onchange={handleReqUnivError}>
                    </lightning-input>
                </div> 
            </lightning-layout-item>
            <lightning-layout-item size="6" padding="around-small">
                <lightning-input type="text" label="Number of units required : "
                    value={noOfUnits} required onchange={handleNoOfUnits}>
                </lightning-input>
            </lightning-layout-item>

            <!-- UNIT 1 -->
            <lightning-layout-item size="12" padding="around-small"><b>UNIT 1</b></lightning-layout-item>
            <lightning-layout-item size="6" padding="around-small">
                <lightning-input type="text" pattern="^(0|[1-9][0-9]*)$" max-length="4" max="2199" min="0000" label="Year: " value={entry1Year} onchange={handleEntry1Year} >

            <lightning-layout-item size="6" padding="around-small">

            </lightning-layout-item>
            <lightning-layout-item size="6" padding="around-small">

            </lightning-layout-item>
            <lightning-layout-item size="6" padding="around-small">
                <lightning-input type="text" label="Is this a standard date teaching period? (Yes/No)" value={entry1Standard} onchange={handleEntry1Standard}>
                </lightning-input>
            </lightning-layout-item>
            <lightning-layout-item size="6" padding="around-small">
                <lightning-input type="text" label="If ‘No’ non-standard TEACHING PERIOD must include URL  : " value={entry1NonStandard} onchange={handleEntry1NonStandard}>
                </lightning-input>
            </lightning-layout-item> 
            <lightning-layout-item size="6" padding="around-small">
                <lightning-combobox name="outcome1"
